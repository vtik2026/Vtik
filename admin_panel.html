<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | لوحة الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .admin-card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .btn-send { background: #fe2c55; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-msg { margin-top: 15px; font-size: 14px; color: #ffd700; }
    </style>
</head>
<body>

    <h2>لوحة تحكم VTIK ⚙️</h2>
    
    <div class="admin-card">
        <label>ID المستخدم (Telegram ID)</label>
        <input type="text" id="targetId" placeholder="مثلاً: 12345678">
        
        <label>المبلغ</label>
        <input type="number" id="amount" placeholder="القيمة">
        
        <label>نوع الهدية</label>
        <select id="rewardType">
            <option value="cash">كاش (جنيه)</option>
            <option value="coins">كوينز (عملات)</option>
        </select>

        <button class="btn-send" onclick="sendReward()">إرسال الهدية الآن 🎁</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // إعدادات سوبابيز
        const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
        // تنبيه: هنا يفضل استخدام الـ SERVICE_ROLE_KEY لتتمكن من تعديل أرصدة الآخرين
        const S_KEY = "YOUR_SERVICE_ROLE_KEY"; 
        const sb = supabase.createClient(S_URL, S_KEY);

        async function sendReward() {
            const userId = document.getElementById('targetId').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('rewardType').value;
            const status = document.getElementById('status');

            if(!userId || !amt) return alert("برجاء إكمال البيانات");

            status.innerText = "جاري الإرسال...";

            try {
                // 1. جلب بيانات المستخدم الحالية
                const { data: user, error: fError } = await sb.from('vtik_users')
                    .select('*').eq('user_id', userId).single();

                if (fError || !user) throw new Error("المستخدم غير موجود");

                // 2. تحديث رصيده المباشر
                const updateField = type === 'cash' ? 'cash_balance' : 'coins_balance';
                const newBalance = user[updateField] + amt;

                const { error: uError } = await sb.from('vtik_users')
                    .update({ [updateField]: newBalance })
                    .eq('user_id', userId);

                if (uError) throw uError;

                // 3. إضافة سجل في جدول المكافآت لتنبض أيقونة الهدية 🎁 لديه
                await sb.from('vtik_rewards').insert({
                    user_id: userId,
                    amount: amt,
                    type: type,
                    is_read: false
                });

                status.innerText = `✅ تم إرسال ${amt} ${type} بنجاح!`;
                
            } catch (err) {
                status.innerText = "❌ خطأ: " + err.message;
            }
        }
    </script>
</body>
</html>
