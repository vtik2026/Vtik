<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | لوحة التحكم السرية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #161616; padding: 30px; border-radius: 25px; border: 1px solid #222; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { color: var(--main); margin-bottom: 25px; font-size: 22px; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; margin-right: 5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #2a2a2a; background: #000; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); }
        .btn-send { background: var(--main); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-send:active { transform: scale(0.98); }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; min-height: 20px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>لوحة تحكم الإدارة ⚙️</h2>
        
        <div class="input-group">
            <label>معرف المستخدم (Telegram ID)</label>
            <input type="text" id="targetId" placeholder="مثلاً: 12345678">
        </div>
        
        <div class="input-group">
            <label>المبلغ المراد إرساله</label>
            <input type="number" id="amount" placeholder="أدخل القيمة">
        </div>
        
        <div class="input-group">
            <label>نوع العملة</label>
            <select id="rewardType">
                <option value="cash">رصيد كاش (جنيه)</option>
                <option value="coins">عملات كوينز (Coins)</option>
            </select>
        </div>

        <button class="btn-send" onclick="sendReward()">إرسال الهدية الآن 🎁</button>
        <div id="status"></div>
    </div>

    <script>
        const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
        // تم وضع مفتاح الـ service_role الخاص بك هنا للتحكم الكامل
        const S_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjI0MzQzMiwiZXhwIjoyMDkxODE5NDMyfQ.-Lpm2btZHRzSa3hVw5MqSnMzWDZ5CjZOZnLgMVkNH2k";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function sendReward() {
            const userId = document.getElementById('targetId').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('rewardType').value;
            const status = document.getElementById('status');

            if(!userId || !amt) {
                status.className = "error";
                status.innerText = "❌ يرجى إدخال ID المستخدم والمبلغ";
                return;
            }

            status.className = "";
            status.innerText = "⏳ جاري المعالجة...";

            try {
                // 1. جلب بيانات المستخدم للتأكد من وجوده
                const { data: user, error: fError } = await sb.from('vtik_users')
                    .select('*').eq('user_id', userId).single();

                if (fError || !user) throw new Error("المستخدم غير موجود في الموقع");

                // 2. تحديث رصيد المستخدم
                const field = type === 'cash' ? 'cash_balance' : 'coins_balance';
                const newTotal = (user[field] || 0) + amt;

                const { error: uError } = await sb.from('vtik_users')
                    .update({ [field]: newTotal })
                    .eq('user_id', userId);

                if (uError) throw uError;

                // 3. تسجيل "هدية" لتفعيل أيقونة الهدية 🎁 عند المستخدم في الموقع
                await sb.from('vtik_rewards').insert({
                    user_id: userId,
                    amount: amt,
                    type: type,
                    is_read: false
                });

                status.className = "success";
                status.innerText = `✅ تم إرسال ${amt} ${type === 'cash' ? 'جنيه' : 'كوينز'} بنجاح!`;
                
                // مسح الحقول بعد النجاح
                document.getElementById('amount').value = "";
            } catch (err) {
                status.className = "error";
                status.innerText = "❌ فشل: " + err.message;
            }
        }
    </script>
</body>
</html>
