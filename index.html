<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTIK - Auto ID 2026</title>
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --gold: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* شاشة الدخول بالاسم فقط */
        #loginPage { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
        }
        .login-box { width: 85%; max-width: 350px; }
        .input-name { 
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; 
            background: #111; color: white; font-size: 18px; text-align: center; margin-bottom: 20px; 
            outline: none; box-sizing: border-box;
        }
        .input-name:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(37, 244, 238, 0.2); }
        .start-btn { 
            width: 100%; padding: 18px; border-radius: 50px; border: none; 
            background: var(--red); color: white; font-weight: bold; font-size: 18px; cursor: pointer; 
        }

        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100%; }
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { width: 100vw; height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* صفحة البروفايل */
        .page { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; padding-bottom: 80px; }
        .profile-info { padding: 50px 20px; text-align: center; border-bottom: 1px solid #111; }
        .user-id-tag { 
            display: inline-block; margin-top: 10px; padding: 5px 15px; 
            background: #111; color: var(--gold); border: 1px solid #222; 
            border-radius: 20px; font-family: monospace; font-size: 14px; 
        }

        /* المحفظة */
        .wallet-section { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #111; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #1a1a1a; }

        nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 2000; 
        }
        .nav-btn { font-size: 24px; color: #555; cursor: pointer; }
        .nav-btn.active { color: white; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h1 style="color:var(--gold); margin-bottom:10px;">VTIK 🦋</h1>
            <p style="color:#666; margin-bottom:30px;">أدخل اسمك للبدء</p>
            <input type="text" id="userNameInput" class="input-name" placeholder="اكتب اسمك هنا..." maxlength="15">
            <button onclick="loginAndGenerateID()" class="start-btn">دخول وتوليد المعرف</button>
        </div>
    </div>

    <div id="mainApp">
        <div id="mainFeed"></div>

        <div id="profilePage" class="page">
            <div class="profile-info">
                <h2 id="displayUserName" style="margin:0;">اسم المستخدم</h2>
                <div id="displayUserID" class="user-id-tag">ID: --2026--</div>
            </div>

            <div class="wallet-section">
                <div class="card">
                    <div style="font-size:12px; color:#555;">الرصيد</div>
                    <div style="font-size:22px; font-weight:bold; color:var(--cyan);"><span id="cashVal">0.00</span> EGP</div>
                </div>
                <div class="card">
                    <div style="font-size:12px; color:#555;">الكوينز</div>
                    <div style="font-size:22px; font-weight:bold; color:var(--gold);"><span id="coinVal">0</span> 🪙</div>
                </div>
            </div>

            <button onclick="logout()" style="width:80%; margin:40px auto; padding:15px; background:none; border:1px solid #222; color:#444; border-radius:15px; display:block;">تسجيل الخروج</button>
        </div>

        <nav>
            <div class="nav-btn active" onclick="showFeed()">🏠</div>
            <div class="nav-btn" onclick="showProfile()">👤</div>
        </nav>
    </div>

    <script>
        // استرجاع البيانات المخزنة
        let db = JSON.parse(localStorage.getItem('vtik_db_v8')) || { user: null, cash: 0, coins: 150 };

        function loginAndGenerateID() {
            const name = document.getElementById('userNameInput').value.trim();
            if (name.length < 2) {
                alert("يرجى كتابة اسم صحيح");
                return;
            }

            // توليد الـ ID أوتوماتيكياً (أول حرفين + 2026 + رقم عشوائي 4 أرقام)
            const prefix = name.substring(0, 2).toUpperCase();
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const generatedID = `${prefix}2026${randomNum}`;

            db.user = {
                name: name,
                id: generatedID
            };

            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('vtik_db_v8', JSON.stringify(db));
            updateUI();
        }

        function updateUI() {
            if (db.user) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                
                document.getElementById('displayUserName').innerText = db.user.name;
                document.getElementById('displayUserID').innerText = `ID: ${db.user.id}`;
                document.getElementById('cashVal').innerText = db.cash.toFixed(2);
                document.getElementById('coinVal').innerText = db.coins;
                
                renderFeed();
            }
        }

        function renderFeed() {
            document.getElementById('mainFeed').innerHTML = `
                <div class="video-card">
                    <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop playsinline autoplay muted></video>
                    <div style="position:absolute; right:20px; bottom:120px; display:flex; flex-direction:column; gap:25px; font-size:30px;">
                        <span>❤️</span>
                        <span>🚀</span>
                    </div>
                </div>`;
        }

        function showProfile() {
            document.getElementById('profilePage').style.display = 'block';
            document.querySelectorAll('.nav-btn')[1].classList.add('active');
            document.querySelectorAll('.nav-btn')[0].classList.remove('active');
        }

        function showFeed() {
            document.getElementById('profilePage').style.display = 'none';
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
            document.querySelectorAll('.nav-btn')[1].classList.remove('active');
        }

        function logout() {
            if (confirm("هل تريد الخروج؟ سيتم مسح بيانات الدخول.")) {
                db.user = null;
                localStorage.setItem('vtik_db_v8', JSON.stringify(db));
                location.reload();
            }
        }

        // تشغيل الفحص عند التحميل
        updateUI();
    </script>
</body>
</html>
