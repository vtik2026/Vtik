<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --bg: #000; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; justify-content: space-around; align-items: center; }
        .page { display: none; padding-top: 50px; height: 100vh; }
        .active { display: block; }
        .btn-plus { background: #fff; color: #000; border: none; padding: 5px 20px; border-radius: 8px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div id="home" class="page active">
    <h3>خلاصة الفيديوهات</h3>
    <div id="feed">جاري جلب الروابط من سوبابيز...</div>
</div>

<div id="profile" class="page">
    <h2 id="userName">...</h2>
    <p>معرف المستخدم: <span id="userId">0</span></p>
    <div id="dbStatus" style="color: yellow; font-size: 12px;">جاري فحص الاتصال بسوبابيز...</div>
</div>

<nav class="nav-bar">
    <button onclick="show('home')">🏠</button>
    <button class="btn-plus" onclick="upload()">+</button>
    <button onclick="show('profile')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639";
    const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = JSON.parse(localStorage.getItem('vtik_session'));

    async function start() {
        if(!user) {
            document.body.innerHTML = "<h1>يرجى تسجيل الدخول أولاً</h1>";
            return;
        }

        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userId').innerText = user.id;

        // اختبار إجباري لتسجيل المستخدم في سوبابيز
        const { error } = await sb.from('vtik_users').upsert({
            user_id: user.id.toString(),
            username: user.first_name
        });

        if (error) {
            document.getElementById('dbStatus').innerText = "خطأ في سوبابيز: " + error.message;
            document.getElementById('dbStatus').style.color = "red";
        } else {
            document.getElementById('dbStatus').innerText = "متصل بنجاح وسجلك موجود!";
            document.getElementById('dbStatus').style.color = "lime";
        }

        loadVideos();
    }

    async function loadVideos() {
        const { data, error } = await sb.from('vtik_videos').select('*');
        if (data && data.length > 0) {
            document.getElementById('feed').innerHTML = data.map(v => `
                <div style="height:80vh; margin-bottom:20px;">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" controls style="width:100%; height:100%;"></video>
                </div>
            `).join('');
        } else {
            document.getElementById('feed').innerText = "لا توجد روابط في سوبابيز حالياً.";
        }
    }

    async function upload() {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'video/*';
        inp.onchange = async () => {
            alert("بدأ الرفع لتليجرام...");
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('video', inp.files[0]);

            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {method:'POST', body:fd});
            const out = await res.json();

            if(out.ok) {
                alert("تم الرفع لتليجرام. الآن نحاول حفظ الرابط في سوبابيز...");
                const { error } = await sb.from('vtik_videos').insert([{
                    url: out.result.video.file_id,
                    user_id: user.id.toString()
                }]);

                if(error) alert("فشل الحفظ في سوبابيز: " + error.message);
                else location.reload();
            }
        };
        inp.click();
    }

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.onload = start;
</script>
</body>
</html>
