<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTIK - Final Fix</title>
    <style>
        :root { --gold: #FFD700; --tiktok-blue: #25f4ee; --tiktok-red: #fe2c55; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* الأزرار العلوية */
        .top-tabs { position: fixed; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2000; }
        .tab-btn { width: 160px; padding: 8px; background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 20px; text-align: center; backdrop-filter: blur(5px); color: var(--gold); font-weight: bold; pointer-events: auto; cursor: pointer; font-size: 14px; }

        /* الكرة الأرضية */
        #earth-trigger { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; border-radius: 50%; z-index: 100; cursor: pointer; }

        /* الصفحات - تعديل التمرير */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 3000; overflow-y: auto; box-sizing: border-box; padding-bottom: 100px; /* مسافة كافية للبار السفلي */ }
        
        /* البروفايل المحسن */
        .profile-section { padding-top: 10px; text-align: center; }
        .wallet-card { background: #111; padding: 15px; border-radius: 15px; margin: 10px 15px; border: 1px solid #333; text-align: center; }
        .btn-action { padding: 12px; border-radius: 10px; border: none; font-weight: bold; width: 90%; margin: 5px 0; cursor: pointer; font-size: 15px; }

        /* شريط التنقل */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 4000; }
        
        #rewardPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #000; border: 2px solid var(--gold); padding: 30px; border-radius: 25px; text-align: center; z-index: 8000; transition: 0.3s; }
        #rewardPopup.show { transform: translate(-50%, -50%) scale(1); }

        .video-item { background:#181818; padding:12px; border-radius:10px; margin:8px 15px; display:flex; justify-content:space-between; align-items:center; border: 0.5px solid #222; }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <div class="top-tabs">
        <div class="tab-btn" onclick="showPage('tasksPage')">📋 مهام اليوم</div>
        <div class="tab-btn" onclick="showPage('vipPage')">💎 VIP</div>
    </div>

    <div id="earth-trigger" onclick="spinEarth()"></div>

    <div id="profilePage" class="page">
        <div class="profile-section">
            <div style="width:65px; height:65px; background:var(--gold); border-radius:50%; margin:auto; line-height:65px; font-size:28px; color:#000; margin-top:20px;">👤</div>
            <h3 id="uID" style="margin: 10px 0;">ID: --</h3>
        </div>

        <div class="wallet-card">
            <div style="font-size:24px; color:var(--gold); font-weight:bold;">🪙 <span id="coinBal">0</span></div>
            <div style="margin-bottom:12px; color:#ccc;">رصيد الكاش: <span id="cashBal" style="color:#fff">0</span> EGP</div>
            
            <button class="btn-action" style="background:#fff; color:#000" onclick="convert()">تحويل الكوينز ⬅ كاش</button>
            <button class="btn-action" style="background:var(--tiktok-red); color:#fff" onclick="requestWallet('سحب')">طلب سحب كاش</button>
            <button class="btn-action" style="background:#39FF14; color:#000" onclick="requestWallet('إيداع')">طلب إيداع رصيد</button>
        </div>

        <h4 style="margin:15px 20px 5px 0; color:var(--gold);">🎥 فيديوهاتي المحملة</h4>
        <div id="vList"></div>
        
        <button class="btn-action" style="background:#222; color:#fff; margin:20px auto; display:block;" onclick="closePages()">رجوع للرئيسية</button>
    </div>

    <div id="tasksPage" class="page"><h2 style="text-align:center; margin-top:100px;">قريباً.. المهام</h2><button onclick="closePages()" class="btn-action" style="background:var(--gold); margin:20px auto; display:block;">رجوع</button></div>
    <div id="vipPage" class="page"><h2 style="text-align:center; margin-top:100px;">قريباً.. VIP</h2><button onclick="closePages()" class="btn-action" style="background:var(--gold); margin:20px auto; display:block;">رجوع</button></div>

    <nav class="nav-bar">
        <button style="background:none; border:none; color:white; font-size:26px;" onclick="closePages()">🏠</button>
        <div style="cursor:pointer; width:50px; height:32px; background:linear-gradient(to right, var(--tiktok-blue), var(--tiktok-red)); border-radius:8px; line-height:32px; text-align:center; font-weight:bold; color:white;" onclick="upload()">➕</div>
        <button style="background:none; border:none; color:white; font-size:26px;" onclick="showPage('profilePage')">👤</button>
    </nav>

    <div id="rewardPopup">
        <h2 style="color:var(--gold)">ربحت! 🎉</h2>
        <div id="winAmt" style="font-size:40px; font-weight:bold;">0</div>
        <button class="btn-action" style="background:var(--gold); color:#000" onclick="collect()">استلام</button>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const TG_TOKEN = '8608757510:AAHULS7KucBQy9wq_ax4AoGS490tmABrB3U';
        const CHAT_ID = '-1003614080639';

        let db = JSON.parse(localStorage.getItem('vtik_v5')) || { userID: "V-"+Math.floor(Math.random()*900000), cash:0, coins:0, links:[] };
        let stars = [], meteors = [], ry = 0, isSpinning = false, tempWin = 0;
        let earthImg = new Image(); earthImg.src = 'texture.jpg';

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
            meteors = []; for(let i=0; i<3; i++) createMeteor();
        }

        function createMeteor() { meteors.push({x:Math.random()*canvas.width, y:-50, sY: 4+Math.random()*4, sX: (Math.random()-0.5)*2}); }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff'; stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
            ctx.strokeStyle = '#FFD700'; meteors.forEach((m,i) => {
                ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x+m.sX*5, m.y+15); ctx.stroke();
                m.y += m.sY; if(m.y > canvas.height) { meteors.splice(i,1); createMeteor(); }
            });
            ry += (isSpinning ? 0.25 : 0.005);
            let r = 120, x = canvas.width/2, y = canvas.height/2;
            if(earthImg.complete) {
                ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();
                let imgW = r*4.15, scroll = (ry*imgW)%imgW;
                ctx.drawImage(earthImg, x-scroll, y-r, imgW, r*2);
                ctx.drawImage(earthImg, x-scroll+imgW, y-r, imgW, r*2);
                ctx.drawImage(earthImg, x-scroll-imgW, y-r, imgW, r*2);
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }

        function spinEarth() {
            if(isSpinning || document.querySelector('.page[style*="block"]')) return;
            isSpinning = true;
            setTimeout(() => {
                isSpinning = false; tempWin = Math.floor(Math.random()*150)+50;
                document.getElementById('winAmt').innerText = tempWin;
                document.getElementById('rewardPopup').classList.add('show');
            }, 3000);
        }

        function collect() { db.coins += tempWin; save(); document.getElementById('rewardPopup').classList.remove('show'); }

        function save() { 
            localStorage.setItem('vtik_v5', JSON.stringify(db));
            document.getElementById('uID').innerText = "ID: " + db.userID;
            document.getElementById('coinBal').innerText = db.coins;
            document.getElementById('cashBal').innerText = db.cash;
            const list = document.getElementById('vList'); list.innerHTML = '';
            if(db.links.length === 0) list.innerHTML = '<p style="text-align:center; color:#444;">لا توجد فيديوهات</p>';
            db.links.forEach(l => list.innerHTML += `<div class="video-item"><span>${l.id}</span><a href="${l.url}" target="_blank" style="color:var(--tiktok-blue); text-decoration:none; font-weight:bold;">مشاهدة</a></div>`);
        }

        async function upload() {
            let i = document.createElement('input'); i.type = 'file'; i.accept = 'video/*';
            i.onchange = async e => {
                const file = e.target.files[0]; if(!file) return;
                alert("جاري الرفع...");
                const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('video', file);
                try {
                    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, {method:'POST', body:fd}).then(r=>r.json());
                    if(res.ok) {
                        db.links.unshift({id: "V-"+Math.floor(Math.random()*9999), url: `https://t.me/c/${CHAT_ID.replace('-100','')}/${res.result.message_id}`});
                        save(); alert("تم الرفع!");
                    }
                } catch(err) { alert("خطأ في الرفع"); }
            }; i.click();
        }

        function convert() { if(db.coins < 100) return alert("اقل شي 100 كوين"); db.cash += 5; db.coins -= 100; save(); }
        
        async function requestWallet(t) {
            let p = prompt("رقم المحفظة:");
            let a = prompt("المبلغ:");
            if(p && a) {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🔔 طلب "+t+":\nID: "+db.userID+"\nرقم: "+p+"\nمبلغ: "+a)}`);
                alert("تم الإرسال");
            }
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.style.display='none'); document.getElementById(id).style.display = 'block'; }
        function closePages() { document.querySelectorAll('.page').forEach(p=>p.style.display='none'); }

        window.onresize = init; init(); draw(); save();
    </script>
</body>
</html>
