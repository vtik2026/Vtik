<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK - Telegram Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tiktok-red: #fe2c55; --tiktok-blue: #25f4ee; --gold: #FFD700; --black: #010101; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* شريط الرفع العلوي */
        #uploadStatus { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #333; z-index: 10000; display: none; }
        #uploadBar { height: 100%; width: 0%; background: var(--tiktok-blue); transition: width 0.3s; }

        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #mainFeed::-webkit-scrollbar { display: none; }

        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; align-items: center; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .icon-group span { font-size: 12px; margin-top: 4px; display: block; text-align: center; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 5000; }
        .plus-btn { width: 45px; height: 30px; background: linear-gradient(to right, var(--tiktok-blue), var(--tiktok-red)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 20px; cursor: pointer; }

        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); display: none; z-index: 4000; overflow-y: auto; padding-bottom: 80px; }
        .wallet-card { background: #111; padding: 25px; border-radius: 20px; margin: 20px; text-align: center; border: 1px solid #222; }
    </style>
</head>
<body>

<div id="uploadStatus"><div id="uploadBar"></div></div>
<div id="mainFeed"></div>

<nav class="nav-bar">
    <button onclick="closePages()" style="background:none; border:none; color:white; font-size:26px;">🏠</button>
    <div class="plus-btn" id="upBtn">+</div>
    <button onclick="showPage('profilePage')" style="background:none; border:none; color:white; font-size:26px;">👤</button>
</nav>

<div id="profilePage" class="page">
    <div class="wallet-card">
        <div id="pUserID" style="color:var(--gold); font-weight:bold; margin-bottom:10px;">ID: ----</div>
        <h2 id="cashBal" style="font-size: 32px; margin:0;">0.00</h2>
        <p style="color:#888; margin-bottom:20px;">رصيد الكاش (EGP)</p>
        <div id="myVidsGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
    </div>
</div>

<script>
    // إعدادات سوبابيز (نفس بياناتك)
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // نظام الهوية
    let db = JSON.parse(localStorage.getItem('vtik_pro_v1')) || { 
        cash: 0, coins: 0, vids: [], 
        userID: "VT" + Math.floor(1000 + Math.random() * 9000) 
    };

    // جلب البيانات من سوبابيز
    async function fetchAll() {
        const { data: vids } = await sb.from('vtik_videos').select('*').order('created_at', { ascending: false });
        if (vids) {
            db.vids = vids;
            updateUI();
        }
    }

    // وظيفة الرفع الجديدة (تستخدم Vercel API لتليجرام)
    document.getElementById('upBtn').onclick = () => {
        let input = document.createElement('input'); input.type='file'; input.accept="video/*";
        input.onchange = async e => {
            const file = e.target.files[0]; if(!file) return;
            const status = document.getElementById('uploadStatus');
            const bar = document.getElementById('uploadBar');
            
            status.style.display='block';
            bar.style.width = '30%'; // وهمي للبداية

            const formData = new FormData();
            formData.append('video', file);

            try {
                // إرسال الفيديو لـ Vercel Proxy
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    bar.style.width = '100%';
                    // تخزين المعرف في سوبابيز
                    await sb.from('vtik_videos').insert([{ 
                        telegram_file_id: result.file_id, 
                        user_id: db.userID,
                        likes_count: 0
                    }]);
                    setTimeout(() => { status.style.display='none'; fetchAll(); }, 500);
                } else {
                    alert("فشل الرفع لتليجرام: " + result.error);
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر");
                status.style.display='none';
            }
        };
        input.click();
    };

    // تحديث الواجهة وعرض الفيديوهات
    function updateUI() {
        document.getElementById('pUserID').innerText = "ID: " + db.userID;
        document.getElementById('cashBal').innerText = parseFloat(db.cash).toFixed(2);

        document.getElementById('mainFeed').innerHTML = db.vids.map(v => `
            <div class="video-container">
                <video src="https://api.telegram.org/bot8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0/getFile?file_id=${v.telegram_file_id}" 
                       loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                <div class="side-icons">
                    <div class="icon-group"><button class="icon-btn">❤️</button><span>${v.likes_count || 0}</span></div>
                    <div class="icon-group"><button class="icon-btn">💬</button><span>0</span></div>
                </div>
            </div>`).join('');

        initObs();
    }

    // تشغيل الفيديو عند الظهور
    function initObs(){
        const obs = new IntersectionObserver(es => {
            es.forEach(e => {
                if(e.isIntersecting) e.target.play().catch(()=>{});
                else { e.target.pause(); e.target.currentTime = 0; }
            });
        }, {threshold: 0.6});
        document.querySelectorAll('video').forEach(v => obs.observe(v));
    }

    function showPage(id) { document.getElementById(id).style.display='block'; }
    function closePages() { document.querySelectorAll('.page').forEach(p=>p.style.display='none'); }

    window.onload = fetchAll;
    localStorage.setItem('vtik_pro_v1', JSON.stringify(db));
</script>
</body>
</html>
