<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik | تفرج وسجل إبداعك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --off-pink: #FFF0F5; --pink-dark: #FFB6C1; --accent: #FF1493; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--off-pink); overflow-x: hidden; }
        
        /* العلامة المائية */
        body::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; background: url('logo.png') no-repeat center; background-size: contain; opacity: 0.05; z-index: -1; }

        header { position: fixed; top: 0; width: 100%; background: white; z-index: 1000; border-bottom: 2px solid var(--pink-dark); padding: 10px 0; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; color: #999; padding-bottom: 5px; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* نافذة التسجيل الاحترافية */
        #auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.98); z-index: 9999; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--gold); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .social-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; text-align: center; }

        /* الفيد */
        #main-app { padding-top: 110px; padding-bottom: 80px; }
        .short-card { position: relative; width: 95%; max-width: 400px; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; height: 75vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-icons { position: absolute; bottom: 80px; left: 15px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 10; }
        .side-icons i { font-size: 26px; cursor: pointer; text-shadow: 0 2px 4px #000; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--pink-dark); }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <button onclick="requireAuth()" style="background:var(--gold); color:white; border:none; border-radius:15px; padding:5px 15px;">دخول</button>
            <img src="logo.png" style="width: 50px;">
            <div style="color:var(--gold); font-weight:bold;">⭐ 0</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('shorts')">Shorts ✨</div>
            <div class="tab" onclick="switchTab('shops')">المتاجر 🛍️</div>
        </div>
    </header>

    <div id="main-app">
        <div id="feed">
            </div>
    </div>

    <div id="auth-modal">
        <div class="auth-card">
            <img src="logo.png" style="width: 70px; margin-bottom: 10px;">
            <h3 style="color: var(--accent);">سجل دخولك في Vtik</h3>
            <p style="font-size: 12px; color: #777;">ليصل إبداعك للجميع وتجمع الهدايا</p>
            
            <button class="social-btn" style="background:#DB4437" onclick="socialLogin('google')"><i class="fab fa-google"></i> بالـ Google</button>
            <button class="social-btn" style="background:#4267B2" onclick="socialLogin('facebook')"><i class="fab fa-facebook"></i> بالـ Facebook</button>
            
            <div style="margin: 15px 0; color: #ccc;">أو</div>
            
            <input type="tel" id="user-phone" placeholder="رقم الموبايل">
            <button onclick="phoneLogin()" style="width:100%; background:var(--gold); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer;">دخول سريع</button>
            
            <button onclick="closeAuth()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">رجوع للمشاهدة</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="requireAuth()"><i class="fas fa-plus-circle" style="font-size:30px;"></i></div>
        <div class="nav-item" onclick="requireAuth()"><i class="fas fa-user"></i></div>
    </nav>

<script>
    const SUPABASE_URL = 'https://adnoxldhqdjdfnghhsog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // كودك السابق
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    // دالة التحقق من الدخول قبل أي أكشن
    async function checkUser() {
        const { data: { user } } = await client.auth.getUser();
        currentUser = user;
    }

    function requireAuth() {
        if (!currentUser) {
            document.getElementById('auth-modal').style.display = 'flex';
            return false;
        }
        return true;
    }

    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    // عند الضغط على لايك أو هدية
    function handleAction(actionName) {
        if (requireAuth()) {
            alert("تم تنفيذ: " + actionName);
            // هنا تكمل كود اللايك أو الهدية الفعلي
        }
    }

    // عرض الفيديوهات مع ربط الأزرار بالتحقق
    async function loadFeed() {
        const { data: vids } = await client.from('videos').select('*');
        const container = document.getElementById('feed');
        container.innerHTML = '';
        vids?.forEach(v => {
            container.innerHTML += `
                <div class="short-card">
                    <img src="logo.png" style="position:absolute; top:20px; right:20px; width:40px; opacity:0.6;">
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-icons">
                        <i class="fas fa-heart" onclick="handleAction('لايك')"></i>
                        <i class="fas fa-gift" onclick="handleAction('هدية')" style="color:var(--gold)"></i>
                        <i class="fas fa-share" onclick="handleAction('مشاركة')"></i>
                    </div>
                </div>`;
        });
    }

    // تسجيل الدومين للـ GitHub
    async function socialLogin(provider) {
        const { error } = await client.auth.signInWithOAuth({ 
            provider,
            options: { redirectTo: window.location.origin } 
        });
    }

    checkUser();
    loadFeed();
</script>
</body>
</html>
