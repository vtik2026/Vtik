<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTIK PRO - Ultra Edition</title>
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --gold: #FFD700; --black: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* تسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 30px; border-radius: 25px; width: 85%; text-align: center; border: 1px solid #333; }
        .tg-btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* الفيديوهات والواجهة */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; backdrop-filter: blur(5px); }
        .side-icons span { font-size: 11px; }

        /* أنيميشن القلب */
        @keyframes heartFly { 0% { transform: scale(0); opacity: 1; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        .heart-anim { position: absolute; font-size: 80px; color: var(--red); pointer-events: none; z-index: 1000; animation: heartFly 0.8s ease-out forwards; }

        /* البروفايل */
        .page { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .wallet-card { background: linear-gradient(135deg, #1a1a1a, #050505); padding: 30px; border-radius: 20px; margin: 20px; border: 1px solid #333; text-align: center; }
        .btn-action { width: 90%; margin: 5px auto; padding: 12px; border-radius: 10px; border: none; font-weight: bold; display: block; }
        .input-box { width: 90%; padding: 12px; margin: 5px auto; background: #222; border: 1px solid #444; color: white; border-radius: 8px; display: block; text-align: center; }

        /* الجالاكسي والاحتفال */
        #galaxyGame { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; }
        #winPopup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 7000; display: none; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 6500; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2 style="color:var(--gold)">VTIK EGYPT 🦋</h2>
            <div id="inputBoxArea">
                <input type="text" id="regName" class="input-box" placeholder="أدخل اسمك للملف الشخصي">
                <button class="tg-btn" onclick="requestNewToken()">توليد كود التفعيل 🔑</button>
            </div>
            <div id="verifyArea" style="display:none; margin-top:15px;">
                <p>أرسل هذا الكود للبوت لتسجيل الدخول:</p>
                <div style="background:#222; padding:15px; border-radius:10px; border:1px dashed var(--gold); margin:10px 0;">
                   <b id="vCode" style="color:var(--gold); font-size:24px;"></b>
                </div>
                <button class="tg-btn" onclick="window.open('https://t.me/vtik_egypt_bot')">فتح تيليجرام الآن ✈️</button>
                <p style="font-size:10px; color:var(--cyan); margin-top:10px;">بانتظار تأكيد الرسالة من تيليجرام...</p>
            </div>
        </div>
    </div>

    <div id="mainFeed"></div>
    <div class="galaxy-btn" onclick="openGalaxy()" style="position:fixed; bottom:80px; left:20px; width:60px; height:60px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; z-index:3000; box-shadow:0 0 15px var(--gold);">🎡</div>

    <div id="profilePage" class="page">
        <div class="wallet-card">
            <h3 id="userDisplay" style="color:var(--gold)">@User</h3>
            <div style="font-size:35px; font-weight:bold; color:var(--cyan);"><span id="cashBal">0.00</span> EGP</div>
            <div style="color:var(--gold);">🪙 <span id="coinBal">0</span> Coins</div>
        </div>

        <div style="padding:0 20px;">
            <input type="number" id="exCoins" class="input-box" placeholder="أدخل عدد الكوينز للتحويل">
            <button onclick="handleExchange()" class="btn-action" style="background:var(--gold)">💱 تحويل الرصيد (100 كوين = 10ج)</button>
            
            <hr style="border:0.5px solid #222; margin:20px 0;">
            
            <button onclick="toggleF('dF')" class="btn-action" style="background:var(--cyan)">📥 إيداع مبلغ</button>
            <div id="dF" style="display:none; padding-bottom:10px;">
                <input type="number" id="amtD" class="input-box" placeholder="المبلغ">
                <input type="text" id="phoneD" class="input-box" placeholder="رقم المرسل">
                <button onclick="finance('إيداع')" class="btn-action" style="background:#222; color:white">تأكيد العملية</button>
            </div>

            <button onclick="toggleF('wF')" class="btn-action" style="background:var(--red); color:white;">📤 سحب كاش</button>
            <div id="wF" style="display:none; padding-bottom:10px;">
                <input type="number" id="amtW" class="input-box" placeholder="المبلغ">
                <input type="text" id="phoneW" class="input-box" placeholder="رقم المحفظة">
                <button onclick="finance('سحب')" class="btn-action" style="background:#222; color:white">طلب سحب</button>
            </div>

            <button onclick="logout()" class="btn-action" style="background:#444; color:white; margin-top:30px; border:1px solid #666;">🚪 تسجيل الخروج من VTIK</button>
        </div>
    </div>

    <div id="galaxyGame">
        <div class="target-ring"></div>
        <canvas id="galaxyCanvas"></canvas>
        <div id="winPopup">
            <h1 id="winVal" style="font-size:60px; color:var(--gold); margin:0; text-shadow: 0 0 20px black;">+0</h1>
            <p style="color:var(--cyan); font-size:24px; text-shadow: 0 0 10px black;">+2 EGP Bonus!</p>
        </div>
    </div>

    <nav>
        <span onclick="location.reload()" style="font-size:24px; cursor:pointer;">🏠</span>
        <span onclick="document.getElementById('profilePage').style.display='block'" style="font-size:24px; cursor:pointer;">👤</span>
    </nav>

    <script>
        const BOT_TOKEN = '7611311032:AAFjZ6x6o8yUat7Y-W3H4N8G9h8h8h8h8h8';
        let db = JSON.parse(localStorage.getItem('vtik_v4')) || { user:null, cash:0, coins:250 };
        let currentCode = "";

        function save() { localStorage.setItem('vtik_v4', JSON.stringify(db)); updateUI(); }

        // --- نظام تسجيل الخروج الصارم ---
        function logout() {
            if(confirm("هل تريد تسجيل الخروج؟ ستحتاج لإرسال كود تفعيل جديد من تيليجرام للدخول مرة أخرى.")) {
                db.user = null; // مسح بيانات المستخدم فقط مع الحفاظ على الرصيد (أو مسحه حسب رغبتك)
                localStorage.setItem('vtik_v4', JSON.stringify(db));
                location.reload(); // إعادة التحميل ستظهر شاشة الدخول فوراً
            }
        }

        function requestNewToken() {
            const name = document.getElementById('regName').value.trim();
            if(name.length < 2) return alert("من فضلك ادخل اسمك أولاً");
            
            currentCode = `V-${Math.floor(1000 + Math.random() * 9000)}`;
            document.getElementById('vCode').innerText = currentCode;
            document.getElementById('inputBoxArea').style.display = 'none';
            document.getElementById('verifyArea').style.display = 'block';

            // فحص تيليجرام (Polling)
            const checkInt = setInterval(async () => {
                try {
                    const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                    const d = await r.json();
                    if(d.result.some(m => m.message?.text?.includes(currentCode))) {
                        clearInterval(checkInt);
                        db.user = { name: name };
                        save();
                        alert("تم التحقق بنجاح! أهلاً بك.");
                        location.reload();
                    }
                } catch(e) {}
            }, 3000);
        }

        function updateUI() {
            document.getElementById('cashBal').innerText = db.cash.toFixed(2);
            document.getElementById('coinBal').innerText = db.coins;
            if(db.user) {
                document.getElementById('userDisplay').innerText = "@" + db.user.name;
                document.getElementById('loginPage').style.display = 'none';
            }
        }

        // --- نظام اللايك ---
        function doLike(btn) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️'; heart.className = 'heart-anim';
            heart.style.left = '50%'; heart.style.top = '50%';
            btn.parentElement.parentElement.appendChild(heart);
            db.cash += 1; db.coins += 50; save();
            setTimeout(() => heart.remove(), 800);
        }

        // --- التحويل المرن (كل كوين = 0.1 جنيه) ---
        function handleExchange() {
            const val = parseInt(document.getElementById('exCoins').value);
            if(isNaN(val) || val < 100) return alert("الحد الأدنى للتحويل 100 كوينز");
            if(val > db.coins) return alert("ليس لديك كوينز كافية");
            
            let cashEarned = val * 0.1;
            db.coins -= val;
            db.cash += cashEarned;
            save();
            alert(`تم تحويل ${val} كوينز بنجاح!`);
        }

        function finance(type) {
            const a = type==='إيداع'?document.getElementById('amtD').value : document.getElementById('amtW').value;
            if(!a) return;
            type==='إيداع' ? db.cash += parseFloat(a) : db.cash -= parseFloat(a);
            save(); alert("تم تنفيذ العملية بنجاح (Simulation)");
        }

        // --- الجالاكسي الفاخر ---
        let cvs = document.getElementById('galaxyCanvas'), ctx = cvs.getContext('2d'), pts = [], anim, intro=0;

        function openGalaxy() {
            document.getElementById('galaxyGame').style.display = 'block';
            cvs.width = innerWidth; cvs.height = innerHeight;
            intro=0; pts = [];
            for(let i=0; i<150; i++) {
                let phi = Math.acos(-1 + (2*i)/150), th = Math.sqrt(150*Math.PI)*phi;
                pts.push({ v:Math.floor(Math.random()*750)+5, x:180*Math.cos(th)*Math.sin(phi), y:180*Math.sin(th)*Math.sin(phi), z:180*Math.cos(phi), c:i%2===0?`var(--red)`:`var(--cyan)` });
            }
            loopG();
        }

        function loopG() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,cvs.width, cvs.height);
            intro = Math.min(1, intro + 0.02);
            let rot = Date.now()*0.001;
            pts.forEach(p => {
                let depth = 1200 * (1 - intro);
                let x = p.x*Math.cos(rot) - p.z*Math.sin(rot);
                let z = p.x*Math.sin(rot) + p.z*Math.cos(rot) - depth;
                let per = 400/(400-z);
                let sx = x*per + cvs.width/2, sy = p.y*per + cvs.height/2;
                if(per>0) {
                    ctx.beginPath(); ctx.arc(sx, sy, 8*per*intro, 0, Math.PI*2);
                    ctx.fillStyle = p.c.includes('red')?'#fe2c55':'#25f4ee'; ctx.fill();
                }
            });
            anim = requestAnimationFrame(loopG);
        }

        cvs.onclick = () => {
            if(intro < 1) return;
            cancelAnimationFrame(anim);
            const win = pts[Math.floor(Math.random()*pts.length)];
            db.coins += win.v; db.cash += 2; save();
            
            document.getElementById('winVal').innerText = `+${win.v} C`;
            document.getElementById('winPopup').style.display = 'block';
            for(let i=0; i<60; i++) spawnConfetti();
            
            setTimeout(() => {
                document.getElementById('galaxyGame').style.display = 'none';
                document.getElementById('winPopup').style.display = 'none';
            }, 1500);
        };

        function spawnConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random()*100+'vw';
            c.style.top = '-10px';
            c.style.backgroundColor = ['#FFD700', '#25f4ee', '#fe2c55'][Math.floor(Math.random()*3)];
            document.getElementById('galaxyGame').appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function renderFeed() {
            const f = document.getElementById('mainFeed');
            f.innerHTML = `
            <div class="video-container">
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop playsinline autoplay muted></video>
                <div class="side-icons">
                    <button class="icon-btn" onclick="doLike(this)">❤️</button><span>12K</span>
                    <button class="icon-btn" onclick="alert('قريباً...')">💬</button><span>150</span>
                    <button class="icon-btn" onclick="alert('تم النسخ')">🚀</button><span>شير</span>
                </div>
            </div>`;
        }

        function toggleF(id) { 
            const el = document.getElementById(id); 
            el.style.display = el.style.display === 'none' ? 'block' : 'none'; 
        }

        renderFeed(); updateUI();
    </script>
</body>
</html>
