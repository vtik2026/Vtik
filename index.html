<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 - الإصدار الكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --orange: #FF7900; --bg: #0A0A0A; --card: #1A1A1A; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }

        /* الهيدر */
        header { position: fixed; top: 0; width: 100%; background: var(--card); display: flex; justify-content: space-between; align-items: center; padding: 10px 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .stat-box { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; margin-right: 10px; }

        /* الفيديوهات */
        main { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-wrapper { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار التفاعل */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon-unit { text-align: center; cursor: pointer; }
        .icon-unit i { font-size: 28px; color: #fff; filter: drop-shadow(0 2px 4px #000); }
        .icon-unit span { font-size: 11px; display: block; margin-top: 5px; }

        /* نافذة تسجيل الدخول */
        #auth-modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; text-align: center; border: 1px solid var(--gold); width: 80%; max-width: 350px; }
        .login-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Gemini Popup */
        #gemini-trigger { position: fixed; bottom: 100px; left: 20px; width: 45px; height: 45px; cursor: pointer; z-index: 2000; filter: drop-shadow(0 0 10px var(--gold)); }
        #gemini-chat { display: none; position: fixed; bottom: 160px; left: 20px; width: 300px; height: 400px; background: var(--card); border: 1px solid var(--gold); border-radius: 20px; z-index: 2000; flex-direction: column; box-shadow: 0 10px 30px #000; }
        .chat-header { background: var(--gold); color: #000; padding: 10px; border-radius: 20px 20px 0 0; font-weight: bold; display: flex; justify-content: space-between; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <div class="user-stats"><div class="stat-box">⭐ <span id="stars-val">0</span></div></div>
        <img src="logo.png" style="width:40px;">
        <button id="auth-status-btn" onclick="openAuth()" style="margin-left:15px; background:var(--orange); color:#white; border:none; padding:5px 15px; border-radius:10px;">دخول</button>
    </header>

    <main id="feed"></main>

    <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d473530c25e2906682ca.svg" id="gemini-trigger" onclick="toggleGemini()">
    
    <div id="gemini-chat">
        <div class="chat-header"><span>مساعد Vtik الذكي</span><i class="fas fa-times" onclick="toggleGemini()" style="cursor:pointer"></i></div>
        <div style="flex:1; padding:10px; font-size:13px;">مرحباً بك! أنا Gemini، كيف يمكنني مساعدتك في تطوير محتواك اليوم؟</div>
        <div style="padding:10px; border-top:1px solid #333;"><input type="text" placeholder="اسألني أي شيء..." style="width:85%; background:none; border:none; color:#white; outline:none;"></div>
    </div>

    <div id="auth-modal">
        <div class="auth-card">
            <h3 style="color:var(--gold)">انضم إلى Vtik 2026</h3>
            <p style="font-size:12px; margin-bottom:20px;">يجب تسجيل الدخول للتفاعل مع المبدعين</p>
            <button class="login-btn" style="background:#fff; color:#000;" onclick="signIn('google')"><i class="fab fa-google"></i> الدخول بجوجل</button>
            <button class="login-btn" style="background:#1877F2; color:#fff;" onclick="signIn('facebook')"><i class="fab fa-facebook"></i> الدخول بفيسبوك</button>
            <p onclick="closeAuth()" style="margin-top:15px; cursor:pointer; font-size:12px; color:#888;">إغلاق</p>
        </div>
    </div>

    <nav>
        <div onclick="checkAuth()"><i class="fas fa-home" style="color:var(--gold)"></i></div>
        <div onclick="checkAuth()"><i class="fas fa-plus-square" style="background:var(--orange); padding:5px 10px; border-radius:8px;"></i></div>
        <div onclick="checkAuth()"><i class="fas fa-user" style="color:var(--gold)"></i></div>
    </nav>

<script>
    const vtik = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'YOUR_KEY');
    let currentUser = null;

    // التأكد من حالة المستخدم
    vtik.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user;
        document.getElementById('auth-status-btn').innerText = currentUser ? 'خروج' : 'دخول';
    });

    function checkAuth() {
        if (!currentUser) { openAuth(); return false; }
        return true;
    }

    function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    async function signIn(provider) {
        // الربط مع Redirect URLs التي حددناها
        await vtik.auth.signInWithOAuth({ provider: provider, options: { redirectTo: 'https://vtik2026.github.io/Vtik/' } });
    }

    function toggleGemini() {
        const chat = document.getElementById('gemini-chat');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
    }

    // تحميل المحتوى مع حماية التفاعل
    async function loadFeed() {
        const { data } = await vtik.from('clips').select('*');
        const feed = document.getElementById('feed');
        data?.forEach(vid => {
            feed.innerHTML += `
                <div class="video-wrapper">
                    <video src="${vid.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-bar">
                        <div class="icon-unit" onclick="checkAuth() && handleLike()"><i class="fas fa-heart"></i><span>${vid.stars_count || 0}</span></div>
                        <div class="icon-unit" onclick="checkAuth() && openShop()"><i class="fas fa-star" style="color:var(--gold)"></i><span>شحن</span></div>
                    </div>
                </div>`;
        });
    }
    loadFeed();
</script>
</body>
</html>
