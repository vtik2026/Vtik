<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | المنصة المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --off-pink: #FFF0F5; --pink-dark: #FFB6C1; --accent: #FF1493; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--off-pink); overflow-x: hidden; }
        
        /* العلامة المائية الثابتة */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; opacity: 0.05; z-index: -1; pointer-events: none; }

        header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 2px solid var(--pink-dark); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .logo-main { width: 50px; cursor: pointer; transition: 0.3s; }
        .logo-main:hover { transform: scale(1.1); }
        
        .tabs { display: flex; justify-content: center; gap: 30px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; color: #999; padding-bottom: 5px; font-size: 14px; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* شاشة الدخول */
        #auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,240,245,0.98); z-index: 5000; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--gold); }
        .btn-social { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* الفيد */
        #main-app { padding-top: 120px; padding-bottom: 80px; }
        .v-card { position: relative; width: 95%; max-width: 400px; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; display: block; height: 75vh; object-fit: cover; }
        
        .side-actions { position: absolute; bottom: 80px; left: 15px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 10; }
        .side-icons i { font-size: 26px; cursor: pointer; text-shadow: 0 2px 5px #000; }

        /* بوت المساعدة (Gemini AI) */
        #ai-helper { position: fixed; bottom: 90px; right: 20px; background: var(--accent); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(255,20,147,0.4); cursor: pointer; z-index: 2000; border: 2px solid white; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--pink-dark); z-index: 1000; }
        .nav-item { color: var(--pink-dark); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="logo.png" class="watermark">

    <header>
        <div class="nav-top">
            <div id="user-display"><button onclick="openAuth()" style="background:var(--gold); border:none; color:white; padding:5px 15px; border-radius:15px; font-size:12px;">دخول</button></div>
            <img src="logo.png" class="logo-main" onclick="location.reload()">
            <div style="color:var(--gold); font-weight:bold;">⭐ <span id="pts">0</span></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('shorts')">Shorts ✨</div>
            <div class="tab" onclick="switchTab('shops')">المتاجر 🛍️</div>
        </div>
    </header>

    <div id="main-app">
        <div id="feed-display"></div>
    </div>

    <div id="ai-helper" onclick="aiHelp()">🤖</div>

    <div id="auth-modal">
        <div class="card">
            <img src="logo.png" style="width: 70px; margin-bottom: 10px;">
            <h3 style="color: var(--accent);">مرحباً بك في Vtik</h3>
            <button class="btn-social" style="background:#DB4437" onclick="socialLogin('google')"><i class="fab fa-google"></i> سجل بـ Google</button>
            <button class="btn-social" style="background:#4267B2" onclick="socialLogin('facebook')"><i class="fab fa-facebook"></i> سجل بـ Facebook</button>
            <button onclick="closeAuth()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="requireLogin()"><i class="fas fa-plus-circle" style="font-size:35px; color:#000;"></i></div>
        <div class="nav-item" onclick="requireLogin()"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const SUPABASE_URL = 'https://adnoxldhqdjdfnghhsog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;

    async function init() {
        const { data } = await client.auth.getUser();
        user = data.user;
        if(user) updateUI(user);
        loadVideos();
    }

    async function socialLogin(provider) {
        const { error } = await client.auth.signInWithOAuth({
            provider,
            options: { redirectTo: 'https://vtik2026.github.io/Vtik/' }
        });
        if(error) alert(error.message);
    }

    function updateUI(u) {
        document.getElementById('user-display').innerHTML = `<img src="logo.png" style="width:30px; border-radius:50%;" onclick="client.auth.signOut(); location.reload();">`;
        document.getElementById('pts').innerText = "100";
    }

    async function loadVideos() {
        const { data } = await client.from('videos').select('*');
        const container = document.getElementById('feed-display');
        container.innerHTML = '';
        data?.forEach(v => {
            container.innerHTML += `
                <div class="v-card">
                    <img src="logo.png" style="position:absolute; top:20px; right:20px; width:40px; opacity:0.6; z-index:5;">
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-actions">
                        <i class="fas fa-heart" onclick="handleLike()"></i>
                        <i class="fas fa-gift" style="color:var(--gold)" onclick="handleGift()"></i>
                    </div>
                </div>`;
        });
    }

    function aiHelp() {
        alert("أهلاً بك في Vtik! أنا مساعدك الذكي Gemini. هل تحتاج مساعدة في رفع فيديو أو توثيق حسابك التجاري؟");
    }

    function requireLogin() { if(!user) openAuth(); else alert("أهلاً بك في بروفايلك!"); }
    function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
    function handleLike() { if(!user) openAuth(); else alert("تم الإعجاب!"); }
    function handleGift() { if(!user) openAuth(); else alert("قائمة الهدايا قادمة!"); }

    init();
</script>
</body>
</html>
