<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; overflow: hidden; }

        .page { position: fixed; inset: 0; display: none; background: var(--bg); overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }

        /* الهوم والفيديوهات */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* أيقونات التفاعل */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; color: white; font-size: 22px; backdrop-filter: blur(10px); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* شريط التنقل */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #555; font-size: 24px; cursor: pointer; }
        .nav-btn.active { color: white; }
        .upload-btn { background: white; color: black; width: 45px; height: 30px; border-radius: 8px; font-weight: bold; font-size: 20px; }

        #statusMsg { position: fixed; top: 10px; width: 80%; left: 10%; background: var(--main); padding: 10px; border-radius: 8px; text-align: center; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="statusMsg">جاري معالجة الفيديو...</div>

<div id="homePage" class="page active">
    <div id="mainFeed">
        <div style="text-align:center; margin-top:50vh; color:#333;">لا توجد فيديوهات بعد.. اضغط (+) للرفع</div>
    </div>
</div>

<div id="profilePage" class="page">
    <div style="padding:40px 20px; text-align:center;">
        <div style="width:80px; height:80px; background:#222; border-radius:50%; margin:0 auto 10px; border:2px solid var(--main); display:flex; align-items:center; justify-content:center; font-size:30px;">👤</div>
        <h3 id="uName">تحميل...</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <div style="flex:1; background:#111; padding:15px; border-radius:15px;">
                <h2 id="coinShow" style="color:var(--gold); margin:0;">0</h2>
                <p style="font-size:11px; color:#777;">الكوينز</p>
            </div>
            <div style="flex:1; background:#111; padding:15px; border-radius:15px;">
                <h2 id="cashShow" style="color:var(--accent); margin:0;">0.00</h2>
                <p style="font-size:11px; color:#777;">الكاش (EGP)</p>
            </div>
        </div>
        <button onclick="logout()" style="width:100%; margin-top:30px; padding:12px; background:none; border:1px solid #333; color:#666; border-radius:10px;">خروج</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('homePage')">🏠</button>
    <button class="nav-btn upload-btn" onclick="triggerUpload()">+</button>
    <button class="nav-btn" onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639"; 
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = JSON.parse(localStorage.getItem('vtik_session'));

    window.onload = () => {
        if(user) {
            loadAppData();
        } else {
            // شاشة الدخول إذا لم تكن هناك جلسة
            document.body.innerHTML = '<div style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;"><div><h1>VTIK</h1><p>يرجى إعادة تحميل الصفحة لتسجيل الدخول</p></div></div>';
        }
    };

    async function loadAppData() {
        // تحديث بيانات البروفايل
        const { data: u } = await sb.from('vtik_users').select('*').eq('user_id', user.id.toString()).single();
        if(u) {
            document.getElementById('uName').innerText = u.username;
            document.getElementById('coinShow').innerText = u.coins_balance || 0;
            document.getElementById('cashShow').innerText = u.cash_balance || "0.00";
        }

        // جلب الفيديوهات
        const { data: vids } = await sb.from('vtik_videos').select('*').order('created_at', {ascending: false});
        if(vids && vids.length > 0) {
            const feed = document.getElementById('mainFeed');
            feed.innerHTML = vids.map(v => `
                <div class="video-container">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" loop playsinline controls></video>
                    <div class="side-icons">
                        <button class="icon-btn" onclick="handleLike(this)">❤️</button>
                        <button class="icon-btn">💬</button>
                    </div>
                </div>
            `).join('');
        }
    }

    function triggerUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'video/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('statusMsg').style.display = 'block';
            
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('video', file);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
                const data = await res.json();
                
                if(data.ok) {
                    const fileId = data.result.video.file_id;
                    await sb.from('vtik_videos').insert([{ url: fileId, user_id: user.id.toString() }]);
                    location.reload();
                } else {
                    alert("خطأ في الرفع: " + data.description);
                }
            } catch (err) {
                alert("فشل الاتصال بتليجرام");
            } finally {
                document.getElementById('statusMsg').style.display = 'none';
            }
        };
        input.click();
    }

    async function handleLike(btn) {
        if(btn.style.color === 'red') return;
        btn.style.color = 'red';
        
        let coins = parseInt(document.getElementById('coinShow').innerText) + 1;
        await sb.from('vtik_users').update({ coins_balance: coins }).eq('user_id', user.id.toString());
        document.getElementById('coinShow').innerText = coins;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
