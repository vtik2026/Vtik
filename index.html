<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | النسخة الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #FFF0F5; --header-bg: rgba(255, 255, 255, 0.9); --text: #333; --gold: #D4AF37; --accent: #FF1493; --card-bg: #fff; --gemini-grad: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); }
        .dark-mode { --bg: #121212; --header-bg: rgba(30, 30, 30, 0.95); --text: #f0f0f0; --card-bg: #1e1e1e; --gold: #FFD700; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow-x: hidden; }
        
        /* الهيدر */
        header { position: fixed; top: 0; width: 100%; background: var(--header-bg); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 2px solid var(--gold); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .logo-main { width: 45px; cursor: pointer; filter: drop-shadow(0 0 5px var(--gold)); }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 8px 0; font-weight: bold; }
        .tab { cursor: pointer; color: #999; font-size: 13px; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        #main-app { padding-top: 130px; padding-bottom: 90px; }
        .page-content { display: none; width: 100%; max-width: 450px; margin: 0 auto; animation: fadeIn 0.4s; }
        .active-page { display: block; }

        /* كارت الفيديو */
        .v-card { position: relative; width: 95%; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; height: 78vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .creator-tag { position: absolute; bottom: 30px; right: 20px; color: white; z-index: 10; font-weight: bold; text-shadow: 1px 1px 5px #000; cursor: pointer; }
        .side-actions { position: absolute; bottom: 100px; left: 15px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 10; text-align: center; }
        .side-actions i { font-size: 26px; cursor: pointer; transition: 0.2s; }
        .liked { color: #ff0050; transform: scale(1.2); }

        /* Popups */
        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-radius: 25px 25px 0 0; z-index: 11000; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .popup-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; }
        .grid-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .opt-item { cursor: pointer; font-size: 12px; }

        /* Gemini الصغير والشات */
        #gemini-trigger { position: fixed; bottom: 90px; right: 15px; width: 45px; height: 45px; background: var(--gemini-grad); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #gemini-chat-popup { display: none; position: fixed; top: 20%; left: 5%; right: 5%; background: var(--card-bg); border-radius: 20px; z-index: 12000; flex-direction: column; border: 2px solid #4285f4; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-area { height: 250px; padding: 15px; overflow-y: auto; font-size: 14px; }

        /* ناف بار سفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { color: var(--text); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body class="light-mode">

    <header>
        <div class="nav-top">
            <button onclick="toggleModal('auth-modal', true)" id="login-btn" style="background:var(--accent); color:white; border:none; border-radius:15px; padding:6px 18px; font-weight:bold; cursor:pointer;">دخول</button>
            <img src="logo.png" class="logo-main" onclick="toggleTheme()">
            <div style="color:var(--gold); font-weight:bold;">⭐ <span id="pts">150</span></div>
        </div>
        <div class="tabs">
            <div id="t-shorts" class="tab active" onclick="switchFeed('shorts')">Shorts ✨</div>
            <div id="t-vids" class="tab" onclick="switchFeed('vids')">فيديو 🎬</div>
            <div id="t-shops" class="tab" onclick="switchFeed('shops')">المتاجر 🛍️</div>
        </div>
    </header>

    <div id="main-app">
        <div id="page-home" class="page-content active-page">
            <div id="feed-container"></div>
        </div>
        <div id="page-likes" class="page-content">
            <h3 style="text-align:center;">المفضلة ❤️</h3>
            <div id="likes-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; padding:10px;"></div>
        </div>
    </div>

    <div id="gemini-chat-popup">
        <div style="background:var(--gemini-grad); color:white; padding:12px; border-radius:18px 18px 0 0; display:flex; justify-content:space-between;">
            <span>Gemini AI 🌟</span> <span onclick="toggleGeminiChat(false)" style="cursor:pointer;">✖</span>
        </div>
        <div class="chat-area" id="chat-box">أهلاً بك! اطلب مني تعديل فيديو، وصف، أو ميزة جديدة..</div>
        <div style="display:flex; border-top:1px solid #ddd; padding:10px;">
            <input type="text" id="chat-input" style="flex:1; border:none; outline:none; background:transparent; color:var(--text);" placeholder="اكتب طلبك هنا...">
            <button onclick="askGemini()" style="border:none; background:none; color:#4285f4;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="gemini-trigger" onclick="toggleGeminiChat(true)">
        <svg width="22" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z"/></svg>
    </div>

    <div id="gift-popup" class="popup">
        <div class="popup-header"><span>إرسال هدية 🎁</span> <span onclick="closePopup('gift-popup')">✖</span></div>
        <div class="grid-options">
            <div class="opt-item" onclick="sendGift('وردة')"><i class="fas fa-seedling" style="color:pink;"></i> وردة</div>
            <div class="opt-item" onclick="sendGift('جوهرة')"><i class="fas fa-gem" style="color:#00d2ff;"></i> جوهرة</div>
            <div class="opt-item" onclick="sendGift('تاج')"><i class="fas fa-crown" style="color:var(--gold);"></i> تاج</div>
            <div class="opt-item" onclick="sendGift('قلب')"><i class="fas fa-heart" style="color:red;"></i> قلب</div>
        </div>
    </div>

    <div id="share-popup" class="popup">
        <div class="popup-header"><span>مشاركة الفيديو 🔗</span> <span onclick="closePopup('share-popup')">✖</span></div>
        <div class="grid-options">
            <div class="opt-item" onclick="copyVideoLink()"><i class="fas fa-copy"></i> نسخ الرابط</div>
            <div class="opt-item" onclick="realShare('whatsapp')"><i class="fab fa-whatsapp" style="color:#25D366;"></i> واتساب</div>
            <div class="opt-item" onclick="realShare('facebook')"><i class="fab fa-facebook" style="color:#4267B2;"></i> فيسبوك</div>
            <div class="opt-item" onclick="realShare('twitter')"><i class="fab fa-twitter" style="color:#1DA1F2;"></i> تويتر</div>
        </div>
    </div>

    <div id="auth-modal" class="popup" style="bottom:20%; border-radius:25px; width:80%; left:10%; right:10%;">
        <div style="text-align:center;">
            <h3>تسجيل الدخول</h3>
            <button onclick="alert('Google Login...')" style="width:100%; padding:10px; background:#db4437; color:white; border:none; border-radius:10px; margin-bottom:10px;">Google</button>
            <button onclick="toggleModal('auth-modal', false)" style="background:none; border:none; color:#999;">إلغاء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="navTo('page-home')"><i class="fas fa-home"></i></div>
        <div class="nav-item"><i class="fas fa-search"></i></div>
        <div class="nav-item" style="background:#000; color:#fff; border-radius:12px; width:50px; height:35px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="navTo('page-likes')"><i class="fas fa-heart"></i></div>
        <div class="nav-item" onclick="navTo('page-profile')"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const client = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0');

    let currentFeed = 'shorts';
    let currentVideoUrl = '';
    let likedVideos = new Set();

    async function loadFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = '<p style="text-align:center; padding:50px;">جاري التحميل...</p>';
        const { data } = await client.from('videos').select('*').order('created_at', { ascending: false });
        container.innerHTML = '';
        
        data?.forEach(v => {
            if(currentFeed === 'shops' && !v.is_business) return;
            const isLiked = likedVideos.has(v.id) ? 'liked' : '';
            container.innerHTML += `
                <div class="v-card">
                    <div class="creator-tag" onclick="alert('فتح صفحة المبدع..')">@Vtik_Creator</div>
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-actions">
                        <i class="fas fa-heart ${isLiked}" id="heart-${v.id}" onclick="toggleLike('${v.id}', '${v.video_url}')"></i>
                        <i class="fas fa-gift" style="color:var(--gold)" onclick="openPopup('gift-popup')"></i>
                        <i class="fas fa-share" onclick="openShare('${v.video_url}')"></i>
                    </div>
                </div>`;
        });
    }

    function openShare(url) { currentVideoUrl = url; openPopup('share-popup'); }
    function copyVideoLink() { navigator.clipboard.writeText(currentVideoUrl); alert("تم نسخ رابط الفيديو! ✅"); closePopup('share-popup'); }
    
    function realShare(plat) {
        let link = "";
        if(plat === 'whatsapp') link = `https://api.whatsapp.com/send?text=${encodeURIComponent(currentVideoUrl)}`;
        if(plat === 'facebook') link = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentVideoUrl)}`;
        if(plat === 'twitter') link = `https://twitter.com/intent/tweet?url=${encodeURIComponent(currentVideoUrl)}`;
        window.open(link, '_blank');
        closePopup('share-popup');
    }

    function toggleLike(id, url) {
        const h = document.getElementById('heart-'+id);
        h.classList.toggle('liked');
        if(h.classList.contains('liked')) likedVideos.add(id); else likedVideos.delete(id);
    }

    function askGemini() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if(!input.value) return;
        box.innerHTML += `<div style="text-align:left; color:var(--accent); margin-bottom:10px;">أنت: ${input.value}</div>`;
        setTimeout(() => {
            box.innerHTML += `<div style="color:#4285f4; margin-bottom:10px;">Gemini: جاري تنفيذ طلبك [${input.value}] في قاعدة بيانات Vtik.. ✨</div>`;
            box.scrollTop = box.scrollHeight;
        }, 1000);
        input.value = "";
    }

    function toggleGeminiChat(show) { document.getElementById('gemini-chat-popup').style.display = show ? 'flex' : 'none'; }
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
    function openPopup(id) { document.getElementById(id).style.display = 'block'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    function navTo(page) { document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page')); document.getElementById(page).classList.add('active-page'); }
    function switchFeed(type) { currentFeed = type; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('t-' + type).classList.add('active'); loadFeed(); }
    function sendGift(g) { alert("تم إرسال هدية (" + g + ") لصاحب الفيديو بنجاح! 🎁"); closePopup('gift-popup'); }

    loadFeed();
</script>
</body>
    </html>
