<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #FFF0F5; --header-bg: rgba(255, 255, 255, 0.9); --text: #333; --gold: #D4AF37; --accent: #FF1493; --card-bg: #fff; --gemini-grad: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); }
        .dark-mode { --bg: #121212; --header-bg: rgba(30, 30, 30, 0.95); --text: #f0f0f0; --card-bg: #1e1e1e; --gold: #FFD700; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; background: var(--header-bg); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 2px solid var(--gold); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .logo-main { width: 55px; cursor: pointer; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; color: #999; padding-bottom: 5px; font-size: 13px; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        #main-app { padding-top: 135px; padding-bottom: 90px; }
        .page-content { display: none; width: 100%; max-width: 450px; margin: 0 auto; animation: slideIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes slideIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

        .v-card { position: relative; width: 95%; margin: 0 auto 20px; border-radius: 35px; overflow: hidden; background: #000; height: 75vh; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .side-actions { position: absolute; bottom: 80px; left: 15px; display: flex; flex-direction: column; gap: 22px; color: white; z-index: 10; text-shadow: 0 2px 4px #000; text-align: center; }
        .side-actions i { font-size: 28px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        /* تأثير القلب عند الضغط */
        .side-actions i.fa-heart.liked { color: #ff0050; transform: scale(1.2); }

        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-radius: 30px 30px 0 0; z-index: 11000; padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .grid-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .opt-item { cursor: pointer; color: var(--text); }
        .opt-item i { font-size: 24px; margin-bottom: 5px; display: block; }

        #gemini-trigger { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--gemini-grad); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9998; border: 2px solid white; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { color: var(--text); font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <button onclick="openModal('auth-modal')" style="background:var(--accent); color:white; border:none; border-radius:15px; padding:6px 18px; font-weight:bold;">دخول</button>
            <img src="logo.png" class="logo-main" onclick="toggleTheme()" title="تغيير الوضع">
            <div style="color:var(--gold); font-weight:bold;">⭐ <span id="pts">150</span></div>
        </div>
        <div class="tabs">
            <div id="t-shorts" class="tab active" onclick="switchFeed('shorts')">Shorts ✨</div>
            <div id="t-vids" class="tab" onclick="switchFeed('vids')">فيديو 🎬</div>
            <div id="t-shops" class="tab" onclick="switchFeed('shops')">المتاجر 🛍️</div>
        </div>
    </header>

    <div id="main-app">
        <div id="page-home" class="page-content active-page">
            <div id="feed-container"></div>
        </div>
        <div id="page-likes" class="page-content">
            <h3 style="text-align:center;">المفضلة ❤️</h3>
            <div id="likes-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; padding:10px;"></div>
        </div>
    </div>

    <div id="gift-popup" class="popup">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>أرسل هدية 🎁</b> <span onclick="closePopup('gift-popup')" style="cursor:pointer;">✖</span></div>
        <div class="grid-options">
            <div class="opt-item" onclick="sendGift('وردة')"><i class="fas fa-seedling" style="color:pink;"></i><span>وردة</span></div>
            <div class="opt-item" onclick="sendGift('جوهرة')"><i class="fas fa-gem" style="color:#00d2ff;"></i><span>جوهرة</span></div>
            <div class="opt-item" onclick="sendGift('تاج')"><i class="fas fa-crown" style="color:var(--gold);"></i><span>تاج</span></div>
            <div class="opt-item" onclick="sendGift('نار')"><i class="fas fa-fire" style="color:orange;"></i><span>نار</span></div>
        </div>
    </div>

    <div id="share-popup" class="popup">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>مشاركة 🔗</b> <span onclick="closePopup('share-popup')" style="cursor:pointer;">✖</span></div>
        <div class="grid-options">
            <div class="opt-item" onclick="copyLink()"><i class="fas fa-link"></i><span>نسخ</span></div>
            <div class="opt-item" onclick="shareTo('WhatsApp')"><i class="fab fa-whatsapp" style="color:#25D366;"></i><span>واتساب</span></div>
            <div class="opt-item" onclick="shareTo('Facebook')"><i class="fab fa-facebook" style="color:#4267B2;"></i><span>فيسبوك</span></div>
            <div class="opt-item" onclick="shareTo('Telegram')"><i class="fab fa-telegram" style="color:#0088cc;"></i><span>تليجرام</span></div>
        </div>
    </div>

    <div id="gemini-trigger" onclick="alert('شات Gemini قيد التشغيل.. اطلب ما تريد!')">
        <svg width="30" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z"/></svg>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('page-home',0)"><i class="fas fa-home"></i></div>
        <div class="nav-item"><i class="fas fa-search"></i></div>
        <div class="nav-item" style="background:#000; color:#fff; border-radius:12px; width:50px; height:35px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="navTo('page-likes',3)"><i class="fas fa-heart"></i></div>
        <div class="nav-item"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const client = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0');

    let currentFeed = 'shorts';
    let likedVideos = new Set();

    async function loadFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = '<p style="text-align:center; padding:50px;">جاري التحميل...</p>';
        const { data } = await client.from('videos').select('*').order('created_at', { ascending: false });
        container.innerHTML = '';
        
        data?.forEach(v => {
            // فلترة بسيطة للتبويبات
            if(currentFeed === 'shops' && !v.is_business) return;
            if(currentFeed === 'vids' && !v.is_long) return;

            const isLiked = likedVideos.has(v.id) ? 'liked' : '';
            container.innerHTML += `
                <div class="v-card">
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-actions">
                        <i class="fas fa-heart ${isLiked}" id="heart-${v.id}" onclick="toggleLike('${v.id}', '${v.video_url}')"></i>
                        <i class="fas fa-gift" style="color:var(--gold)" onclick="openPopup('gift-popup')"></i>
                        <i class="fas fa-share" onclick="openPopup('share-popup')"></i>
                    </div>
                </div>`;
        });
    }

    function toggleLike(id, url) {
        const h = document.getElementById('heart-'+id);
        const grid = document.getElementById('likes-grid');
        
        if(!h.classList.contains('liked')) {
            h.classList.add('liked');
            likedVideos.add(id);
            // إضافة كارت صغير لصفحة المفضلة
            grid.innerHTML += `<div id="fav-${id}" style="aspect-ratio:9/16; background:#000; border-radius:10px; overflow:hidden;"><video src="${url}" style="width:100%; height:100%; object-fit:cover;"></video></div>`;
        } else {
            h.classList.remove('liked');
            likedVideos.delete(id);
            document.getElementById('fav-'+id)?.remove();
        }
    }

    function switchFeed(type) {
        currentFeed = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + type).classList.add('active');
        loadFeed();
    }

    function navTo(page, idx) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
        document.getElementById(page).classList.add('active-page');
    }

    function openPopup(id) { document.getElementById(id).style.display = 'block'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    function copyLink() { navigator.clipboard.writeText(window.location.href); closePopup('share-popup'); }
    function shareTo(plat) { alert("مشاركة عبر " + plat); closePopup('share-popup'); }
    function sendGift(g) { alert("شكراً! تم إرسال " + g); closePopup('gift-popup'); }

    loadFeed();
</script>
</body>
                                                                  </html>
