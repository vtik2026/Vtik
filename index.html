<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik | التجربة الملكية 🇪🇬</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --egy-red: #CE1126;
            --egy-gold: #C09304;
            --bg-color: #050505; 
            --text-color: #ffffff;
            --card-bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --card-bg: #f9f9f9;
            --glass: rgba(0, 0, 0, 0.05);
        }

        body { 
            margin: 0; background-color: var(--bg-color); color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; 
        }
        
        /* الهيدر العلوي بتصميم الشعار الجديد */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: linear-gradient(to bottom, var(--bg-color), transparent);
        }

        .vtik-royal-logo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 180px; 
            cursor: pointer;
            transition: 0.3s;
        }

        .royal-logo-wings {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(192, 147, 4, 0.6));
        }

        .logo-text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            font-family: 'Arial Black', sans-serif;
            font-size: 22px;
            font-weight: 900;
        }

        .t-red { color: var(--egy-red); text-shadow: 0 0 10px #ff0000; }
        .i-white { color: #ffffff; -webkit-text-stroke: 1px #000; }
        .k-black { color: #000000; -webkit-text-stroke: 0.5px #fff; }

        .tabs { display: flex; gap: 10px; background: var(--glass); padding: 5px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid var(--egy-gold); }
        .tab-btn { 
            background: transparent; border: none; color: var(--text-color); padding: 8px 20px; 
            cursor: pointer; font-weight: bold; border-radius: 25px; transition: 0.3s; font-size: 13px;
        }
        .tab-btn.active { background: var(--egy-red); color: white; box-shadow: 0 0 15px var(--egy-red); }

        /* منطقة الفيديو */
        .video-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-feed::-webkit-scrollbar { display: none; }
        
        .video-card { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: var(--card-bg); }
        video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }

        /* الأزرار الجانبية */
        .side-info { position: absolute; bottom: 100px; left: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .action-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .icon-btn { 
            width: 50px; height: 50px; background: var(--glass); 
            border: 1.5px solid var(--egy-gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; transition: 0.3s; color: var(--egy-gold); backdrop-filter: blur(5px);
        }
        .icon-btn:hover { background: var(--egy-red); color: white; transform: scale(1.1); border-color: white; }
        .count-label { font-size: 12px; font-weight: bold; color: var(--text-color); }
        
        .video-details { position: absolute; bottom: 40px; right: 20px; text-align: right; max-width: 70%; pointer-events: none; }
        .time-tag { font-size: 11px; color: var(--egy-gold); font-weight: bold; margin-bottom: 5px; }
        .caption { font-size: 16px; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .btn-upload { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--egy-red); border: 2px solid white; width: 60px; height: 60px; 
            border-radius: 50%; color: white; font-size: 30px; cursor: pointer;
            box-shadow: 0 0 25px rgba(206, 17, 38, 0.6); z-index: 1001; transition: 0.3s;
        }

        .auth-overlay { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-login { 
            background: white; color: black; padding: 12px 25px; border-radius: 30px; 
            border: none; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-overlay" style="display: none;">
    <div class="vtik-royal-logo-container" style="width: 250px; margin-bottom: 30px;">
        <img src="logo.png" class="royal-logo-wings">
        <div class="logo-text-overlay" style="font-size: 32px;">
            <span class="t-red">T</span><span class="i-white">i</span><span class="k-black">k</span>
        </div>
    </div>
    <button class="btn-login" onclick="login()">
        <img src="https://www.google.com/favicon.ico" width="20"> الدخول بحساب جوجل
    </button>
</div>

<header id="app-header">
    <div class="vtik-royal-logo-container" ondblclick="toggleTheme()" title="اضغط مرتين لتغيير المود">
        <img src="logo.png" class="royal-logo-wings" onerror="this.src='https://via.placeholder.com/180x80/000/C09304?text=Vtik+Logo'">
        <div class="logo-text-overlay">
            <span class="t-red">T</span><span class="i-white">i</span><span class="k-black">k</span>
        </div>
    </div>
    <div class="tabs">
        <button id="tab-trending" class="tab-btn active" onclick="switchTab('trending')">الأعلى مشاهدة 🔥</button>
        <button id="tab-newest" class="tab-btn" onclick="switchTab('newest')">وصل حديثاً 🆕</button>
    </div>
</header>

<main class="video-feed" id="feed"></main>

<button id="upload-ui" class="btn-upload" onclick="document.getElementById('video-input').click()">+</button>
<input type="file" id="video-input" hidden accept="video/*" onchange="handleUpload(event)">

<script>
    const SB_URL = "https://adnoxldhqdjdfnghhsog.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let currentMode = 'trending';

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('vtik-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if(localStorage.getItem('vtik-theme') === 'light') document.body.classList.add('light-mode');

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) {
            document.getElementById('auth-screen').style.display = 'flex';
        } else {
            document.getElementById('auth-screen').style.display = 'none';
            loadVideos();
        }
    }

    async function login() {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: 'https://vtik2026.github.io/Vtik/' }
        });
    }

    async function loadVideos() {
        const feed = document.getElementById('feed');
        feed.innerHTML = '<div style="padding:100px; text-align:center;">جاري تحميل المتعة المصرية...</div>';

        let query = supabaseClient.from('clips').select('*');
        if (currentMode === 'trending') query = query.order('views_count', { ascending: false });
        else query = query.order('created_at', { ascending: false });

        const { data, error } = await query;

        if (data && data.length > 0) {
            feed.innerHTML = data.map(v => {
                const date = new Date(v.created_at).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
                return `
                    <div class="video-card">
                        <video src="${v.video_url}" loop playsinline onclick="togglePlay(this, '${v.id}')"></video>
                        <div class="video-details">
                            <div class="time-tag">نُشر في ${date}</div>
                            <div class="caption">${v.caption || 'فيديو رائع على Vtik'}</div>
                        </div>
                        <div class="side-info">
                            <div class="action-group">
                                <div class="icon-btn">⭐</div>
                                <span class="count-label">9.8</span>
                            </div>
                            <div class="action-group">
                                <div class="icon-btn">👁️</div>
                                <span class="count-label">${v.views_count || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } else {
            feed.innerHTML = '<div style="padding:100px; text-align:center;">لا يوجد فيديوهات بعد. كن أول من يرفع!</div>';
        }
    }

    function togglePlay(video, id) {
        if (video.paused) {
            video.play();
            supabaseClient.rpc('increment_views', { video_id: id });
        } else {
            video.pause();
        }
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-trending').classList.toggle('active', mode === 'trending');
        document.getElementById('tab-newest').classList.toggle('active', mode === 'newest');
        loadVideos();
    }

    async function handleUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const btn = document.getElementById('upload-ui');
        btn.innerText = "⏳";
        btn.disabled = true;

        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const fileName = `${user.id}/${Date.now()}.mp4`;
            const { error: upErr } = await supabaseClient.storage.from('videos').upload(fileName, file);
            if (upErr) throw upErr;
            const { data: urlData } = supabaseClient.storage.from('videos').getPublicUrl(fileName);
            await supabaseClient.from('clips').insert([{ 
                user_id: user.id, 
                video_url: urlData.publicUrl,
                caption: "فيديو جديد من مصر 🇪🇬"
            }]);
            alert("تم الرفع بنجاح! 🎉");
            window.location.reload();
        } catch (err) {
            alert("خطأ: " + err.message);
        } finally {
            btn.innerText = "+";
            btn.disabled = false;
        }
    }

    checkUser();
</script>
</body>
</html>
