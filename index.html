<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .page { position: fixed; inset: 0; display: none; background: #000; overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }
        
        /* حل مشكلة الشاشة السوداء */
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 50px; height: 50px; color: white; font-size: 22px; backdrop-filter: blur(10px); cursor: pointer; }
        
        #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; background: #000; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="loginPage" class="page active">
    <h1 style="color:var(--main)">VTIK</h1>
    <p>سجل دخولك عبر تليجرام للمتابعة</p>
    <div id="telegram-login-container"></div>
</div>

<div id="homePage" class="page">
    <div id="mainFeed"></div>
</div>

<div id="profilePage" class="page">
    <div style="padding: 20px; text-align: center;">
        <img id="userAvatar" src="" style="width: 80px; border-radius: 50%; border: 2px solid var(--accent); display: none;">
        <h3 id="userName">المستخدم</h3>
        <div style="background: #111; padding: 20px; border-radius: 15px; margin: 10px;">
            <p>الرصيد الكاش: <span id="cashBal" style="color:var(--gold); font-weight:bold;">0.00</span> EGP</p>
            <p>الكوينز: <span id="coinBal" style="color:var(--accent); font-weight:bold;">0</span> Coins</p>
        </div>
        <div id="myGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
    </div>
</div>

<nav class="nav-bar">
    <button onclick="showPage('homePage')">🏠</button>
    <button onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = JSON.parse(localStorage.getItem('vtik_user'));

    // وظيفة تسجيل دخول تليجرام الرسمي
    function onTelegramAuth(user) {
        localStorage.setItem('vtik_user', JSON.stringify(user));
        syncUserWithSupabase(user);
    }

    async function syncUserWithSupabase(user) {
        // تحديث أو إنشاء مستخدم في جدول vtik_users
        const { data, error } = await sb.from('vtik_users').upsert({
            user_id: user.id.toString(),
            username: user.first_name,
            avatar_url: user.photo_url,
        }, { onConflict: 'user_id' }).select().single();

        location.reload();
    }

    // إعداد الويدجيت
    window.onload = function() {
        if (!currentUser) {
            const script = document.createElement('script');
            script.src = "https://telegram.org/js/telegram-widget.js?22";
            script.setAttribute('data-telegram-login', 'YOUR_BOT_USERNAME'); // استبدل YOUR_BOT_USERNAME باسم بوتك (مثلاً vtik_bot)
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            script.setAttribute('data-request-access', 'write');
            document.getElementById('telegram-login-container').appendChild(script);
        } else {
            showPage('homePage');
            loadContent();
        }
    };

    async function loadContent() {
        // تحديث الأرصدة
        const { data: userData } = await sb.from('vtik_users').select('*').eq('user_id', currentUser.id.toString()).single();
        if(userData) {
            document.getElementById('cashBal').innerText = userData.cash_balance;
            document.getElementById('coinBal').innerText = userData.coins_balance;
            document.getElementById('userName').innerText = userData.username;
            if(userData.avatar_url) {
                document.getElementById('userAvatar').src = userData.avatar_url;
                document.getElementById('userAvatar').style.display = 'inline';
            }
        }

        // جلب الفيديوهات (حل مشكلة الفيديو)
        const { data: videos } = await sb.from('vtik_videos').select('*');
        if(videos) {
            document.getElementById('mainFeed').innerHTML = videos.map(v => `
                <div class="video-container">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" loop playsinline controls></video>
                    <div class="side-icons">
                        <button class="icon-btn" onclick="handleAction('${v.id}', 'like', this)">❤️</button>
                        <button class="icon-btn" onclick="handleAction('${v.id}', 'comment', this)">💬</button>
                        <button class="icon-btn" onclick="handleAction('${v.id}', 'share', this)">🔗</button>
                    </div>
                </div>
            `).join('');
        }
    }

    // وظيفة الأزرار (لايك، شير، تعليق) وتحديث الكوينز
    async function handleAction(videoId, type, btn) {
        if(btn.disabled) return;
        btn.disabled = true;
        btn.style.color = 'var(--main)';

        // 1. زيادة الكوينز في جدول vtik_users
        const { data: user } = await sb.from('vtik_users').select('coins_balance').eq('user_id', currentUser.id.toString()).single();
        let newCoins = (user.coins_balance || 0) + 1; // زيادة كوين واحد لكل حركة
        
        await sb.from('vtik_users').update({ coins_balance: newCoins }).eq('user_id', currentUser.id.toString());
        
        // 2. تسجيل العملية في جدول vtik_history
        await sb.from('vtik_history').insert({
            user_id: currentUser.id.toString(),
            type: 'كوينز',
            action: type,
            amount: 1
        });

        document.getElementById('coinBal').innerText = newCoins;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
