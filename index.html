<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO - المنصة المتكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-color: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        * { box-sizing: border-box; transition: 0.3s; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        /* الهوم - تغذية الفيديوهات */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #mainFeed::-webkit-scrollbar { display: none; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الأيقونات الجانبية */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; text-align: center; }
        .icon-group button { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; backdrop-filter: blur(10px); }
        .icon-group span { font-size: 12px; display: block; margin-top: 4px; font-weight: bold; }
        .btn-delete { color: #ff4d4d !important; border: 1px solid rgba(255,0,0,0.3) !important; }

        /* القائمة السفلية */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .nav-item.active { color: white; }
        .plus-btn { width: 50px; height: 32px; background: linear-gradient(to right, var(--accent), var(--main-color)); border-radius: 10px; color: black; font-weight: bold; font-size: 22px; border: none; cursor: pointer; }

        /* الصفحات (البروفايل / المحفظة) */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .wallet-card { background: linear-gradient(135deg, #1a1a1a, #000); padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance-val { font-size: 45px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btns button { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-deposit { background: var(--accent); color: black; }
        .btn-withdraw { background: #333; color: white; }

        /* محرر الفيديوهات (اللمسات الفنية) */
        #editorOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        .preview-box { flex: 1; border-radius: 15px; overflow: hidden; background: #111; margin-bottom: 20px; }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 15px; }
        .control-row { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex: 1; accent-color: var(--main-color); }

        /* شاشة التحميل الدائرية */
        #loader { position: fixed; top: 20px; left: 20px; z-index: 9000; display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 50px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="loader">⚙️ جاري الرفع... <span id="loadPercent">0%</span></div>

<div id="mainFeed"></div>

<div id="editorOverlay">
    <h2 style="text-align:center">تعديل الفيديو</h2>
    <div class="preview-box">
        <video id="editVideo" loop muted style="width:100%; height:100%; object-fit:contain;"></video>
    </div>
    <div class="controls">
        <div class="control-row"><span>إضاءة</span><input type="range" id="bright" min="50" max="150" value="100"></div>
        <div class="control-row"><span>تباين</span><input type="range" id="contrast" min="50" max="150" value="100"></div>
        <div class="control-row"><span>ألوان</span><input type="range" id="saturate" min="0" max="200" value="100"></div>
        <button onclick="startUpload()" style="width:100%; padding:15px; background:var(--main-color); color:white; border:none; border-radius:12px; font-weight:bold; font-size:18px;">نشر الآن ✅</button>
        <button onclick="location.reload()" style="width:100%; background:none; color:#888; border:none; margin-top:10px;">إلغاء</button>
    </div>
</div>

<div id="profilePage" class="page">
    <div class="wallet-card">
        <p style="margin:0; color:#888;">رصيد المحفظة الحالي</p>
        <div class="balance-val"><span id="userCash">0.00</span> <small style="font-size:16px">EGP</small></div>
        <p style="font-size:12px; color:var(--accent)">تحويل تلقائي: 1 كوينز = 5 قروش</p>
        <div class="action-btns">
            <button class="btn-deposit" onclick="walletAction('شحن')">إيداع رصيد</button>
            <button class="btn-withdraw" onclick="walletAction('سحب')">سحب كاش</button>
        </div>
    </div>
    <h3>فيديوهاتي</h3>
    <div id="myGrid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;"></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="location.reload()">🏠</button>
    <button class="plus-btn" onclick="triggerFile()">+</button>
    <button class="nav-item" onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639";

    let userID = localStorage.getItem('vtik_id') || "User_" + Math.floor(Math.random()*9999);
    localStorage.setItem('vtik_id', userID);

    let walletBalance = parseFloat(localStorage.getItem('vtik_wallet')) || 0.00;
    let allVids = [];
    let selectedFile = null;

    // --- نظام الفيديوهات ---
    async function loadAll() {
        const { data } = await sb.from('vtik_videos').select('*').order('created_at', { ascending: false });
        if(data) { allVids = data; renderFeed(); }
        updateWalletDisplay();
    }

    function renderFeed() {
        const feed = document.getElementById('mainFeed');
        feed.innerHTML = allVids.map(v => `
            <div class="video-container" id="card-${v.id}">
                <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.telegram_file_id}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                <div class="side-icons">
                    <div class="icon-group"><button onclick="addEarning(this)">❤️</button><span>${v.likes_count || 0}</span></div>
                    <div class="icon-group"><button onclick="addEarning(this)">💬</button><span>0</span></div>
                    <div class="icon-group"><button onclick="addEarning(this)">🔗</button><span>شير</span></div>
                    <div class="icon-group"><button class="btn-delete" onclick="deleteVid(${v.id})">×</button><span>حذف</span></div>
                </div>
            </div>
        `).join('');
        const observer = new IntersectionObserver(es => {
            es.forEach(e => { if(e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); });
        }, { threshold: 0.7 });
        document.querySelectorAll('video').forEach(v => observer.observe(v));
    }

    // --- المحفظة والأرباح ---
    function addEarning(btn) {
        btn.style.color = "var(--main-color)";
        walletBalance += 0.05;
        updateWalletDisplay();
        localStorage.setItem('vtik_wallet', walletBalance.toFixed(2));
    }

    function updateWalletDisplay() {
        document.getElementById('userCash').innerText = walletBalance.toFixed(2);
    }

    function walletAction(type) {
        let phone = prompt(`أدخل رقم الهاتف لعملية الـ ${type}:`);
        let amount = prompt(`أدخل القيمة المطلوب ${type}ها بالجنيه:`);
        if(phone && amount) alert(`تم إرسال طلب ${type} بقيمة ${amount} ج.م للرقم ${phone}. سيتم التنفيذ خلال 24 ساعة.`);
    }

    // --- نظام الرفع والتعديل ---
    function triggerFile() {
        let i = document.createElement('input'); i.type='file'; i.accept="video/*";
        i.onchange = e => {
            selectedFile = e.target.files[0];
            const url = URL.createObjectURL(selectedFile);
            const v = document.getElementById('editVideo');
            v.src = url; v.play();
            document.getElementById('editorOverlay').style.display = 'flex';
        };
        i.click();
    }

    // تطبيق الفلاتر برمجياً
    const v = document.getElementById('editVideo');
    ['bright', 'contrast', 'saturate'].forEach(id => {
        document.getElementById(id).oninput = () => {
            v.style.filter = `brightness(${document.getElementById('bright').value}%) contrast(${document.getElementById('contrast').value}%) saturate(${document.getElementById('saturate').value}%)`;
        };
    });

    async function startUpload() {
        document.getElementById('editorOverlay').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('video', selectedFile);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`);
        
        xhr.upload.onprogress = e => {
            let p = Math.round((e.loaded / e.total) * 100);
            document.getElementById('loadPercent').innerText = p + "%";
        };

        xhr.onload = async () => {
            const res = JSON.parse(xhr.responseText);
            if(res.ok) {
                await sb.from('vtik_videos').insert([{ telegram_file_id: res.result.video.file_id, user_id: userID }]);
                location.reload();
            } else { alert("خطأ في الرفع"); }
        };
        xhr.send(formData);
    }

    async function deleteVid(id) {
        if(confirm("حذف الفيديو من الموقع نهائياً؟")) {
            await sb.from('vtik_videos').delete().eq('id', id);
            document.getElementById(`card-${id}`).style.display = 'none';
        }
    }

    function showPage(id) {
        document.getElementById(id).style.display = 'block';
        if(id === 'profilePage') {
            const myVids = allVids.filter(v => v.user_id === userID);
            document.getElementById('myGrid').innerHTML = myVids.map(v => `
                <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.telegram_file_id}" style="width:100%; aspect-ratio:9/16; object-fit:cover; border-radius:8px;"></video>
            `).join('');
        }
    }

    window.onload = loadAll;
</script>
</body>
</html>
