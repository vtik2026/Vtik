<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK - النسخة الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tiktok-red: #fe2c55; --tiktok-blue: #25f4ee; --black: #010101; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }

        /* شاشة التحميل المصغرة (تسمح بتصفح الموقع) */
        #uploadWidget { 
            position: fixed; top: 20px; left: 20px; width: 80px; height: 80px; 
            background: rgba(0,0,0,0.8); border-radius: 50%; z-index: 10000; 
            display: none; align-items: center; justify-content: center; 
            border: 2px solid #333; backdrop-filter: blur(5px);
        }
        .circle-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #222; stroke-width: 4; }
        .circle-bar { fill: none; stroke: var(--tiktok-blue); stroke-width: 4; stroke-dasharray: 226; stroke-dashoffset: 226; transition: 0.3s; stroke-linecap: round; animation: colorSpin 4s infinite; }
        #percentText { position: absolute; font-size: 12px; font-weight: bold; }
        @keyframes colorSpin { 0% { stroke: #4285F4; } 25% { stroke: #EA4335; } 50% { stroke: #FBBC05; } 75% { stroke: #34A853; } 100% { stroke: #4285F4; } }

        /* التصميم الأساسي */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #mainFeed::-webkit-scrollbar { display: none; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 5000; }
        .plus-btn { width: 50px; height: 32px; background: linear-gradient(to right, var(--tiktok-blue), var(--tiktok-red)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 22px; cursor: pointer; }
        
        .side-icons { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 22px; }
    </style>
</head>
<body>

<div id="uploadWidget">
    <svg class="circle-svg" width="72" height="72">
        <circle class="circle-bg" cx="36" cy="36" r="32"></circle>
        <circle id="uploadCircle" class="circle-bar" cx="36" cy="36" r="32"></circle>
    </svg>
    <div id="percentText">0%</div>
</div>

<div id="mainFeed"></div>

<nav class="nav-bar">
    <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:25px;">🏠</button>
    <div class="plus-btn" id="upBtn">+</div>
    <button onclick="alert('الملف الشخصي')" style="background:none; border:none; color:white; font-size:25px;">👤</button>
</nav>

<script>
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639"; // القناة الخاصة بك

    let userID = localStorage.getItem('vtik_user_id') || "User" + Math.floor(Math.random()*999);
    localStorage.setItem('vtik_user_id', userID);

    async function fetchVids() {
        const { data } = await sb.from('vtik_videos').select('*').order('created_at', { ascending: false });
        if (data) render(data);
    }

    function render(vids) {
        document.getElementById('mainFeed').innerHTML = vids.map(v => `
            <div class="video-container">
                <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.telegram_file_id}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                <div class="side-icons">
                    <button class="icon-btn">❤️</button>
                    <button class="icon-btn">💬</button>
                </div>
            </div>`).join('');
        initObs();
    }

    // --- الرفع المباشر بدون Vercel ---
    document.getElementById('upBtn').onclick = () => {
        let inp = document.createElement('input'); inp.type='file'; inp.accept="video/*";
        inp.onchange = async e => {
            const file = e.target.files[0]; if(!file) return;

            const widget = document.getElementById('uploadWidget');
            const circle = document.getElementById('uploadCircle');
            const text = document.getElementById('percentText');
            
            widget.style.display = 'flex';

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('video', file);

            const xhr = new XMLHttpRequest();
            // الرفع مباشرة إلى خوادم تليجرام
            xhr.open('POST', `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`);

            // تحديث النسبة المئوية الحقيقية
            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    const offset = 226 - (percent / 100 * 226);
                    circle.style.strokeDashoffset = offset;
                    text.innerText = percent + "%";
                }
            };

            xhr.onload = async () => {
                const res = JSON.parse(xhr.responseText);
                if (res.ok) {
                    // حفظ file_id في قاعدة البيانات بعد نجاح الرفع
                    await sb.from('vtik_videos').insert([{ 
                        telegram_file_id: res.result.video.file_id, 
                        user_id: userID 
                    }]);
                    widget.style.display = 'none';
                    alert("تم النشر بنجاح!");
                    fetchVids();
                } else {
                    alert("فشل الرفع: " + res.description);
                    widget.style.display = 'none';
                }
            };

            xhr.onerror = () => { alert("خطأ في الاتصال"); widget.style.display = 'none'; };
            xhr.send(formData);
        };
        inp.click();
    };

    function initObs() {
        const obs = new IntersectionObserver(es => {
            es.forEach(e => { if(e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); });
        }, { threshold: 0.6 });
        document.querySelectorAll('video').forEach(v => obs.observe(v));
    }

    window.onload = fetchVids;
</script>
</body>
</html>
