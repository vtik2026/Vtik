<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .login-container { background: #121212; padding: 40px; border-radius: 20px; border: 1px solid #222; width: 85%; max-width: 400px; }
        h1 { color: #fe2c55; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>مرحباً بك في Vtik</h1>
        <p>سجل دخولك عبر تليجرام لرفع ومشاهدة الفيديوهات</p>
        
        <div id="telegram-login-box">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="videotikEG_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>
    </div>

    <script type="text/javascript">
      function onTelegramAuth(user) {
        // حفظ بيانات المستخدم في ذاكرة المتصفح لكي تستخدمها صفحة البروفايل
        localStorage.setItem('vtik_session', JSON.stringify(user));
        // الانتقال التلقائي لصفحة البروفايل بعد النجاح
        window.location.href = 'profile.html';
      }

      // تأمين إضافي: لو المستخدم مسجل دخول بالفعل، ابعته للبروفايل فوراً
      if (localStorage.getItem('vtik_session')) {
          window.location.href = 'profile.html';
      }
    </script>
</body>
</html>
