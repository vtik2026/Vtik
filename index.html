<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tik | Vtik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-color: #fe2c55; --bg-black: #010101; }
        body { margin: 0; background-color: var(--bg-black); color: white; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 0.5px solid #333; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--main-color); }
        .video-feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { height: calc(100vh - 60px); scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-google { background: white; color: black; display: flex; align-items: center; gap: 8px; }
        .btn-upload { background: var(--main-color); color: white; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 50px; padding: 12px 35px; font-size: 24px; z-index: 1001; display: none; box-shadow: 0 4px 20px rgba(254, 44, 85, 0.5); }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--main-color); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Video Tik</div>
        <div id="auth-section">
            <button class="btn btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" width="16"> دخول بجوجل
            </button>
        </div>
    </header>

    <main class="video-feed" id="feed">
        <div class="video-card">
            <div style="text-align:center">
                <h2>جاهز للتشغيل على GitHub 🚀</h2>
                <p>سجل دخولك الآن لتجربة النسخة النهائية</p>
            </div>
        </div>
    </main>

    <input type="file" id="video-input" hidden accept="video/*" onchange="handleFile(event)">
    <button id="upload-btn" class="btn btn-upload" onclick="document.getElementById('video-input').click()">+</button>
</div>

<script>
    // --- بياناتك الحقيقية والمفاتيح ---
    const SB_URL = "https://adnoxldhqdjdfnghhsog.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0";
    const GITHUB_URL = "https://vtik2026.github.io/Vtik/"; // الرابط الإجباري للعودة

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            document.getElementById('auth-section').innerHTML = `
                <div class="user-profile">
                    <img src="${user.user_metadata.avatar_url}" class="user-img">
                    <button class="btn" onclick="logout()" style="background:transparent; color:#888;">خروج</button>
                </div>`;
            document.getElementById('upload-btn').style.display = 'block';
            loadVideos();
        }
    }

    async function login() {
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { 
                // هنا التعديل الجوهري: حددنا الرابط يدوياً
                redirectTo: GITHUB_URL 
            }
        });
        if (error) alert("خطأ: " + error.message);
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const btn = document.getElementById('upload-btn');
        btn.innerText = "...⏳";
        btn.disabled = true;

        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const filePath = `${user.id}/${Date.now()}_video.mp4`;
            const { error: upErr } = await supabaseClient.storage.from('videos').upload(filePath, file);
            if (upErr) throw upErr;
            const { data: urlData } = supabaseClient.storage.from('videos').getPublicUrl(filePath);
            await supabaseClient.from('clips').insert([{ user_id: user.id, video_url: urlData.publicUrl }]);
            alert("تم الرفع!");
            window.location.reload();
        } catch (e) {
            alert("خطأ: " + e.message);
        } finally {
            btn.innerText = "+";
            btn.disabled = false;
        }
    }

    async function loadVideos() {
        const { data } = await supabaseClient.from('clips').select('*').order('created_at', { ascending: false });
        if (data && data.length > 0) {
            document.getElementById('feed').innerHTML = data.map(v => `
                <div class="video-card">
                    <video src="${v.video_url}" controls loop playsinline></video>
                </div>
            `).join('');
        }
    }

    checkUser();
</script>

</body>
</html>
