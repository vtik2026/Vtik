<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | النسخة الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #FFF0F5; --text: #333; --gold: #D4AF37; --accent: #FF1493; --card: #fff; --gemini: linear-gradient(135deg, #4285f4, #9b72cb); }
        .dark-mode { --bg: #121212; --text: #f0f0f0; --card: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow: hidden; }

        header { position: fixed; top: 0; width: 100%; background: var(--card); z-index: 1000; border-bottom: 2px solid var(--gold); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; opacity: 0.5; font-size: 13px; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }

        .page { display: none; padding: 120px 0 85px; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .page.active { display: block; }

        .v-card { position: relative; width: 95%; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; height: 78vh; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        /* الوضع السينمائي */
        .cinema header, .cinema .bottom-nav, .cinema .side-actions, .cinema #gemini-trigger { opacity: 0; pointer-events: none; }
        .cinema .v-card { height: 100vh; width: 100vw; border-radius: 0; margin: 0; position: fixed; top: 0; left: 0; z-index: 5000; }

        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); border-radius: 30px 30px 0 0; z-index: 11000; padding: 25px; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); }
        .side-actions { position: absolute; bottom: 100px; left: 15px; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        #gemini-chat { display: none; position: fixed; top: 10%; left: 5%; right: 5%; bottom: 15%; background: var(--card); border-radius: 25px; z-index: 12000; flex-direction: column; border: 2px solid #4285f4; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <button onclick="openPopup('auth-popup')" id="auth-btn" style="background:var(--accent); color:white; border:none; border-radius:12px; padding:6px 18px;">دخول</button>
            <img src="logo.png" width="45" onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer">
            <div style="color:var(--gold);">⭐ <span id="stars-count">0</span></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab(this, 'shorts')">Shorts</div>
            <div class="tab" onclick="switchTab(this, 'video')">Video</div>
            <div class="tab" onclick="switchTab(this, 'merchant')">Merchant</div>
        </div>
    </header>

    <div id="page-home" class="page active"><div id="feed"></div></div>
    <div id="page-favs" class="page" style="padding:130px 20px;"><h3>المفضلة ❤️</h3></div>
    <div id="page-add" class="page" style="padding-top:200px; text-align:center;">
        <h3>رفع محتوى 📤</h3>
        <button style="padding:15px 30px; border-radius:15px; background:#000; color:#fff;">اختر فيديو</button>
    </div>
    <div id="page-profile" class="page" style="padding:130px 20px; text-align:center;">
        <div id="user-info">سجل دخولك لرؤية حسابك</div>
    </div>

    <div id="auth-popup" class="popup">
        <div style="text-align:center; margin-bottom:15px;"><img src="logo.png" width="50"><br><b>Vtik Login</b></div>
        <div id="login-form">
            <input type="text" id="phone" placeholder="رقم الهاتف" style="width:90%; padding:12px; margin:5px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="pass" placeholder="كلمة المرور" style="width:90%; padding:12px; margin:5px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="loginWithPhone()" style="width:95%; padding:12px; background:var(--accent); color:white; border:none; border-radius:10px;">دخول</button>
            <p onclick="openPopup('secure-popup')" style="text-align:center; color:var(--gold); font-size:12px; cursor:pointer;">هل تريد تأمين الحساب بإيميل حقيقي؟</p>
        </div>
        <div style="display:flex; justify-content:center; gap:30px; margin-top:20px; font-size:35px;">
            <i class="fab fa-google" style="color:#db4437; cursor:pointer;" onclick="socialLogin('google')"></i>
            <i class="fab fa-facebook" style="color:#4267B2; cursor:pointer;" onclick="socialLogin('facebook')"></i>
        </div>
        <button onclick="closePopup('auth-popup')" style="width:100%; margin-top:20px; border:none; background:none; color:#999;">إغلاق</button>
    </div>

    <div id="gemini-chat">
        <div style="background:var(--gemini); color:white; padding:15px; border-radius:25px 25px 0 0; display:flex; justify-content:space-between;">
            <b>Gemini AI Assistant ✨</b> <span onclick="toggleGemini(false)">✖</span>
        </div>
        <div id="chat-box" style="flex:1; padding:15px; overflow-y:auto; font-size:13px;">
            مرحباً! يمكنني تغيير ألوان الموقع أو إضافة تعليقات. تعديل الفيديو متاح لصاحبه فقط.
        </div>
        <div style="padding:10px; border-top:1px solid #ddd; display:flex;">
            <input type="text" id="g-input" style="flex:1; border:none; outline:none;" placeholder="اطلب أمر برمجياً...">
            <button onclick="execGemini()" style="background:none; border:none; color:#4285f4;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="gemini-trigger" onclick="toggleGemini(true)" style="position:fixed; bottom:90px; right:15px; width:45px; height:45px; background:var(--gemini); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; z-index:3000;">✨</div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')"><i class="fas fa-home"></i></div>
        <div onclick="showPage('favs')"><i class="fas fa-heart"></i></div>
        <div onclick="showPage('add')" style="background:#000; color:#fff; border-radius:10px; width:42px; height:30px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
        <div onclick="showPage('profile')"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const client = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0');

    async function socialLogin(provider) {
        await client.auth.signInWithOAuth({ provider: provider });
    }

    async function loginWithPhone() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const { error } = await client.auth.signInWithPassword({ email: phone + "@vtik.com", password: pass });
        if(error) alert("خطأ: " + error.message); else location.reload();
    }

    async function loadFeed() {
        const { data } = await client.from('videos').select('*, profiles(username)');
        document.getElementById('feed').innerHTML = data.map(v => `
            <div class="v-card">
                <div style="position:absolute; top:20px; right:20px; color:white; z-index:10;">@${v.profiles?.username}</div>
                <video src="${v.video_url}" loop playsinline onclick="document.body.classList.toggle('cinema')"></video>
                <div class="side-actions">
                    <i class="fas fa-heart"></i>
                    <i class="fas fa-gift" style="color:var(--gold)" onclick="alert('فتح هدايا...')"></i>
                    <i class="fas fa-share" onclick="navigator.share({url:'${v.video_url}'})"></i>
                </div>
            </div>`).join('');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }

    function toggleGemini(s) { document.getElementById('gemini-chat').style.display = s?'flex':'none'; }
    function openPopup(id) { document.getElementById(id).style.display = 'block'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }

    loadFeed();
</script>
</body>
</html>
