<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | النسخة المعتمدة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #FFF0F5; --text: #333; --gold: #D4AF37; --accent: #FF1493; --card: #fff; --gemini: linear-gradient(135deg, #4285f4, #9b72cb); }
        .dark-mode { --bg: #121212; --text: #f0f0f0; --card: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow: hidden; }

        /* الهيدر والناف بار (نقطة 1، 2، 3) */
        header { position: fixed; top: 0; width: 100%; background: var(--card); z-index: 1000; border-bottom: 2px solid var(--gold); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; opacity: 0.5; font-size: 13px; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }

        /* الصفحات والتنقل (نقطة 5، 6، 7، 8) */
        .page { display: none; padding: 120px 0 85px; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .page.active { display: block; }

        /* كروت الفيديوهات والوضع السينمائي */
        .v-card { position: relative; width: 95%; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; height: 78vh; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .side-actions { position: absolute; bottom: 100px; left: 15px; display: flex; flex-direction: column; gap: 25px; color: white; text-align: center; z-index: 10; }
        .side-actions i { font-size: 28px; cursor: pointer; text-shadow: 0 2px 4px #000; }

        /* بوب آب الدخول والهدايا (نقطة 1، 9) */
        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); border-radius: 30px 30px 0 0; z-index: 11000; padding: 25px; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .auth-form input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; }
        
        /* Gemini (نقطة 4) */
        #gemini-chat { display: none; position: fixed; top: 10%; left: 5%; right: 5%; bottom: 15%; background: var(--card); border-radius: 25px; z-index: 12000; flex-direction: column; border: 2px solid #4285f4; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        
        /* تأثير الوضع السينمائي */
        .cinema header, .cinema .bottom-nav, .cinema .side-actions, .cinema #gemini-trigger { opacity: 0; pointer-events: none; }
        .cinema .v-card { height: 100vh; width: 100vw; border-radius: 0; margin: 0; position: fixed; top: 0; left: 0; z-index: 5000; }
        .cinema video { object-fit: contain; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <button onclick="openPopup('auth-popup')" style="background:var(--accent); color:white; border:none; border-radius:12px; padding:6px 18px; font-weight:bold;">دخول</button>
            <img src="logo.png" width="45" onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer" title="تغيير المود">
            <div style="color:var(--gold);">⭐ <span id="stars-count">0</span></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab(this, 'shorts')">Shorts</div>
            <div class="tab" onclick="switchTab(this, 'video')">Video</div>
            <div class="tab" onclick="switchTab(this, 'merchant')">Merchant</div>
        </div>
    </header>

    <div id="page-home" class="page active"><div id="feed"></div></div>
    <div id="page-favs" class="page"><h3 style="text-align:center;">المفضلة ❤️</h3><div id="fav-feed"></div></div>
    <div id="page-add" class="page" style="text-align:center; padding-top:150px;">
        <h3>رفع فيديو أو صورة 📤</h3>
        <button onclick="alert('فتح معرض الصور...')" style="padding:20px 40px; border-radius:20px; background:#000; color:#fff;">اختر ملف</button>
    </div>
    <div id="page-profile" class="page" style="text-align:center; padding-top:50px;">
        <div id="user-header"></div>
        <hr>
        <div id="user-vids-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:2px;"></div>
    </div>

    <div id="auth-popup" class="popup">
        <div style="text-align:center; margin-bottom:15px;"><img src="logo.png" width="50"><br><b>تسجيل الدخول</b></div>
        <div class="auth-form">
            <input type="text" id="login-phone" placeholder="رقم الهاتف">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:12px; margin-top:10px;">دخول</button>
            <div style="display:flex; justify-content:center; gap:25px; margin-top:15px; font-size:30px;">
                <i class="fab fa-google" style="color:#db4437; cursor:pointer;" onclick="alert('Google Login...')"></i>
                <i class="fab fa-facebook" style="color:#4267B2; cursor:pointer;" onclick="alert('FB Login...')"></i>
            </div>
        </div>
        <button onclick="closePopup('auth-popup')" style="width:100%; background:none; border:none; color:#999; margin-top:20px;">إغلاق</button>
    </div>

    <div id="gemini-chat">
        <div style="background:var(--gemini); color:white; padding:15px; border-radius:25px 25px 0 0; display:flex; justify-content:space-between;">
            <b>Gemini Assistant</b> <span onclick="toggleGemini(false)">✖</span>
        </div>
        <div style="background:#fff3cd; padding:8px; font-size:11px; text-align:center; color:#856404;">
            تنبيه: يمكنني تغيير الألوان وإضافة تعليقات ذكية. تعديل الفيديو متاح لصاحبه فقط.
        </div>
        <div id="chat-box" style="flex:1; padding:15px; overflow-y:auto;"></div>
        <div style="padding:10px; border-top:1px solid #ddd; display:flex;">
            <input type="text" id="g-input" style="flex:1; border:none; outline:none;" placeholder="اطلب أمر برمجياً...">
            <button onclick="execGemini()" style="background:none; border:none; color:#4285f4;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="gift-popup" class="popup">
        <h3 style="text-align:center;">إرسال هدية 🎁</h3>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center;">
            <div onclick="sendGift('وردة', 0)" style="border:1px solid #eee; padding:10px; border-radius:15px; cursor:pointer;">🌹<br><small>مجاني</small></div>
            <div onclick="sendGift('جوهرة', 50)" style="border:1px solid #eee; padding:10px; border-radius:15px; cursor:pointer;">💎<br><small>50⭐</small></div>
            <div onclick="sendGift('تاج', 100)" style="border:1px solid #eee; padding:10px; border-radius:15px; cursor:pointer;">👑<br><small>100⭐</small></div>
        </div>
        <button onclick="closePopup('gift-popup')" style="width:100%; margin-top:20px; border:none; background:none; color:#999;">إغلاق</button>
    </div>

    <div id="gemini-trigger" onclick="toggleGemini(true)" style="position:fixed; bottom:90px; right:15px; width:45px; height:45px; background:var(--gemini); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; z-index:3000; box-shadow:0 4px 10px rgba(0,0,0,0.2);">✨</div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')"><i class="fas fa-home"></i></div>
        <div onclick="showPage('favs')"><i class="fas fa-heart"></i></div>
        <div onclick="showPage('add')" style="background:#000; color:#fff; border-radius:10px; width:42px; height:30px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
        <div onclick="showPage('profile')"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const client = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0');
    
    let user = null;

    async function init() {
        const { data: { user: u } } = await client.auth.getUser();
        user = u;
        loadFeed();
    }

    // نقطة 10: شير ذكي وشامل
    async function shareVideo(url) {
        if (navigator.share) {
            navigator.share({ title: 'Vtik Video', url: url });
        } else {
            navigator.clipboard.writeText(url);
            alert("تم نسخ رابط الفيديو! ✅");
        }
    }

    // التنقل بين الصفحات
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        if(document.body.classList.contains('cinema')) document.body.classList.remove('cinema');
    }

    function switchTab(el, type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        loadFeed(); // يمكن إضافة فلترة هنا بناءً على الـ type
    }

    async function loadFeed() {
        const { data } = await client.from('videos').select('*, profiles(username)');
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(v => `
            <div class="v-card">
                <div style="position:absolute; top:20px; right:20px; color:white; z-index:10; font-weight:bold; cursor:pointer;" onclick="showPage('profile')">@${v.profiles?.username || 'user'}</div>
                <video src="${v.video_url}" loop playsinline onclick="document.body.classList.toggle('cinema')"></video>
                <div class="side-actions">
                    <i class="fas fa-heart" onclick="this.style.color='#ff1493'"></i>
                    <i class="fas fa-gift" style="color:var(--gold)" onclick="openPopup('gift-popup')"></i>
                    <i class="fas fa-share" onclick="shareVideo('${v.video_url}')"></i>
                </div>
            </div>`).join('');
    }

    function execGemini() {
        const cmd = document.getElementById('g-input').value;
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div>أنت: ${cmd}</div>`;
        if(cmd.includes("ليل")) { document.body.classList.add('dark-mode'); box.innerHTML += `<div>Gemini: تم تفعيل الوضع الليلي 🌙</div>`; }
        else { box.innerHTML += `<div>Gemini: جاري معالجة طلبك...</div>`; }
        document.getElementById('g-input').value = "";
    }

    function openPopup(id) { document.getElementById(id).style.display = 'block'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }
    function toggleGemini(s) { document.getElementById('gemini-chat').style.display = s?'flex':'none'; }

    init();
</script>
</body>
</html>
