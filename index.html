<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTik - مونديال الفراعنة 2026</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome لأيقونات كأس العالم -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --egypt-red: #c8102e;
            --egypt-gold: #c5a059;
            --worldcup-green: #107a3e;
            --dark-bg: #0b0c10;
            --card-bg: #1f2833;
            --gold: #FFD700;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* واجهة دخول فرعونية تليق بمنتخب مصر */
        #loginWall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000 30%, var(--egypt-red) 85%, var(--egypt-gold) 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #loginWall::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 80%);
            pointer-events: none;
        }

        .login-box {
            padding: 40px 20px;
            background: rgba(31, 40, 51, 0.85);
            border: 2px solid var(--egypt-gold);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            z-index: 1;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .pharaoh-logo {
            font-size: 4rem;
            color: var(--egypt-gold);
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.6);
            margin-bottom: 10px;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            color: #fff;
        }

        .login-box p {
            font-size: 0.9rem;
            color: var(--egypt-gold);
            margin-bottom: 25px;
        }

        /* التطبيق الرئيسي والمحتوى القابل للتمرير */
        #mainApp {
            position: relative;
            z-index: 2;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* القائمة الرئيسية السفلى المونديالية */
        .nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #000, var(--card-bg));
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid var(--egypt-gold);
            z-index: 100;
        }

        .nav-item {
            color: #aaa;
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--egypt-gold);
            text-shadow: 0 0 10px var(--egypt-gold);
        }

        .app-page {
            display: none;
        }

        .app-page.active {
            display: block;
        }

        .section-title {
            text-align: center;
            color: #fff;
            border-bottom: 2px solid var(--egypt-gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* كروت الأقسام */
        .wc-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--egypt-red);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .category-btn {
            background: linear-gradient(45deg, var(--card-bg), #2d3748);
            border: 1px solid var(--egypt-gold);
            color: #fff;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .category-btn:hover {
            background: var(--egypt-red);
            border-color: #fff;
        }

        /* نظام التوقعات الذكي */
        .match-box {
            background: #151c24;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .match-teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }

        .team {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .vs {
            color: var(--egypt-red);
            font-style: italic;
            font-weight: bold;
        }

        .predict-options {
            display: flex;
            gap: 10px;
        }

        .predict-btn {
            flex: 1;
            background: #2d3748;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .predict-btn:hover:not(:disabled) {
            background: var(--egypt-gold);
            color: #000;
        }

        .predict-btn:disabled {
            background: #1a1f26;
            color: #555;
            cursor: not-allowed;
        }

        .match-status-msg {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 8px;
            color: #ff4d4d;
        }

        .spin-btn {
            background: linear-gradient(45deg, var(--egypt-red), var(--egypt-gold));
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(200,16,46,0.5);
        }

        .spin-btn:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- خلفية النجوم المتحركة -->
    <canvas id="starCanvas"></canvas>

    <!-- شاشة تسجيل الدخول بالتليجرام -->
    <div id="loginWall">
        <div class="login-box">
            <div class="pharaoh-logo">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <h1>منصة VTIK المونديالية</h1>
            <p>شجع الفراعنة، توقع واربح آلاف الكوينز يومياً!</p>
            
            <!-- زر الودجت الرسمي لتليجرام -->
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="videotikEG_bot" 
                    data-size="large" 
                    data-radius="10" 
                    data-onauth="onTelegramAuth" 
                    data-request-access="write"></script>
        </div>
    </div>

    <!-- التطبيق الرئيسي بعد نجاح تسجيل الدخول -->
    <div id="mainApp">
        <div class="app-content">
            
            <!-- صفحة 1: المسابقات والتوقعات القائمة على الوقت -->
            <div id="page-tasks" class="app-page active">
                <h2 class="section-title"><i class="fa-solid fa-soccer-ball"></i> مسابقة مونديال 2026</h2>
                
                <div class="wc-card">
                    <h3>🏆 اختبر معلوماتك الكروية</h3>
                    <p>اختر قسماً للإجابة على سؤال عشوائي واربح 200 كوينز فوراً!</p>
                    <div id="quiz-selection">
                        <button class="category-btn" onclick="startQuiz('players')"><span>⚽ قسم اللاعبين والأساطير</span> <i class="fa-solid fa-chevron-left"></i></button>
                        <button class="category-btn" onclick="startQuiz('teams')"><span>🌍 قسم المنتخبات والأندية</span> <i class="fa-solid fa-chevron-left"></i></button>
                        <button class="category-btn" onclick="startQuiz('stadiums')"><span>🏟️ قسم الملاعب والتنظيم</span> <i class="fa-solid fa-chevron-left"></i></button>
                    </div>

                    <div id="quiz-container" style="display: none; text-align: center;">
                        <h4 id="quiz-question-text" style="color: #fff; font-size: 1.2rem; margin-bottom: 20px;"></h4>
                        <div id="quiz-options-box"></div>
                    </div>
                </div>

                <h2 class="section-title"><i class="fa-solid fa-bolt"></i> بورصة التوقعات المباشرة</h2>
                <div id="matches-container"></div>
            </div>

            <!-- صفحة 2: كوكب الحظ المتحرك -->
            <div id="page-wheel" class="app-page">
                <h2 class="section-title"><i class="fa-solid fa-earth-africa"></i> كوكب الحظ المونديالي</h2>
                <div class="wheel-container">
                    <button id="spinBtn" class="spin-btn" onclick="spinWorldCupWheel()">أدر الكرة واربح كوينز</button>
                </div>
            </div>

            <!-- صفحة 3: حساب الفرعون والتحويل -->
            <div id="page-profile" class="app-page">
                <h2 class="section-title"><i class="fa-solid fa-wallet"></i> محفظتك الذهبية</h2>
                <div class="wc-card" style="text-align: center;">
                    <h3 id="uName">يا فرعون</h3>
                    <p>رصيدك الحالي: <strong style="color: gold; font-size: 1.5rem;" id="uCoins">0</strong> كوينز</p>
                    <button class="predict-btn" style="background: var(--egypt-red); width: auto; padding: 10px 20px;" onclick="alert('جاري مراجعة طلب السحب من الإدارة!')">طلب سحب الأرباح كاش</button>
                </div>
            </div>

        </div>

        <!-- شريط القائمة السفلي المونديالي -->
        <nav class="nav-tabs">
            <div class="nav-item active" onclick="switchPage('tasks', this)"><i class="fa-solid fa-trophy"></i><span>المسابقات</span></div>
            <div class="nav-item" onclick="switchPage('wheel', this)"><i class="fa-solid fa-earth-africa"></i><span>كوكب الحظ</span></div>
            <div class="nav-item" onclick="switchPage('profile', this)"><i class="fa-solid fa-user-ninja"></i><span>الحساب</span></div>
        </nav>
    </div>

    <script>
        // دالة آمنة للتأكد من تحميل مكتبة Supabase أولاً دون التسبب في إيقاف الكود
        let supabase;
        function initSupabase() {
            const SB_URL = "https://wbmcrufeemwrtwsqaswz.supabase.co";
            const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibWNydWZlZW13cnR3c3Fhc3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA3NTg4OTIsImV4cCI6MjA1NjMzNDg5Mn0.1V8C2X_E7xL6Wb3B0M_3XzXW89_5522114477";
            
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
            } else {
                console.error("خطأ: لم يتم تحميل مكتبة Supabase بشكل صحيح.");
            }
        }

        let db = { loggedIn: false, telegram_id: null, username: '', coins: 0 };

        const quizData = {
            players: [
                { q: "من هو الهداف التاريخي لمنتخب مصر؟", o: ["حسام حسن", "محمد صلاح", "محمود الخطيب"], a: 0 },
                { q: "كم حذاء ذهبي فاز به محمد صلاح في الدوري الإنجليزي؟", o: ["2", "3", "4"], a: 1 }
            ],
            teams: [
                { q: "كم مرة فازت مصر بكأس أمم إفريقيا؟", o: ["5 مرات", "7 مرات", "6 مرات"], a: 1 },
                { q: "أي منتخب فاز بكأس العالم 2022؟", o: ["الأرجنتين", "فرنسا", "البرازيل"], a: 0 }
            ],
            stadiums: [
                { q: "أين أقيمت أول بطولة كأس عالم في التاريخ عام 1930؟", o: ["الأوروغواي", "إيطاليا", "البرازيل"], a: 0 },
                { q: "ما هو أكبر ملعب كرة قدم في مصر حالياً؟", o: ["استاد القاهرة", "استاد مصر بالعاصمة الإدارية", "استاد برج العرب"], a: 1 }
            ]
        };

        const matches = [
            { id: 1, teamA: "مصر 🇪🇬", teamB: "البرازيل 🇧🇷", time: "2026-06-20T18:00:00", description: "افتتاحية المجموعات" },
            { id: 2, teamA: "المغرب 🇲🇦", teamB: "إسبانيا 🇪🇸", time: "2026-06-15T21:00:00", description: "مباراة منتهية الوقت لتجربة القفل التلقائي" },
            { id: 3, teamA: "مصر 🇪🇬", teamB: "إيطاليا 🇮🇹", time: "2026-06-25T19:30:00", description: "الجولة الثانية للفراعنة" }
        ];

        // --- دالة الاستجابة الفورية بعد موافقة التليجرام ---
        async function onTelegramAuth(user) {
            if(!supabase) initSupabase(); // التأكد من تفعيل السوبابيز فوراً عند الدخول

            db.loggedIn = true;
            db.telegram_id = user.id.toString();
            db.username = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            
            // إخفاء شاشة الدخول وعرض التطبيق فورا
            document.getElementById('loginWall').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';

            try {
                let { data: profile, error } = await supabase.from('profiles').select('*').eq('telegram_id', db.telegram_id).single();
                
                if (error || !profile) {
                    const { data: newProfile } = await supabase.from('profiles').insert([
                        { telegram_id: db.telegram_id, username: db.username, coins: 500 }
                    ]).select().single();
                    profile = newProfile;
                }

                db.coins = profile ? profile.coins : 500;
            } catch(e) {
                console.log("Supabase Error or Offline mode", e);
                db.coins = 500; // قيمة افتراضية في حال وجود مشكلة اتصال بسوبابيز
            }

            updateUI();
            renderMatches();
        }

        function updateUI() {
            document.getElementById('uName').innerText = db.username;
            document.getElementById('uCoins').innerText = db.coins;
        }

        function switchPage(pageId, element) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            element.classList.add('active');
        }

        function startQuiz(category) {
            const list = quizData[category];
            const randomQuestion = list[Math.floor(Math.random() * list.length)];
            
            document.getElementById('quiz-selection').style.display = 'none';
            const container = document.getElementById('quiz-container');
            container.style.display = 'block';
            
            document.getElementById('quiz-question-text').innerText = randomQuestion.q;
            const optionsBox = document.getElementById('quiz-options-box');
            optionsBox.innerHTML = '';

            randomQuestion.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.style.background = '#24303f';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, randomQuestion.a);
                optionsBox.appendChild(btn);
            });
        }

        async function checkAnswer(userChoice, correctChoice) {
            if (userChoice === correctChoice) {
                db.coins += 200;
                if(supabase) await supabase.from('profiles').update({ coins: db.coins }).eq('telegram_id', db.telegram_id);
                updateUI();
                alert("إجابة صحيحة! ربحت 200 كوينز مونديالية 🏆");
            } else {
                alert("إجابة خاطئة، حظ أفضل في المرة القادمة!");
            }
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('quiz-selection').style.display = 'block';
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            const now = new Date();

            matches.forEach(match => {
                const matchTime = new Date(match.time);
                const isExpired = now >= matchTime;

                const box = document.createElement('div');
                box.className = 'match-box';
                let timeString = matchTime.toLocaleDateString('ar-EG', {month: 'long', day: 'numeric'}) + " - " + matchTime.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});

                box.innerHTML = `
                    <div class="match-header">
                        <span>🏆 كأس العالم 2026</span>
                        <span>${timeString}</span>
                    </div>
                    <div style="text-align:center; font-size:0.8rem; color:var(--egypt-gold); margin-bottom:5px;">${match.description}</div>
                    <div class="match-teams">
                        <span class="team">${match.teamA}</span>
                        <span class="vs">ضد</span>
                        <span class="team">${match.teamB}</span>
                    </div>
                    <div class="predict-options">
                        <button class="predict-btn" ${isExpired ? 'disabled' : ''} onclick="submitPrediction(${match.id}, 'A')">فوز A</button>
                        <button class="predict-btn" ${isExpired ? 'disabled' : ''} onclick="submitPrediction(${match.id}, 'X')">تعادل</button>
                        <button class="predict-btn" ${isExpired ? 'disabled' : ''} onclick="submitPrediction(${match.id}, 'B')">فوز B</button>
                    </div>
                    ${isExpired ? `<div class="match-status-msg"><i class="fa-solid fa-lock"></i> انتهى وقت التوقع لشرع المباراة فعلياً!</div>` : ''}
                `;
                container.appendChild(box);
            });
        }

        async function submitPrediction(matchId, type) {
            alert(`تم حفظ توقعك بـ (${type}) بنجاح!`);
            if(supabase) await supabase.from('transactions').insert([{ telegram_id: db.telegram_id, type: `توقع مباراة ${matchId}`, amount: 0 }]);
        }

        // --- محرك الأنيميشن المتوافق مع ملفك القديم ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [], ry = 0, isSpinning = false;
        const earthImg = new Image();
        earthImg.src = 'texture.jpg';

        function init() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            stars = [];
            for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5}); 
        }
        
        function draw() { 
            ctx.fillStyle = '#000'; 
            ctx.fillRect(0,0,canvas.width,canvas.height); 
            ctx.fillStyle='#fff'; 
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s)); 
            
            if(db.loggedIn && document.getElementById('page-wheel').classList.contains('active')) { 
                ry += (isSpinning ? 0.25 : 0.005); 
                let r = 110, x = canvas.width/2, y = canvas.height/2; 
                if(earthImg.complete) { 
                    ctx.save(); 
                    ctx.beginPath(); 
                    ctx.arc(x,y,r,0,Math.PI*2); 
                    ctx.clip(); 
                    let imgW = r * 4.15, scroll = (ry * imgW) % imgW; 
                    ctx.drawImage(earthImg, x-scroll, y-r, imgW, r*2); 
                    ctx.drawImage(earthImg, x-scroll+imgW, y-r, imgW, r*2); 
                    ctx.restore(); 
                } 
            } 
            requestAnimationFrame(draw); 
        }

        async function spinWorldCupWheel() {
            if(isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            
            setTimeout(async () => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                const prize = Math.floor(Math.random() * 101) + 50; 
                
                db.coins += prize;
                if(supabase) await supabase.from('profiles').update({ coins: db.coins }).eq('telegram_id', db.telegram_id);
                updateUI();
                
                alert(`مبروك! فزت بـ ${prize} كوينز مونديالية! ⚽🔥`);
            }, 3000);
        }

        window.addEventListener('resize', init);
        window.onload = () => { initSupabase(); init(); draw(); };
    </script>
</body>
</html>
