<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | Smart AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #FFF0F5; --text: #333; --card: #fff; --accent: #FF1493; }
        /* المود الليلي */
        .dark-mode { --bg: #121212; --text: #f0f0f0; --card: #1e1e1e; --gold: #FFD700; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; background: var(--card); z-index: 1000; border-bottom: 2px solid var(--gold); padding: 10px 0; opacity: 0.95; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .logo-main { width: 50px; cursor: pointer; filter: drop-shadow(0 0 5px var(--gold)); }

        /* شاشة دردشة Gemini */
        #gemini-chat-panel { display: none; position: fixed; bottom: 170px; right: 20px; width: 300px; background: var(--card); border: 2px solid var(--gemini-blue); border-radius: 20px; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(45deg, #4285f4, #9b72cb); color: white; padding: 10px; font-size: 14px; display: flex; justify-content: space-between; }
        .chat-body { height: 200px; padding: 10px; overflow-y: auto; font-size: 13px; }
        .chat-input { display: flex; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; border: none; padding: 10px; outline: none; background: var(--card); color: var(--text); }

        /* زر Gemini المطور */
        #gemini-trigger { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; animation: pulse 2s infinite; border: 2px solid white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* تعديلات كروت الفيديو */
        #main-app { padding-top: 120px; padding-bottom: 80px; }
        .v-card { position: relative; width: 95%; max-width: 400px; margin: 0 auto 20px; border-radius: 30px; overflow: hidden; background: #000; height: 75vh; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* المودال الشامل (تاجر + عادي) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .auth-card { background: var(--card); color: var(--text); padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--gold); }
        .biz-btn { background: var(--gold); color: black !important; margin-top: 15px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: var(--text); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <button onclick="openModal('auth-modal')" style="background:var(--accent); color:white; border:none; border-radius:15px; padding:5px 15px;">دخول</button>
            <img src="logo.png" class="logo-main" onclick="toggleDarkMode()" title="اضغط لتغيير الوضع">
            <div style="color:var(--gold); font-weight:bold;">⭐ <span id="pts">0</span></div>
        </div>
    </header>

    <div id="main-app">
        <div id="feed-container"></div>
    </div>

    <div id="gemini-chat-panel">
        <div class="chat-header">
            <span>Gemini AI Assistant 🌟</span>
            <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
        </div>
        <div class="chat-body" id="chat-messages">
            أهلاً بك! أنا Gemini.. كيف أساعدك في Vtik اليوم؟ (تعديل فيديو، كتابة تعليق، أو توثيق حسابك؟)
        </div>
        <div class="chat-input">
            <input type="text" id="user-msg" placeholder="اطلب ما تريد...">
            <button onclick="sendMsg()" style="background:none; border:none; color:#4285f4; padding:10px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="gemini-trigger" onclick="toggleChat()">
        <svg width="30" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z"/></svg>
    </div>

    <div id="auth-modal" class="modal">
        <div class="auth-card">
            <img src="logo.png" style="width: 60px;">
            <h3>انضم لعائلة Vtik</h3>
            <button onclick="socialLogin('google')" style="width:100%; padding:12px; background:#db4437; color:white; border:none; border-radius:15px; margin-bottom:10px;"><i class="fab fa-google"></i> دخول سريع</button>
            <hr>
            <p style="font-size: 12px;">هل أنت صاحب مشروع؟</p>
            <button onclick="alert('سيتم تحويلك لصفحة بيانات المحل..')" class="biz-btn" style="width:100%; padding:12px; border:none; border-radius:15px; font-weight:bold;">💼 تسجيل كتاجر (Business)</button>
            <button onclick="closeModal('auth-modal')" style="background:none; border:none; color:#999; margin-top:15px;">إغلاق</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-item"><i class="fas fa-search"></i></div>
        <div class="nav-item" style="background:#000; color:#fff; border-radius:10px; padding:0 10px;"><i class="fas fa-plus"></i></div>
        <div class="nav-item"><i class="fas fa-heart"></i></div>
        <div class="nav-item"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const SUPABASE_URL = 'https://adnoxldhqdjdfnghhsog.supabase.co';
    const SUPABASE_KEY = 'YOUR_KEY_HERE'; 
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. تبديل الوضع الليلي
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // 2. التحكم في شات Gemini
    function toggleChat() {
        const panel = document.getElementById('gemini-chat-panel');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendMsg() {
        const input = document.getElementById('user-msg');
        const chatBody = document.getElementById('chat-messages');
        if(input.value.trim() !== "") {
            chatBody.innerHTML += `<div style="text-align:left; color:var(--accent); margin-top:5px;"><b>أنت:</b> ${input.value}</div>`;
            setTimeout(() => {
                chatBody.innerHTML += `<div style="color:#4285f4; margin-top:5px;"><b>Gemini:</b> طلبك قيد التنفيذ! سأقوم بـ ${input.value} فوراً.</div>`;
                chatBody.scrollTop = chatBody.scrollHeight;
            }, 1000);
            input.value = "";
        }
    }

    // 3. فتح وإغلاق المودالات
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // تحميل الفيديوهات
    async function loadFeed() {
        const { data } = await client.from('videos').select('*');
        const container = document.getElementById('feed-container');
        data?.forEach(v => {
            container.innerHTML += `
                <div class="v-card">
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div style="position:absolute; bottom:20px; right:20px; color:white; text-shadow:2px 2px 4px #000;">
                        <b>@إبداع_فيتيك</b>
                    </div>
                </div>`;
        });
    }

    loadFeed();
</script>
</body>
</html>
