<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO - نظام العضوية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; overflow: hidden; }

        .page { position: fixed; inset: 0; display: none; background: var(--bg); overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }

        /* شاشة الدخول والتسجيل */
        #authPage { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .auth-card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; width: 100%; max-width: 350px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: var(--main); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-auth { color: var(--accent); font-size: 13px; margin-top: 15px; cursor: pointer; display: block; }

        /* الهوم والفيديو */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* أيقونات التفاعل */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 52px; height: 52px; color: white; font-size: 24px; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* البروفايل والمحفظة */
        .profile-header { padding: 30px 20px; text-align: center; background: linear-gradient(to bottom, #111, #000); }
        .stats-card { display: flex; background: #111; margin: 20px; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        .stat-box { flex: 1; text-align: center; }
        .stat-box h2 { margin: 0; color: var(--gold); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #555; font-size: 24px; }
        .nav-btn.active { color: white; }
        .upload-btn { background: white; color: black; width: 45px; height: 30px; border-radius: 8px; font-weight: bold; }

        #uploadStatus { position: fixed; top: 20px; width: 90%; left: 5%; background: rgba(0,0,0,0.95); padding: 15px; border-radius: 10px; z-index: 20000; display: none; text-align: center; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="uploadStatus">جاري رفع الفيديو... <span id="progress">0%</span></div>

<div id="authPage" class="page active">
    <h1 style="color:var(--main); margin-bottom:5px;">VTIK</h1>
    <p id="authTitle" style="color:#888; margin-bottom:20px;">تسجيل الدخول</p>
    
    <div class="auth-card">
        <input type="number" id="phoneInput" class="auth-input" placeholder="رقم الهاتف">
        <input type="password" id="passInput" class="auth-input" placeholder="كلمة المرور">
        <button id="mainAuthBtn" class="auth-btn" onclick="handleAuth()">دخول</button>
        <span class="toggle-auth" id="toggleText" onclick="toggleAuthMode()">ليس لديك حساب؟ إنشاء حساب جديد</span>
    </div>
</div>

<div id="homePage" class="page">
    <div id="mainFeed"></div>
</div>

<div id="profilePage" class="page">
    <div class="profile-header">
        <div style="width:80px; height:80px; background:#222; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:30px; border:2px solid var(--main)">👤</div>
        <h3 id="uNameDisplay">المستخدم</h3>
        <p id="uPhoneDisplay" style="color:#666; font-size:12px;"></p>
    </div>
    <div class="stats-card">
        <div class="stat-box">
            <h2 id="cashShow">0.00</h2>
            <p style="font-size:12px; color:#777;">رصيد كاش</p>
        </div>
        <div class="stat-box" style="border-right: 1px solid #222;">
            <h2 id="coinShow">0</h2>
            <p style="font-size:12px; color:#777;">الكوينز</p>
        </div>
    </div>
    <div style="padding:10px;">
        <button onclick="handleWithdraw()" style="width:100%; padding:15px; background:var(--main); border:none; border-radius:12px; color:white; font-weight:bold;">طلب سحب أرباح</button>
        <button onclick="logout()" style="width:100%; padding:15px; margin-top:10px; background:none; border:1px solid #333; border-radius:12px; color:#666;">تسجيل الخروج</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('homePage')">🏠</button>
    <button class="nav-btn upload-btn" onclick="triggerUpload()">+</button>
    <button class="nav-btn" onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639"; 
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;
    let currentUser = JSON.parse(localStorage.getItem('vtik_user_session'));

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById('mainAuthBtn').innerText = isLoginMode ? "دخول" : "تسجيل";
        document.getElementById('toggleText').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ دخول";
    }

    async function handleAuth() {
        const phone = document.getElementById('phoneInput').value;
        const pass = document.getElementById('passInput').value;

        if(phone.length < 10 || pass.length < 4) return alert("يرجى إدخال بيانات صحيحة");

        if(isLoginMode) {
            const { data, error } = await sb.from('vtik_users').select('*').eq('user_id', phone).eq('username', pass).maybeSingle();
            if(data) {
                loginSuccess(data);
            } else {
                alert("خطأ في رقم الهاتف أو كلمة المرور");
            }
        } else {
            // تسجيل حساب جديد (نستخدم username لتخزين كلمة المرور مؤقتاً للتبسيط)
            const { data: exist } = await sb.from('vtik_users').select('user_id').eq('user_id', phone).maybeSingle();
            if(exist) return alert("هذا الرقم مسجل مسبقاً");

            const { data, error } = await sb.from('vtik_users').insert([{ user_id: phone, username: pass, cash_balance: 0, coins_balance: 0 }]).select().single();
            if(data) loginSuccess(data);
        }
    }

    function loginSuccess(userData) {
        localStorage.setItem('vtik_user_session', JSON.stringify(userData));
        location.reload();
    }

    window.onload = () => {
        if(currentUser) {
            document.getElementById('authPage').classList.remove('active');
            showPage('homePage');
            loadData();
        }
    }

    async function loadData() {
        // تحديث البيانات من السيرفر
        const { data: u } = await sb.from('vtik_users').select('*').eq('user_id', currentUser.user_id).single();
        if(u) {
            document.getElementById('cashShow').innerText = u.cash_balance;
            document.getElementById('coinShow').innerText = u.coins_balance;
            document.getElementById('uNameDisplay').innerText = "عضو VTIK";
            document.getElementById('uPhoneDisplay').innerText = u.user_id;
        }

        // جلب الفيديوهات
        const { data: vids } = await sb.from('vtik_videos').select('*').order('created_at', {ascending: false});
        if(vids) {
            document.getElementById('mainFeed').innerHTML = vids.map(v => `
                <div class="video-container">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" loop playsinline controls></video>
                    <div class="side-icons">
                        <button class="icon-btn" onclick="earn('${v.id}', this)">❤️</button>
                        <button class="icon-btn" onclick="earn('${v.id}', this)">💬</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function earn(vid, btn) {
        if(btn.style.color) return;
        btn.style.color = 'var(--main)';
        
        let newCoins = parseInt(document.getElementById('coinShow').innerText) + 1;
        await sb.from('vtik_users').update({ coins_balance: newCoins }).eq('user_id', currentUser.user_id);
        document.getElementById('coinShow').innerText = newCoins;
    }

    function triggerUpload() {
        let i = document.createElement('input'); i.type='file'; i.accept='video/*';
        i.onchange = async e => {
            const file = e.target.files[0];
            document.getElementById('uploadStatus').style.display='block';
            let fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('video', file);
            let xhr = new XMLHttpRequest();
            xhr.open('POST', `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`);
            xhr.upload.onprogress = ev => { document.getElementById('progress').innerText = Math.round((ev.loaded/ev.total)*100) + "%"; };
            xhr.onload = async () => {
                let r = JSON.parse(xhr.responseText);
                if(r.ok) {
                    await sb.from('vtik_videos').insert({ url: r.result.video.file_id, user_id: currentUser.user_id });
                    location.reload();
                }
            };
            xhr.send(fd);
        };
        input.click();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }
</script>
</body>
</html>
