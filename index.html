<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTIK - Live Sync</title>
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --gold: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* شاشة الدخول - تظهر دائماً إذا انتهت الجلسة */
        #loginPage { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .tg-pulse-btn { 
            background: #0088cc; color: white; border: none; padding: 20px 40px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }

        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100%; }
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* البروفايل والمعرف المتغير */
        .page { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .wallet-card { background: #111; padding: 40px 20px; border-radius: 30px; margin: 20px; border: 1px solid #222; text-align: center; }
        .user-tag { color: var(--gold); font-family: monospace; font-size: 14px; display: block; margin-top: 10px; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div>
            <span style="font-size: 50px; display:block; margin-bottom:10px;">🦋</span>
            <h2 style="margin-bottom:40px;">جلسة VTIK منتهية</h2>
            <button onclick="requestTelegramAccess()" class="tg-pulse-btn">تفعيل الدخول عبر تيليجرام ✈️</button>
            <p style="font-size: 11px; color: #444; margin-top: 20px;">يجب التفعيل في كل مرة يتم فيها إنهاء جلسة تيليجرام</p>
        </div>
    </div>

    <div id="mainApp">
        <div id="mainFeed"></div>
        <div onclick="openGalaxy()" style="position:fixed; bottom:90px; left:20px; width:55px; height:55px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px; z-index:3000;">🎡</div>

        <div id="profilePage" class="page">
            <div class="wallet-card">
                <h2 id="uNameDisplay" style="margin:0;">المستخدم</h2>
                <span id="uIDDisplay" class="user-tag">--2026--</span>
                
                <div style="margin-top:30px;">
                    <div style="font-size:40px; font-weight:bold; color:var(--cyan);"><span id="cashBal">0.00</span> EGP</div>
                    <div style="color:var(--gold);">🪙 <span id="coinBal">0</span> Coins</div>
                </div>
            </div>
            <div style="padding: 0 20px;">
                <button onclick="logoutForce()" style="width:100%; padding:15px; background:#222; color:#777; border:none; border-radius:15px;">إنهاء الجلسة الحالية</button>
            </div>
        </div>

        <nav>
            <div onclick="hidePages()" style="font-size:26px;">🏠</div>
            <div onclick="document.getElementById('profilePage').style.display='block'" style="font-size:26px;">👤</div>
        </nav>
    </div>

    <script>
        const BOT_TOKEN = '7611311032:AAFjZ6x6o8yUat7Y-W3H4N8G9h8h8h8h8h8';
        
        // استخدام sessionStorage بدلاً من localStorage لجعل الجلسة تنتهي بإغلاق المتصفح أو التحديث
        let session = JSON.parse(sessionStorage.getItem('vtik_active_session'));
        // الرصيد يظل في localStorage لأنه مرتبط بالحساب وليس بالجلسة
        let wallet = JSON.parse(localStorage.getItem('vtik_wallet')) || { cash:0, coins:300, seq: Math.floor(100+Math.random()*899) };

        function requestTelegramAccess() {
            let tempCode = `AUTH-${Math.floor(1000+Math.random()*8999)}`;
            window.open(`https://t.me/vtik_egypt_bot?start=${tempCode}`);

            const poller = setInterval(async () => {
                try {
                    const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                    const d = await r.json();
                    const msg = d.result.find(m => m.message?.text?.includes(tempCode));
                    
                    if(msg) {
                        clearInterval(poller);
                        const teleName = msg.message.from.first_name || "User";
                        
                        // إنشاء الجلسة المؤقتة
                        session = {
                            name: teleName,
                            id: `${teleName.substring(0,2).toUpperCase()}2026${wallet.seq}`,
                            active: true
                        };
                        
                        sessionStorage.setItem('vtik_active_session', JSON.stringify(session));
                        location.reload();
                    }
                } catch(e){}
            }, 3000);
        }

        function checkAuth() {
            if(session && session.active) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                
                document.getElementById('uNameDisplay').innerText = session.name;
                document.getElementById('uIDDisplay').innerText = `ID: ${session.id}`;
                document.getElementById('cashBal').innerText = wallet.cash.toFixed(2);
                document.getElementById('coinBal').innerText = wallet.coins;
            }
        }

        function logoutForce() {
            sessionStorage.clear(); // مسح الجلسة المؤقتة
            location.reload();
        }

        // تشغيل الفحص
        checkAuth();

        // محتوى افتراضي
        document.getElementById('mainFeed').innerHTML = `<div class="video-container"><video src="https://www.w3schools.com/html/mov_bbb.mp4" loop playsinline autoplay muted></video></div>`;
    </script>
</body>
    </html>
