<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK - Secured Wallet</title>
    <style>
        /* تأثير النبض */
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        :root { --tiktok-red: #fe2c55; --tiktok-blue: #25f4ee; --gold: #FFD700; --black: #010101; --neon-green: #39FF14; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }

        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-icons { 
            position: absolute; right: 10px; bottom: 100px; 
            display: flex; flex-direction: column; gap: 18px; z-index: 100; align-items: center; 
        }
        .icon-btn { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: rgba(0,0,0,0.5); border: none; color: white; 
            font-size: 20px; backdrop-filter: blur(8px); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); display: none; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .user-id-box { margin-top: 30px; text-align: center; }
        .id-badge { display: inline-block; padding: 6px 18px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 20px; font-family: monospace; font-size: 14px; letter-spacing: 1px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }

        .wallet-card { background: linear-gradient(145deg, #111, #222); padding: 25px; border-radius: 20px; margin: 15px 20px 20px 20px; border: 1px solid #333; text-align: center; position: relative;}
        .market-icon { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }

        #pGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 10px; }
        .profile-vid-item { position: relative; width: 100%; aspect-ratio: 9/16; background: #111; }
        .profile-vid-item video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .del-vid-btn { position: absolute; top: 5px; right: 5px; background: var(--tiktok-red); border: none; color: white; font-size: 12px; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 10; font-weight: bold; }

        .mic-tabs { display: flex; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .tab-link { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; }
        .tab-link.active { color: var(--tiktok-blue); border-bottom: 2px solid var(--tiktok-blue); }
        .tab-pane { display: none; padding: 20px; text-align: center; }
        .tab-pane.active { display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.96); }

        .form-panel { background: #111; padding: 20px; border-radius: 15px; margin: 10px 20px; border: 1px dashed #444; display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; text-align: center; box-sizing: border-box; font-size: 16px; }

        #marketPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .history-table { width: 100%; margin-top: 15px; border-collapse: collapse; background: #0a0a0a; font-size: 13px; text-align: center; border-radius: 10px; overflow: hidden; }
        .history-table th { background: #1a1a1a; padding: 12px; color: #888; border-bottom: 1px solid #333; }
        .history-table td { padding: 12px; border-bottom: 1px solid #111; }

        .galaxy-btn { position: fixed; bottom: 80px; left: 20px; width: 55px; height: 55px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 3000; box-shadow: 0 0 15px var(--gold); animation: pulse-animation 2s infinite; cursor: pointer; }
        #galaxyGame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 6000; display: none; }
        .target-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 3px solid white; border-radius: 50%; pointer-events: none; box-shadow: 0 0 20px white; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 2000; }
        @keyframes explosion { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -300px) scale(5); filter: blur(5px); } }
    </style>
</head>
<body>

<div style="position: fixed; top: 20px; right: 20px; z-index: 4000;">
    <button style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; backdrop-filter: blur(5px); cursor: pointer;" onclick="showPage('micPage')">🎙️</button>
</div>

<div id="mainFeed"></div>

<div class="galaxy-btn" onclick="openGalaxy()">🎡</div>

<nav class="nav-bar">
    <button style="background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="closePages()">🏠</button>
    <div style="width:45px; height:30px; background:linear-gradient(to right, var(--tiktok-blue), var(--tiktok-red)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:black; cursor:pointer;" id="upBtn">➕</div>
    <button style="background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="showPage('profilePage')">👤</button>
</nav>

<div id="marketPage">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <button onclick="document.getElementById('marketPage').style.display='none'" style="background:none; border:none; color:white; font-size:30px;">✕</button>
        <h2 style="margin:0;">السوق والسجل 🛒</h2>
        <div style="width:30px;"></div>
    </div>
    <h3 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:10px;">كشف حساب العمليات</h3>
    <table class="history-table">
        <thead><tr><th>نوع العملية</th><th>القيمة</th><th>التاريخ</th></tr></thead>
        <tbody id="hBody"></tbody>
    </table>
</div>

<div id="galaxyGame">
    <div id="gameTimer" style="position:absolute; top:30px; left:50%; transform:translateX(-50%); font-size:50px; color:var(--gold); font-weight:bold; z-index:10;"></div>
    <div class="target-ring"></div>
    <button style="position:absolute; top:20px; right:20px; color:white; background:none; border:none; font-size:30px; z-index:100;" onclick="closeGalaxy()">✕</button>
    <canvas id="galaxyCanvas"></canvas>
</div>

<div id="micPage" class="page">
    <div style="padding: 20px; text-align: center;"><h3>مركز التواصل 🎙️</h3></div>
    <div class="mic-tabs">
        <div class="tab-link active" onclick="switchMicTab(0)">بث راديو</div>
        <div class="tab-link" onclick="switchMicTab(1)">اتصال ID</div>
    </div>
    <div id="radioTab" class="tab-pane active">
        <div style="font-size: 50px; margin-bottom: 20px;">📻</div>
        <h4>بث مباشر صوتي</h4>
        <button class="btn-action" style="background:var(--tiktok-red); color:white;">ابدأ البث الآن</button>
    </div>
    <div id="callTab" class="tab-pane">
        <div style="font-size: 50px; margin-bottom: 20px;">📞</div>
        <input type="text" id="callIdInput" placeholder="أدخل ID المستخدم للاتصال">
        <button class="btn-action" style="background:var(--neon-green); color:black;" onclick="alert('جاري الاتصال بـ: ' + document.getElementById('callIdInput').value)">اتصال</button>
    </div>
    <button class="btn-action" style="margin-top:20px; background:#222; color:white;" onclick="closePages()">رجوع</button>
</div>

<div id="profilePage" class="page">
    <div class="user-id-box">
        <div id="displayUserID" class="id-badge">ID: --2026--</div>
    </div>
    <div style="padding: 10px 20px 0 20px; text-align: center;"><h3>المحفظة الرقمية 💳</h3></div>
    <div class="wallet-card">
        <div class="market-icon" onclick="document.getElementById('marketPage').style.display='block'">🛒</div>
        <div style="color:var(--tiktok-blue); font-size:32px; font-weight:bold;"><span id="cashBal">0</span> EGP</div>
        <div style="color:var(--gold); font-size:22px;">🪙 <span id="coinBal">0</span> Coins</div>
    </div>
    <div class="btn-group">
        <button class="btn-action" style="background:var(--tiktok-blue);" onclick="toggleF('dF')">📥 شحن الرصيد</button>
        <button class="btn-action" style="background:var(--tiktok-red); color:white;" onclick="toggleF('wF')">📤 سحب كاش</button>
        <button class="btn-action" style="background:var(--gold);" onclick="toggleF('eF')">💱 تحويل Coins</button>
    </div>
    <div id="dF" class="form-panel"><input type="number" id="inD_phone" placeholder="رقم محفظة المحول"><input type="number" id="inD_amt" placeholder="المبلغ المشحون"><button class="btn-action" style="background:var(--tiktok-blue);" onclick="doF('dep')">تأكيد الإيداع</button></div>
    <div id="wF" class="form-panel"><input type="number" id="inW_phone" placeholder="رقم هاتف السحب"><input type="number" id="inW_amt" placeholder="المبلغ المراد سحبه"><button class="btn-action" style="background:var(--tiktok-red); color:white;" onclick="doF('wit')">تأكيد السحب</button></div>
    <div id="eF" class="form-panel"><input type="number" id="inE" placeholder="عدد الـ Coins المراد تحويلها"><button class="btn-action" style="background:var(--gold);" onclick="doF('exc')">تأكيد التحويل</button></div>
    
    <h4 style="margin: 20px 20px 5px 20px;">فيديوهاتي المحملة:</h4>
    <div id="pGrid"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('vtik_pro_v19')) || { 
        cash: 0, coins: 0, vids: [], history: [],
        userID: "VT2026" + Math.floor(1000 + Math.random() * 9000) 
    };

    function save() { localStorage.setItem('vtik_pro_v19', JSON.stringify(db)); render(); }
    
    function showPage(id) { 
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); 
        document.getElementById(id).style.display = 'block'; 
        document.querySelectorAll('video').forEach(v => v.pause()); 
        render(); 
    }

    function closePages() { 
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); 
        initObs(); 
    }

    function toggleF(id) { 
        document.querySelectorAll('.form-panel').forEach(f => f.style.display='none'); 
        document.getElementById(id).style.display='block'; 
    }

    function switchMicTab(idx) {
        document.querySelectorAll('.tab-link').forEach((l,i) => l.classList.toggle('active', i===idx));
        document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', i===idx));
    }

    function deleteVid(index) {
        if(confirm("هل تريد حذف هذا الفيديو؟")) {
            db.vids.splice(index, 1);
            save();
        }
    }

    function doF(type) {
        let log = { date: new Date().toLocaleString('ar-EG'), type: "", amt: "" };
        if(type === 'dep') {
            let p = document.getElementById('inD_phone').value, a = parseFloat(document.getElementById('inD_amt').value);
            if(!p || isNaN(a) || a <= 0) return alert("خطأ في البيانات");
            db.cash += a; log.type=`إيداع من (${p})`; log.amt=`+${a} EGP`;
            db.history.push(log);
        } 
        else if(type === 'wit') {
            let p = document.getElementById('inW_phone').value, a = parseFloat(document.getElementById('inW_amt').value);
            if(a > db.cash) return alert("رصيد غير كافٍ");
            db.cash -= a; log.type=`سحب إلى (${p})`; log.amt=`-${a} EGP`;
            db.history.push(log);
        } 
        else if(type === 'exc') {
            let c = parseInt(document.getElementById('inE').value);
            if(c > db.coins || c < 150) return alert("خطأ في التحويل");
            let egp = (Math.floor(c/150)*10);
            db.coins -= (Math.floor(c/150)*150); db.cash += egp;
            log.type="تحويل Coins"; log.amt=`+${egp} EGP`;
            db.history.push(log);
        }
        save();
        document.querySelectorAll('.form-panel').forEach(f => f.style.display='none');
    }

    function render() {
        document.getElementById('displayUserID').innerText = "ID: " + db.userID;
        document.getElementById('cashBal').innerText = db.cash.toFixed(2);
        document.getElementById('coinBal').innerText = db.coins;
        
        const hb = document.getElementById('hBody'); hb.innerHTML = '';
        [...db.history].reverse().forEach(x => {
            let clr = x.amt.includes('+') ? "var(--neon-green)" : "var(--tiktok-red)";
            hb.innerHTML += `<tr><td>${x.type}</td><td style="color:${clr}; font-weight:bold;">${x.amt}</td><td>${x.date}</td></tr>`;
        });

        const feed = document.getElementById('mainFeed'); feed.innerHTML = '';
        db.vids.forEach((v, i) => {
            feed.innerHTML += `<div class="video-container" id="v-${i}">
                <video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                <div class="side-icons"><button class="icon-btn" onclick="db.coins+=150;save()">❤️</button></div>
            </div>`;
        });

        const pGrid = document.getElementById('pGrid'); pGrid.innerHTML = '';
        db.vids.forEach((v, i) => {
            pGrid.innerHTML += `<div class="profile-vid-item">
                <button class="del-vid-btn" onclick="deleteVid(${i})">×</button>
                <video src="${v.url}" muted onclick="this.play()"></video>
            </div>`;
        });
        initObs();
    }

    // لعبة العجلة
    let canvas = document.getElementById('galaxyCanvas'), ctx = canvas.getContext('2d'), points = [], isSpinning = false, timeLeft = 0, animId, rx=0, ry=0;
    function openGalaxy() { document.getElementById('galaxyGame').style.display='block'; canvas.width=window.innerWidth; canvas.height=window.innerHeight; initS(); animS(); }
    function initS() { points=[]; for(let i=0; i<150; i++){ let phi=Math.acos(-1+(2*i)/150), th=Math.sqrt(150*Math.PI)*phi; points.push({ val:Math.floor(Math.random()*746)+5, x:180*Math.cos(th)*Math.sin(phi), y:180*Math.sin(th)*Math.sin(phi), z:180*Math.cos(phi), c:`hsl(${Math.random()*360},80%,60%)` }); } }
    function animS() {
        ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
        let cx=canvas.width/2, cy=canvas.height/2; rx+=(isSpinning?0.15:0.005); ry+=(isSpinning?0.15:0.005);
        points.sort((a,b)=>b.z-a.z);
        points.forEach(p => {
            let y1=p.y*Math.cos(rx)-p.z*Math.sin(rx), z1=p.y*Math.sin(rx)+p.z*Math.cos(rx);
            let x2=p.x*Math.cos(ry)-z1*Math.sin(ry), z2=p.x*Math.sin(ry)+z1*Math.cos(ry);
            let per=400/(400-z2), sx=x2*per+cx, sy=y1*per+cy;
            ctx.beginPath(); ctx.arc(sx,sy,Math.max(2,10*per),0,Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
            p.lx=sx; p.ly=sy;
        });
        animId=requestAnimationFrame(animS);
    }
    canvas.onclick=()=>{ if(isSpinning)return; isSpinning=true; timeLeft=3; let itv=setInterval(()=>{ timeLeft--; document.getElementById('gameTimer').innerText=timeLeft>0?timeLeft:""; if(timeLeft<=0){ clearInterval(itv); isSpinning=false; pickW(); } },1000); };
    function pickW() {
        let cx=canvas.width/2, cy=canvas.height/2, win=points[0], minD=10000;
        points.forEach(p=>{ let d=Math.sqrt((p.lx-cx)**2+(p.ly-cy)**2); if(d<minD){ minD=d; win=p; } });
        db.coins+=win.val; db.history.push({date:new Date().toLocaleString('ar-EG'), type:"جائزة الكرة", amt:`+${win.val} Coin`}); save();
        let ex=document.createElement('div'); ex.innerText=win.val; ex.style="position:fixed; top:50%; left:50%; color:var(--neon-green); font-size:100px; font-weight:bold; z-index:7000; animation:explosion 1.5s forwards; text-shadow:0 0 30px white; pointer-events:none;"; document.body.appendChild(ex); setTimeout(()=>ex.remove(), 1500);
    }
    function closeGalaxy(){ document.getElementById('galaxyGame').style.display='none'; cancelAnimationFrame(animId); closePages(); }
    function initObs(){ const obs=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting?e.target.play():e.target.pause()),{threshold:0.7}); document.querySelectorAll('video').forEach(v=>obs.observe(v)); }

    // زر الرفع المصلح
    document.getElementById('upBtn').onclick = () => {
        let i = document.createElement('input');
        i.type = 'file'; i.accept = "video/*";
        i.onchange = e => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    db.vids.push({ url: ev.target.result });
                    save();
                    alert("✅ تم رفع الفيديو بنجاح!");
                };
                reader.readAsDataURL(file);
            }
        };
        i.click();
    };

    render();
</script>
</body>
    </html>
