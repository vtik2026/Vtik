<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK - Galaxy Edition</title>
    <style>
        :root { --tiktok-red: #fe2c55; --tiktok-blue: #25f4ee; --gold: #FFD700; --black: #010101; --neon-green: #39FF14; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }

        /* الفيد الرئيسي */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; font-size: 26px; backdrop-filter: blur(8px); cursor: pointer; }

        /* صفحة البروفايل */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); display: none; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .wallet-card { background: linear-gradient(145deg, #111, #222); padding: 25px; border-radius: 20px; margin: 15px 20px; border: 1px solid #333; text-align: center; }
        
        /* شبكة الفيديوهات 3xN */
        #myVideosGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 5px; }
        .grid-item { position: relative; aspect-ratio: 9/16; background: #111; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .del-x { position: absolute; top: 5px; right: 5px; background: var(--tiktok-red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 10; font-weight: bold; }

        /* لعبة الجلاكسي */
        .galaxy-btn { position: fixed; bottom: 80px; left: 20px; width: 55px; height: 55px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 3000; box-shadow: 0 0 15px var(--gold); cursor: pointer; }
        #galaxyGame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 6000; display: none; }
        canvas { width: 100%; height: 100%; }

        /* أزرار التنقل */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 2000; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; color: var(--tiktok-blue); }
    </style>
</head>
<body>

    <div id="loading">🚀 جاري المعالجة...</div>
    <div id="mainFeed"></div>
    <div class="galaxy-btn" onclick="openGalaxy()">🎡</div>

    <div id="galaxyGame">
        <button style="position:absolute; top:20px; right:20px; color:white; background:none; border:none; font-size:30px; z-index:7000;" onclick="closeGalaxy()">✕</button>
        <canvas id="galaxyCanvas"></canvas>
    </div>

    <div id="profilePage" class="page">
        <center><div id="displayUserID" style="margin-top:20px; color:var(--gold);">ID: --</div></center>
        <div class="wallet-card">
            <div style="color:var(--tiktok-blue); font-size:32px; font-weight:bold;"><span id="cashBal">0</span> EGP</div>
            <div style="color:var(--gold); font-size:20px;">🪙 <span id="coinBal">0</span> Coins</div>
        </div>
        <div id="myVideosGrid"></div>
    </div>

    <nav class="nav-bar">
        <button style="background:none; border:none; color:white; font-size:24px;" onclick="closePages()">🏠</button>
        <div style="cursor:pointer; width:45px; height:30px; background:linear-gradient(to right, var(--tiktok-blue), var(--tiktok-red)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;" id="upBtn">➕</div>
        <button style="background:none; border:none; color:white; font-size:24px;" onclick="showPage('profilePage')">👤</button>
    </nav>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8608757510:AAHULS7KucBQy9wq_ax4AoGS490tmABrB3U',
            CHAT_ID: '-1003614080639',
            SB_URL: 'https://filnjwkcbfcdbkajqwji.supabase.co',
            SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbG5qd2tjYmZjZGJrYWpxd2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzc3ODcsImV4cCI6MjA5Mjk1Mzc4N30._D2oohezO31dXNUvicMdKcpJoUkcwBCpqLxDGcXFoBs'
        };

        let db = JSON.parse(localStorage.getItem('vtik_pro_v22')) || { 
            cash: 0, coins: 0, vids: [], userID: "VT" + Math.floor(1000 + Math.random() * 9000)
        };

        function save() { localStorage.setItem('vtik_pro_v22', JSON.stringify(db)); render(); }

        // جلب الفيديوهات
        async function fetchVideos() {
            try {
                const res = await fetch(`${CONFIG.SB_URL}/rest/v1/videos?select=*`, {
                    headers: { 'apikey': CONFIG.SB_KEY, 'Authorization': `Bearer ${CONFIG.SB_KEY}` }
                });
                const data = await res.json();
                db.vids = data.map(v => ({ url: v.video_url, id: v.id }));
                render();
            } catch (e) { console.log("Error loading videos"); }
        }

        function render() {
            document.getElementById('cashBal').innerText = db.cash.toFixed(2);
            document.getElementById('coinBal').innerText = db.coins;
            document.getElementById('displayUserID').innerText = "ID: " + db.userID;

            const feed = document.getElementById('mainFeed'); feed.innerHTML = '';
            const grid = document.getElementById('myVideosGrid'); grid.innerHTML = '';

            db.vids.forEach((v, i) => {
                feed.innerHTML += `<div class="video-container"><video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video></div>`;
                grid.innerHTML += `<div class="grid-item"><button class="del-x" onclick="deleteVideo(${i}, ${v.id})">✕</button><video src="${v.url}" muted></video></div>`;
            });
            initObs();
        }

        // --- محرك لعبة الجلاكسي ---
        let canvas = document.getElementById('galaxyCanvas'), ctx = canvas.getContext('2d'), points = [], isSpinning = false, animId, rx=0, ry=0;

        function openGalaxy() { 
            document.getElementById('galaxyGame').style.display='block'; 
            canvas.width=window.innerWidth; canvas.height=window.innerHeight; 
            initS(); animS(); 
        }

        function initS() { 
            points=[]; 
            for(let i=0; i<150; i++){ 
                let phi=Math.acos(-1+(2*i)/150), th=Math.sqrt(150*Math.PI)*phi; 
                points.push({ x:180*Math.cos(th)*Math.sin(phi), y:180*Math.sin(th)*Math.sin(phi), z:180*Math.cos(phi), c:`hsl(${Math.random()*360},80%,60%)` }); 
            } 
        }

        function animS() {
            ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
            let cx=canvas.width/2, cy=canvas.height/2; 
            rx+=(isSpinning?0.15:0.005); ry+=(isSpinning?0.15:0.005);
            points.sort((a,b)=>b.z-a.z);
            points.forEach(p => {
                let y1=p.y*Math.cos(rx)-p.z*Math.sin(rx), z1=p.y*Math.sin(rx)+p.z*Math.cos(rx);
                let x2=p.x*Math.cos(ry)-z1*Math.sin(ry), z2=p.x*Math.sin(ry)+z1*Math.cos(ry);
                let per=400/(400-z2), sx=x2*per+cx, sy=y1*per+cy;
                ctx.beginPath(); ctx.arc(sx,sy,Math.max(2,10*per),0,Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
            });
            animId=requestAnimationFrame(animS);
        }

        canvas.onclick=()=>{ 
            if(isSpinning) return; 
            isSpinning=true; 
            setTimeout(()=>{ 
                isSpinning=false; 
                db.coins += 500; save(); 
                alert("مبروك! ربحت 500 كوين"); 
            }, 3000); 
        };

        function closeGalaxy(){ document.getElementById('galaxyGame').style.display='none'; cancelAnimationFrame(animId); }

        // وظائف الرفع والحذف
        document.getElementById('upBtn').onclick = () => {
            let input = document.createElement('input'); input.type = 'file'; input.accept = 'video/*';
            input.onchange = async e => {
                const file = e.target.files[0]; if(!file) return;
                document.getElementById('loading').style.display = 'flex';
                const fd = new FormData(); fd.append('chat_id', CONFIG.CHAT_ID); fd.append('video', file);
                try {
                    const tg = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
                    const res = await tg.json();
                    if(res.ok) {
                        const vUrl = `https://t.me/c/${CONFIG.CHAT_ID.replace('-100','')}/${res.result.message_id}`;
                        await fetch(`${CONFIG.SB_URL}/rest/v1/videos`, {
                            method: 'POST',
                            headers: { 'apikey': CONFIG.SB_KEY, 'Authorization': `Bearer ${CONFIG.SB_KEY}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ video_url: vUrl })
                        });
                        fetchVideos();
                    }
                } catch(e) { alert("خطأ في الرفع"); }
                document.getElementById('loading').style.display = 'none';
            };
            input.click();
        };

        async function deleteVideo(idx, sbId) {
            if(!confirm("حذف؟")) return;
            try {
                await fetch(`${CONFIG.SB_URL}/rest/v1/videos?id=eq.${sbId}`, {
                    method: 'DELETE',
                    headers: { 'apikey': CONFIG.SB_KEY, 'Authorization': `Bearer ${CONFIG.SB_KEY}` }
                });
                db.vids.splice(idx, 1); save();
            } catch(e) { alert("خطأ حذف"); }
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
        function closePages() { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); }
        function initObs(){ const obs=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting?e.target.play():e.target.pause()),{threshold:0.7}); document.querySelectorAll('video').forEach(v=>obs.observe(v)); }

        fetchVideos();
    </script>
</body>
</html>
