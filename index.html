<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTIK EGYPT - 2026</title>
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --gold: #FFD700; --black: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* شاشة الدخول - ثابتة بدون سكرول */
        #loginPage { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* منع السكرول تماماً هنا */
        }
        .login-card { background: #111; padding: 30px; border-radius: 25px; width: 85%; text-align: center; border: 1px solid #333; }
        .tg-btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* الفيد الرئيسي - يظهر فقط بعد التسجيل */
        #mainContent { display: none; height: 100%; }
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; backdrop-filter: blur(5px); }

        /* البروفايل */
        .page { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .wallet-card { background: linear-gradient(135deg, #1a1a1a, #050505); padding: 30px; border-radius: 20px; margin: 20px; border: 1px solid #333; text-align: center; }
        .input-box { width: 90%; padding: 12px; margin: 8px auto; background: #222; border: 1px solid #444; color: white; border-radius: 8px; display: block; text-align: center; }
        .btn-action { width: 90%; margin: 5px auto; padding: 12px; border-radius: 10px; border: none; font-weight: bold; display: block; cursor: pointer; }

        /* أنيميشن الجالاكسي */
        #galaxyGame { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; }
        #winPopup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 7000; display: none; pointer-events: none; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 6500; animation: fall 2.5s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2 style="color:var(--gold); margin-bottom: 20px;">VTIK 🦋</h2>
            <div id="step1">
                <input type="text" id="regName" class="input-box" placeholder="اكتب اسمك للملف الشخصي">
                <button class="tg-btn" onclick="generateCode()">طلب كود التفعيل 🔑</button>
            </div>
            <div id="step2" style="display:none;">
                <p style="font-size: 14px;">أرسل الكود التالي للبوت:</p>
                <div style="background:#222; padding:15px; border-radius:10px; border:1px dashed var(--gold); margin:15px 0;">
                   <b id="vCodeDisp" style="color:var(--gold); font-size:28px; letter-spacing: 2px;"></b>
                </div>
                <button class="tg-btn" onclick="window.open('https://t.me/vtik_egypt_bot')">فتح تيليجرام ✈️</button>
                <p style="font-size:11px; color:var(--cyan); margin-top:15px; animation: pulse 1s infinite alternate;">بانتظار التأكيد من تيليجرام...</p>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div id="mainFeed"></div>
        
        <div class="galaxy-btn" onclick="openGalaxy()" style="position:fixed; bottom:80px; left:20px; width:60px; height:60px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; z-index:3000; box-shadow:0 0 15px var(--gold);">🎡</div>

        <div id="profilePage" class="page">
            <div class="wallet-card">
                <h3 id="userDisplay" style="color:var(--gold)">@User</h3>
                <div style="font-size:35px; font-weight:bold; color:var(--cyan);"><span id="cashBal">0.00</span> EGP</div>
                <div style="color:var(--gold);">🪙 <span id="coinBal">0</span> Coins</div>
            </div>

            <div style="padding:0 20px;">
                <input type="number" id="exCoins" class="input-box" placeholder="أدخل عدد الكوينز (حد أدنى 100)">
                <button onclick="exchange()" class="btn-action" style="background:var(--gold)">💱 تحويل الرصيد (1 كوين = 0.1ج)</button>
                
                <hr style="border:0.1px solid #222; margin:20px 0;">
                
                <button onclick="toggleF('dF')" class="btn-action" style="background:var(--cyan)">📥 إيداع</button>
                <div id="dF" style="display:none"><input type="number" id="amtD" class="input-box" placeholder="المبلغ"><button onclick="finance('إيداع')" class="btn-action" style="background:#333; color:white">تأكيد</button></div>

                <button onclick="toggleF('wF')" class="btn-action" style="background:var(--red); color:white;">📤 سحب</button>
                <div id="wF" style="display:none"><input type="number" id="amtW" class="input-box" placeholder="المبلغ"><button onclick="finance('سحب')" class="btn-action" style="background:#333; color:white">تأكيد</button></div>

                <button onclick="logout()" class="btn-action" style="background:#222; color:#777; margin-top:40px; border:1px solid #333;">🚪 تسجيل الخروج</button>
            </div>
        </div>

        <nav>
            <span onclick="closePages()" style="font-size:24px;">🏠</span>
            <span onclick="document.getElementById('profilePage').style.display='block'" style="font-size:24px;">👤</span>
        </nav>
    </div>

    <div id="galaxyGame">
        <canvas id="galaxyCanvas"></canvas>
        <div id="winPopup">
            <h1 id="winVal" style="font-size:70px; color:var(--gold); margin:0; text-shadow: 0 0 30px black;">+0</h1>
            <p style="color:var(--cyan); font-size:22px;">+2 EGP Bonus!</p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '7611311032:AAFjZ6x6o8yUat7Y-W3H4N8G9h8h8h8h8h8';
        let db = JSON.parse(localStorage.getItem('vtik_final_v1')) || { user:null, cash:0, coins:300 };
        let activeCode = "";

        function save() { localStorage.setItem('vtik_final_v1', JSON.stringify(db)); updateUI(); }

        // --- الدخول والتفعيل ---
        function generateCode() {
            const name = document.getElementById('regName').value.trim();
            if(name.length < 2) return alert("الاسم قصير جداً");
            activeCode = `V-${Math.floor(1000 + Math.random() * 9000)}`;
            document.getElementById('vCodeDisp').innerText = activeCode;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            const check = setInterval(async () => {
                try {
                    const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                    const d = await r.json();
                    if(d.result.some(m => m.message?.text?.includes(activeCode))) {
                        clearInterval(check);
                        db.user = { name: name }; save();
                        location.reload();
                    }
                } catch(e) {}
            }, 3000);
        }

        function updateUI() {
            document.getElementById('cashBal').innerText = db.cash.toFixed(2);
            document.getElementById('coinBal').innerText = db.coins;
            if(db.user) {
                document.getElementById('userDisplay').innerText = "@" + db.user.name;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }
        }

        function logout() { if(confirm("هل تريد الخروج؟")) { db.user = null; save(); location.reload(); } }

        // --- المالية ---
        function exchange() {
            const v = parseInt(document.getElementById('exCoins').value);
            if(v >= 100 && v <= db.coins) {
                db.coins -= v; db.cash += (v * 0.1); save();
                alert("تم التحويل!");
            } else { alert("تأكد من الرقم (الحد الأدنى 100)"); }
        }

        function finance(t) { alert("تم طلب الـ " + t); document.querySelectorAll('[id$="F"]').forEach(f=>f.style.display='none'); }
        function toggleF(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
        function closePages() { document.querySelectorAll('.page').forEach(p=>p.style.display='none'); }

        // --- الجالاكسي المطور ---
        let cvs = document.getElementById('galaxyCanvas'), ctx = cvs.getContext('2d'), pts = [], anim, intro=0;

        function openGalaxy() {
            document.getElementById('galaxyGame').style.display = 'block';
            cvs.width = innerWidth; cvs.height = innerHeight;
            intro=0; pts = [];
            for(let i=0; i<150; i++) {
                let phi = Math.acos(-1 + (2*i)/150), th = Math.sqrt(150*Math.PI)*phi;
                pts.push({ v:Math.floor(Math.random()*800)+10, x:180*Math.cos(th)*Math.sin(phi), y:180*Math.sin(th)*Math.sin(phi), z:180*Math.cos(phi), c:i%2===0?'#fe2c55':'#25f4ee' });
            }
            drawG();
        }

        function drawG() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,cvs.width, cvs.height);
            intro = Math.min(1, intro + 0.025);
            let r = Date.now()*0.0008;
            pts.forEach(p => {
                let d = 1500 * (1 - intro);
                let x = p.x*Math.cos(r) - p.z*Math.sin(r);
                let z = p.x*Math.sin(r) + p.z*Math.cos(r) - d;
                let per = 450/(450-z);
                if(per>0) {
                    ctx.beginPath(); ctx.arc(x*per + cvs.width/2, p.y*per + cvs.height/2, 7*per*intro, 0, Math.PI*2);
                    ctx.fillStyle = p.c; ctx.fill();
                }
            });
            anim = requestAnimationFrame(drawG);
        }

        cvs.onclick = () => {
            if(intro < 1) return;
            cancelAnimationFrame(anim);
            const w = pts[Math.floor(Math.random()*pts.length)];
            db.coins += w.v; db.cash += 2; save();
            document.getElementById('winVal').innerText = `+${w.v} C`;
            document.getElementById('winPopup').style.display = 'block';
            for(let i=0; i<70; i++) {
                const c = document.createElement('div');
                c.className = 'confetti'; c.style.left = Math.random()*100+'vw';
                c.style.backgroundColor = Math.random()>0.5?'var(--gold)':'white';
                document.getElementById('galaxyGame').appendChild(c);
                setTimeout(()=>c.remove(), 2500);
            }
            setTimeout(() => {
                document.getElementById('galaxyGame').style.display='none';
                document.getElementById('winPopup').style.display='none';
            }, 1800);
        };

        function renderFeed() {
            const f = document.getElementById('mainFeed');
            f.innerHTML = `<div class="video-container">
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop playsinline autoplay muted></video>
                <div class="side-icons">
                    <button class="icon-btn" onclick="db.cash+=1; db.coins+=50; save(); alert('لايك +1ج');">❤️</button>
                    <button class="icon-btn" onclick="alert('قريباً')">💬</button>
                    <button class="icon-btn" onclick="alert('تم النسخ')">🚀</button>
                </div>
            </div>`;
        }

        updateUI(); renderFeed();
    </script>
</body>
</html>
