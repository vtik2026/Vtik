<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .page { position: fixed; inset: 0; display: none; overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; }
        .nav-btn { background: none; border: none; color: #555; font-size: 24px; cursor: pointer; }
        .nav-btn.active { color: white; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="homePage" class="page active"><div id="mainFeed"></div></div>
<div id="profilePage" class="page">
    <div style="padding:40px 20px; text-align:center;">
        <h2 id="uNameDisplay">جاري التحميل...</h2>
        <div style="background:#111; padding:20px; border-radius:15px; margin:20px 0;">
            <h1 id="coinShow" style="color:var(--gold);">0</h1>
            <p>كوينز</p>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:1px solid #333; padding:10px; border-radius:10px;">تسجيل خروج</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('homePage')">🏠</button>
    <button class="nav-btn" onclick="triggerUpload()" style="background:#fff; color:#000; width:45px; height:30px; border-radius:8px; font-weight:bold;">+</button>
    <button class="nav-btn" onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const CHAT_ID = "-1003614080639"; 
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = JSON.parse(localStorage.getItem('vtik_session'));

    async function loadData() {
        if(!user) return;
        
        // جلب بيانات المستخدم بدقة
        const { data: u } = await sb.from('vtik_users').select('*').eq('user_id', user.id.toString()).single();
        if(u) {
            document.getElementById('uNameDisplay').innerText = u.username;
            document.getElementById('coinShow').innerText = u.coins_balance || 0;
        }

        // جلب الفيديوهات
        const { data: vids } = await sb.from('vtik_videos').select('*').order('created_at', {ascending: false});
        if(vids && vids.length > 0) {
            document.getElementById('mainFeed').innerHTML = vids.map(v => `
                <div class="video-card">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" loop playsinline controls></video>
                </div>
            `).join('');
        }
    }

    function triggerUpload() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'video/*';
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            alert("بدأ الرفع.. يرجى الانتظار");
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('video', file);

            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
            const result = await res.json();
            
            if(result.ok) {
                await sb.from('vtik_videos').insert([{ url: result.result.video.file_id, user_id: user.id.toString() }]);
                location.reload();
            } else {
                alert("فشل الرفع: " + result.description);
            }
        };
        fileInput.click();
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    window.onload = loadData;
</script>
</body>
</html>
