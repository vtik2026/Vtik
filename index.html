<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --accent: #25f4ee; --gold: #FFD700; --bg: #000; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; overflow: hidden; }

        .page { position: fixed; inset: 0; display: none; background: var(--bg); overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }

        /* الهوم والفيديوهات */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* أيقونات الجنب */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; color: white; font-size: 22px; backdrop-filter: blur(10px); cursor: pointer; }

        /* شريط التنقل */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #555; font-size: 24px; cursor: pointer; }
        .nav-btn.active { color: white; }
    </style>
</head>
<body>

<div id="homePage" class="page active">
    <div id="mainFeed">
        <div style="text-align:center; margin-top:50vh; color:#555;">جاري تحميل الفيديوهات...</div>
    </div>
</div>

<div id="profilePage" class="page">
    <div style="padding:40px 20px; text-align:center;">
        <img id="uImg" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--main); display:none;">
        <h3 id="uName">المستخدم</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <div style="flex:1; background:#111; padding:15px; border-radius:15px;">
                <h2 id="coinShow" style="color:var(--gold); margin:0;">0</h2>
                <p style="font-size:11px; color:#777;">الكوينز</p>
            </div>
            <div style="flex:1; background:#111; padding:15px; border-radius:15px;">
                <h2 id="cashShow" style="color:var(--accent); margin:0;">0.00</h2>
                <p style="font-size:11px; color:#777;">الكاش (EGP)</p>
            </div>
        </div>
        <button onclick="logout()" style="width:100%; margin-top:30px; padding:12px; background:none; border:1px solid #333; color:#666; border-radius:10px;">تسجيل خروج</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('homePage')">🏠</button>
    <button class="nav-btn" onclick="triggerUpload()" style="background:#fff; color:#000; width:40px; height:28px; border-radius:8px; font-weight:bold;">+</button>
    <button class="nav-btn" onclick="showPage('profilePage')">👤</button>
</nav>

<script>
    const BOT_TOKEN = "8744239107:AAEyhq-gUka7pdeCjy63tglRS5_U8es1Fd0";
    const SUPABASE_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // استعادة الجلسة التي نجحت معك
    let user = JSON.parse(localStorage.getItem('vtik_session'));

    window.onload = () => {
        if(user) {
            loadAppData();
        } else {
            // إذا ضاعت الجلسة لأي سبب، ارجع لصفحة الدخول
            window.location.href = "index.html"; 
        }
    };

    async function loadAppData() {
        // 1. جلب بيانات المستخدم من سوبابيز
        const { data: userData } = await sb.from('vtik_users').select('*').eq('user_id', user.id.toString()).single();
        if(userData) {
            document.getElementById('uName').innerText = userData.username;
            document.getElementById('coinShow').innerText = userData.coins_balance || 0;
            document.getElementById('cashShow').innerText = userData.cash_balance || "0.00";
            if(userData.avatar_url) {
                const img = document.getElementById('uImg');
                img.src = userData.avatar_url;
                img.style.display = 'inline-block';
            }
        }

        // 2. جلب الفيديوهات من جدول vtik_videos
        const { data: videos, error } = await sb.from('vtik_videos').select('*').order('created_at', {ascending: false});
        
        if (videos && videos.length > 0) {
            const feed = document.getElementById('mainFeed');
            feed.innerHTML = videos.map(v => `
                <div class="video-container">
                    <video src="https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${v.url}" loop playsinline controls></video>
                    <div class="side-icons">
                        <button class="icon-btn" onclick="addCoin(this)">❤️</button>
                        <button class="icon-btn">💬</button>
                        <button class="icon-btn">🔗</button>
                    </div>
                </div>
            `).join('');
        } else {
            document.getElementById('mainFeed').innerHTML = '<div style="text-align:center; padding-top:100px;">لا توجد فيديوهات حالياً. كن أول من ينشر!</div>';
        }
    }

    async function addCoin(btn) {
        if(btn.style.color === 'red') return;
        btn.style.color = 'red';
        
        let current = parseInt(document.getElementById('coinShow').innerText);
        let updated = current + 1;
        
        // تحديث في سوبابيز
        await sb.from('vtik_users').update({ coins_balance: updated }).eq('user_id', user.id.toString());
        document.getElementById('coinShow').innerText = updated;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
