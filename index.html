<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | النسخة المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #FFF0F5; --text: #333; --gold: #D4AF37; --accent: #FF1493; --card: #fff; }
        .dark-mode { --bg: #121212; --text: #f0f0f0; --card: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; }
        
        header { position: fixed; top: 0; width: 100%; background: var(--card); z-index: 1000; border-bottom: 2px solid var(--gold); }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 10px 0; }
        .tab { cursor: pointer; opacity: 0.5; font-size: 14px; font-weight: bold; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }

        #main-app { padding: 130px 0 80px; }
        .page-content { display: none; max-width: 500px; margin: 0 auto; }
        .active-page { display: block; }

        .v-card { position: relative; width: 95%; margin: 0 auto 15px; border-radius: 25px; overflow: hidden; background: #000; height: 70vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .creator-info { position: absolute; bottom: 20px; right: 20px; color: white; text-shadow: 1px 1px 5px #000; }

        /* صفحة البروفايل */
        .profile-card { background: var(--card); padding: 20px; margin: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .grid-item { position: relative; aspect-ratio: 9/16; background: #000; border-radius: 10px; overflow: hidden; }
        .del-btn { position: absolute; top: 5px; left: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

        /* Gemini الصغير */
        #gemini-btn { position: fixed; bottom: 85px; right: 15px; width: 45px; height: 45px; background: linear-gradient(135deg, #4285f4, #9b72cb); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; z-index: 2000; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); }
        .nav-item { font-size: 22px; cursor: pointer; color: var(--text); opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; justify-content:space-between; padding:10px 15px;">
            <button onclick="alert('تسجيل الدخول...')">دخول</button>
            <img src="logo.png" width="40" onclick="document.body.classList.toggle('dark-mode')">
            <span>⭐ 150</span>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-shorts" onclick="switchFeed('shorts')">Shorts</div>
            <div class="tab" id="tab-vids" onclick="switchFeed('vids')">فيديو</div>
            <div class="tab" id="tab-shops" onclick="switchFeed('shops')">متاجر</div>
        </div>
    </header>

    <div id="main-app">
        <div id="page-home" class="page-content active-page">
            <div id="feed"></div>
        </div>

        <div id="page-likes" class="page-content">
            <h3 style="text-align:center;">فيديوهاتي المفضلة ❤️</h3>
            <div id="likes-grid" class="video-grid"></div>
        </div>

        <div id="page-profile" class="page-content">
            <div class="profile-card">
                <img src="logo.png" width="70" style="border-radius:50%">
                <h2 id="p-name">مستخدم فيتيك</h2>
                <p id="p-phone">📱 010xxxxxxx</p>
                <button style="font-size: 11px;">تعديل البيانات</button>
            </div>
            <h4 style="margin-right:15px;">منشوراتي</h4>
            <div id="my-vids-grid" class="video-grid"></div>
        </div>
    </div>

    <div id="gemini-btn" onclick="alert('Gemini: أنا أسمعك، كيف أطور لك التطبيق الآن؟')">✨</div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('page-home', 0)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showPage('page-likes', 1)"><i class="fas fa-heart"></i></div>
        <div class="nav-item" style="background:#000; color:#fff; border-radius:10px; padding:5px 12px;"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="showPage('page-profile', 3)"><i class="fas fa-user"></i></div>
    </nav>

<script>
    const client = supabase.createClient('https://adnoxldhqdjdfnghhsog.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0');

    let currentTab = 'shorts';
    let allVideos = [];

    // تحميل البيانات وحفظ الحالة في LocalStorage
    async function init() {
        const { data } = await client.from('videos').select('*');
        allVideos = data || [];
        renderFeed();
        renderLikes();
        renderMyVideos();
    }

    function renderFeed() {
        const container = document.getElementById('feed');
        container.innerHTML = '';
        
        // فلترة الفيديوهات بناءً على المدة (افتراضياً: الفيديوهات الطويلة لها حقل duration)
        const filtered = allVideos.filter(v => {
            if(currentTab === 'shops') return v.is_business;
            if(currentTab === 'vids') return v.duration > 60; 
            return !v.is_business && (!v.duration || v.duration <= 60);
        });

        filtered.forEach(v => {
            const isLiked = localStorage.getItem('like_'+v.id);
            container.innerHTML += `
                <div class="v-card">
                    <div class="creator-info">@User_${v.user_id.slice(0,5)}</div>
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div style="position:absolute; left:15px; bottom:80px; color:white; display:flex; flex-direction:column; gap:20px;">
                        <i class="fas fa-heart" id="like-icon-${v.id}" style="color:${isLiked?'red':'white'}; font-size:25px;" onclick="toggleLike('${v.id}', '${v.video_url}')"></i>
                        <i class="fas fa-share" onclick="alert('رابط الفيديو: ${v.video_url}')"></i>
                    </div>
                </div>`;
        });
    }

    function toggleLike(id, url) {
        if(localStorage.getItem('like_'+id)) {
            localStorage.removeItem('like_'+id);
            document.getElementById('like-icon-'+id).style.color = 'white';
        } else {
            localStorage.setItem('like_'+id, url);
            document.getElementById('like-icon-'+id).style.color = 'red';
        }
        renderLikes();
    }

    function renderLikes() {
        const grid = document.getElementById('likes-grid');
        grid.innerHTML = '';
        for (let i = 0; i < localStorage.length; i++){
            let key = localStorage.key(i);
            if(key.startsWith('like_')) {
                grid.innerHTML += `<div class="grid-item"><video src="${localStorage.getItem(key)}"></video></div>`;
            }
        }
    }

    function renderMyVideos() {
        const grid = document.getElementById('my-vids-grid');
        grid.innerHTML = '';
        // هنا نجلب فيديوهات المستخدم المسجل (للتجربة سنعرض أول 3 فيديوهات)
        allVideos.slice(0,3).forEach(v => {
            grid.innerHTML += `
                <div class="grid-item" id="my-vid-${v.id}">
                    <button class="del-btn" onclick="deleteVideo('${v.id}')">×</button>
                    <video src="${v.video_url}"></video>
                </div>`;
        });
    }

    function deleteVideo(id) {
        if(confirm('هل تريد حذف هذا الفيديو نهائياً؟')) {
            document.getElementById('my-vid-'+id).remove();
            alert('تم الحذف من العرض');
        }
    }

    function switchFeed(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        renderFeed();
    }

    function showPage(id, idx) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
    }

    init();
</script>
</body>
</html>
