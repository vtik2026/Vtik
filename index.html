<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik 2026 | الإبداع والأعمال</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --off-pink: #FFF0F5; --pink-dark: #FFB6C1; --accent: #FF1493; --gemini-blue: #4285f4; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--off-pink); overflow-x: hidden; }
        
        /* العلامة المائية */
        .watermark-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; opacity: 0.04; z-index: -1; pointer-events: none; }

        header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 2px solid var(--pink-dark); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .logo-main { width: 55px; cursor: pointer; transition: 0.3s; }
        
        .tabs { display: flex; justify-content: center; gap: 35px; padding: 10px 0; font-weight: bold; }
        .tab { cursor: pointer; color: #999; padding-bottom: 5px; font-size: 15px; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* الصفحات المحتوى */
        #main-app { padding-top: 130px; padding-bottom: 90px; }
        .page-content { display: none; width: 100%; max-width: 450px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* كروت الفيديوهات */
        .v-card { position: relative; width: 95%; margin: 0 auto 25px; border-radius: 35px; overflow: hidden; background: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.15); height: 75vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .side-icons { position: absolute; bottom: 80px; left: 15px; display: flex; flex-direction: column; gap: 22px; color: white; z-index: 10; text-shadow: 0 2px 6px #000; }
        .side-icons i { font-size: 28px; cursor: pointer; }

        /* بروفايل المستخدم والمربعات Grid */
        .profile-header { text-align: center; padding: 20px; border-bottom: 1px solid var(--pink-dark); }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; }
        .grid-item { aspect-ratio: 9/16; background: #333; border-radius: 8px; overflow: hidden; position: relative; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* أيقونة Gemini الجديدة */
        #gemini-bot { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(66, 133, 244, 0.4); cursor: pointer; z-index: 9999; border: 2px solid #fff; animation: pulse-gemini 3s infinite; }
        .gemini-star { width: 35px; fill: white; }

        @keyframes pulse-gemini { 0% { box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(66, 133, 244, 0); } 100% { box-shadow: 0 0 0 0 rgba(66, 133, 244, 0); } }

        /* تسجيل الدخول */
        #auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,245,247,0.99); z-index: 10000; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 35px; border-radius: 40px; width: 85%; max-width: 360px; text-align: center; border: 2px solid var(--gold); }
        .social-btn { width: 100%; padding: 14px; margin: 10px 0; border-radius: 18px; border: none; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid var(--pink-dark); z-index: 1000; }
        .nav-item { color: var(--pink-dark); font-size: 26px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <img src="logo.png" class="watermark-bg">

    <header>
        <div class="nav-top">
            <div id="auth-status"><button onclick="openAuth()" style="background:var(--gold); border:none; color:white; padding:6px 18px; border-radius:18px; font-weight:bold;">دخول</button></div>
            <img src="logo.png" class="logo-main" onclick="showPage('page-home')">
            <div style="color:var(--gold); font-weight:bold;">⭐ <span id="pts">0</span></div>
        </div>
        <div class="tabs" id="main-tabs">
            <div id="tab-shorts" class="tab active" onclick="switchFeed('shorts')">Shorts ✨</div>
            <div id="tab-shops" class="tab" onclick="switchFeed('shops')">المتاجر 🛍️</div>
        </div>
    </header>

    <div id="main-app">
        <div id="page-home" class="page-content active-page">
            <div id="feed-container"></div>
        </div>

        <div id="page-likes" class="page-content">
            <h3 style="text-align:center; color:var(--accent);">فيديوهات أعجبتك ❤️</h3>
            <div class="video-grid" id="likes-grid"></div>
        </div>

        <div id="page-profile" class="page-content">
            <div class="profile-header">
                <img id="u-avatar" src="logo.png" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--gold);">
                <h2 id="u-name">المبدع</h2>
                <button onclick="client.auth.signOut(); location.reload();" style="background:#ff4d4d; color:white; border:none; padding:5px 15px; border-radius:10px;">خروج</button>
            </div>
            <div class="video-grid" id="my-vids"></div>
        </div>
    </div>

    <div id="gemini-bot" onclick="botHelp()">
        <svg class="gemini-star" viewBox="0 0 24 24"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z"/></svg>
    </div>

    <div id="auth-modal">
        <div class="auth-card">
            <img src="logo.png" style="width: 80px; margin-bottom: 15px;">
            <h2 style="color: var(--accent);">Vtik يناديك!</h2>
            <button class="social-btn" style="background:#DB4437" onclick="socialLogin('google')"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn" style="background:#4267B2" onclick="socialLogin('facebook')"><i class="fab fa-facebook"></i> Facebook</button>
            <button onclick="closeAuth()" style="background:none; border:none; color:#bbb; margin-top:20px;">إلغاء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('page-home')"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="requireLogin('page-home')"><i class="fas fa-search"></i></div>
        <div class="nav-item" onclick="requireLogin('page-home')" style="background:#000; color:#fff; width:50px; height:35px; border-radius:12px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="showPage('page-likes')"><i class="fas fa-heart"></i></div>
        <div class="nav-item" onclick="showPage('page-profile')"><i class="fas fa-user-circle"></i></div>
    </nav>

<script>
    const SUPABASE_URL = 'https://adnoxldhqdjdfnghhsog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbm94bGRocWRqZGZuZ2hoc29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODM3MjUsImV4cCI6MjA4ODI1OTcyNX0.hMV7I2a5mg1-3m7CXRGunVoR99AIecEzvtV1tzmEhX0';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentTab = 'shorts';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(user) {
            currentUser = user;
            updateUI(user);
        }
        loadFeed();
    }

    function showPage(pageId) {
        if(!currentUser && pageId !== 'page-home') { openAuth(); return; }
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.getElementById('main-tabs').style.display = (pageId === 'page-home') ? 'flex' : 'none';
        
        if(pageId === 'page-profile') loadMyVideos();
    }

    function switchFeed(type) {
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        loadFeed();
    }

    async function loadFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = '<p style="text-align:center; padding:50px;">جاري تحميل الفيديوهات...</p>';
        
        const { data } = await client.from('videos').select('*').order('created_at', { ascending: false });
        container.innerHTML = '';
        
        // منطق ذكي: لو مفيش فيديوهات بيزنس، اظهر الكل في الشورتس
        const filtered = data?.filter(v => currentTab === 'shops' ? v.is_business : !v.is_business) || [];
        const finalData = (currentTab === 'shorts' && filtered.length === 0) ? data : filtered;

        finalData?.forEach(v => {
            container.innerHTML += `
                <div class="v-card">
                    <img src="logo.png" style="position:absolute; top:20px; right:20px; width:45px; opacity:0.6; z-index:5;">
                    <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-icons">
                        <i class="fas fa-heart" onclick="interaction()"></i>
                        <i class="fas fa-gift" style="color:var(--gold)" onclick="interaction()"></i>
                        <i class="fas fa-share" onclick="alert('تم نسخ الرابط!')"></i>
                    </div>
                </div>`;
        });
    }

    async function loadMyVideos() {
        const { data } = await client.from('videos').select('*').eq('user_id', currentUser.id);
        const grid = document.getElementById('my-vids');
        grid.innerHTML = data?.length ? '' : '<p style="grid-column:span 3; text-align:center;">لا يوجد فيديوهات مرفوعة.</p>';
        data?.forEach(v => {
            grid.innerHTML += `<div class="grid-item"><video src="${v.video_url}"></video></div>`;
        });
    }

    async function socialLogin(provider) {
        const { error } = await client.auth.signInWithOAuth({
            provider,
            options: { redirectTo: 'https://vtik2026.github.io/Vtik/' }
        });
    }

    function updateUI(u) {
        document.getElementById('auth-status').innerHTML = `<img src="logo.png" style="width:35px; border-radius:50%; border:2px solid var(--gold);">`;
        document.getElementById('u-name').innerText = u.email.split('@')[0];
        document.getElementById('pts').innerText = "150";
    }

    function botHelp() { alert("أهلاً بك! أنا Gemini مساعدك الذكي في Vtik 🌟. كيف أساعدك اليوم؟"); }
    function interaction() { if(!currentUser) openAuth(); else alert("شكراً لتفاعلك!"); }
    function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
    function requireLogin() { if(!currentUser) openAuth(); }

    init();
</script>
</body>
            </html>
