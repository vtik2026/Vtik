<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik | الرئيسية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 10; }
        .nav-item { text-decoration: none; color: #888; font-size: 10px; text-align: center; }
        .active { color: white; }
    </style>
</head>
<body>

<div id="feed" class="feed"></div>

<div class="nav-bar">
    <a href="home.html" class="nav-item active">🏠<br>الرئيسية</a>
    <a href="stars.html" class="nav-item">🌟<br>النجوم</a>
    <a href="editor.html" class="nav-item" style="font-size: 20px; color: #fe2c55;">➕</a>
    <a href="history.html" class="nav-item">📜<br>السجل</a>
    <a href="profile.html" class="nav-item">👤<br>الملف</a>
</div>

<script>
    const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(S_URL, S_KEY);

    async function loadFeed() {
        const { data } = await sb.from('vtik_videos').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('feed');
        if(data) {
            data.forEach(v => {
                container.innerHTML += `
                    <div class="video-card">
                        <video src="${v.video_url}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-bar"><span>❤️</span><span>💬</span></div>
                    </div>`;
            });
        }
    }
    window.onload = loadFeed;
</script>
</body>
</html>
