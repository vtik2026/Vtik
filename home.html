<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Vtik - الصفحة الرئيسية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <h2>فيديوهات Vtik</h2>
        <a href="profile.html">حسابي</a>
    </nav>

    <div id="video-grid" class="container">
        </div>

    <script>
        // إعدادات الربط مع Supabase (استخدم مفاتيحك الخاصة)
        const S_URL = "https://etnolailfekdqaatfmmt.supabase.co"; 
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // تأكد من وضع المفتاح كاملاً
        const supabase = supabase.createClient(S_URL, S_KEY);

        async function loadVideos() {
            const { data, error } = await supabase
                .from('vtik_videos')
                .select('*')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('video-grid');
            if (data) {
                data.forEach(video => {
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.innerHTML = `
                        <video controls src="${video.video_url}"></video>
                        <p>${video.caption}</p>
                    `;
                    grid.appendChild(item);
                });
            }
        }
        loadVideos();
    </script>
</body>
</html>
