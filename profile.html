<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | الملف الشخصي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --card: #121212; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; padding-bottom: 80px; }
        .header { padding: 30px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); position: relative; }
        .logout-btn { position: absolute; top: 15px; left: 15px; background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--main); margin-bottom: 10px; }
        .wallet { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .balance-box { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .balance-box h2 { margin: 5px 0; color: var(--main); font-size: 24px; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 5px; }
        .v-item { aspect-ratio: 9/16; background: #111; border-radius: 8px; overflow: hidden; }
        .v-item video { width: 100%; height: 100%; object-fit: cover; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { text-decoration: none; color: #888; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <button class="logout-btn" onclick="logout()">خروج 🚪</button>
    <img id="uAvatar" class="avatar" src="https://via.placeholder.com/90">
    <h3 id="uName">تحميل...</h3>
</div>

<div class="wallet">
    <div class="balance-box"><span>رصيد كاش</span><h2 id="cashVal">0</h2></div>
    <div class="balance-box"><span>رصيد كوينز</span><h2 id="coinsVal">0</h2></div>
</div>

<h4 style="margin: 20px;">فيديوهاتي 🎬</h4>
<div id="userVids" class="video-grid"></div>

<div class="nav-bar">
    <a href="home.html" class="nav-item">🏠<br>الرئيسية</a>
    <a href="stars.html" class="nav-item">🌟<br>النجوم</a>
    <a href="editor.html" class="nav-item" style="font-size: 20px; color: #fe2c55;">➕</a>
    <a href="history.html" class="nav-item">📜<br>السجل</a>
    <a href="profile.html" class="nav-item active" style="color:white;">👤<br>الملف</a>
</div>

<script>
    const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(S_URL, S_KEY);
    const user = JSON.parse(localStorage.getItem('vtik_session'));

    async function init() {
        if(!user) return window.location.href='index.html';
        document.getElementById('uName').innerText = user.first_name;
        if(user.photo_url) document.getElementById('uAvatar').src = user.photo_url;

        const { data } = await sb.from('vtik_users').select('*').eq('user_id', user.id.toString()).single();
        if(data) {
            document.getElementById('cashVal').innerText = data.cash_balance || 0;
            document.getElementById('coinsVal').innerText = data.coins_balance || 0;
        }

        const { data: vids } = await sb.from('vtik_videos').select('*').eq('user_id', user.id.toString());
        if(vids) {
            vids.forEach(v => {
                document.getElementById('userVids').innerHTML += `<div class="v-item"><video src="${v.video_url}"></video></div>`;
            });
        }
    }
    function logout() { localStorage.removeItem('vtik_session'); window.location.href='index.html'; }
    window.onload = init;
</script>
</body>
</html>
