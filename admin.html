<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VTIK Admin - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #FFD700; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, button { padding: 12px; border-radius: 8px; border: none; margin: 5px; }
        button { background: #FFD700; color: #000; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { border: 1px solid #333; padding: 10px; text-align: center; }
        .res-box { display: none; margin-top: 20px; border-top: 1px solid #FFD700; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>🛠️ لوحة تحكم VTIK الكاملة</h1>

    <div class="card">
        <h3>📢 نشر مهمة فيديو (تختفي بعد 12 ساعة)</h3>
        <input type="text" id="taskUrl" placeholder="رابط فيديو يوتيوب" style="width:70%">
        <button onclick="updateTask()">نشر وتحديث 🚀</button>
    </div>

    <div class="card">
        <h3>🔍 البحث الشامل عن مستخدم</h3>
        <input type="text" id="searchKey" placeholder="أدخل ID التلجرام">
        <button onclick="searchUser()">بحث عن المستخدم</button>
        
        <div id="result" class="res-box">
            <p>👤 الاسم: <span id="n"></span></p>
            <p>🪙 الكوينز: <span id="c"></span></p>
            <p>💰 الإيداع: <span id="d"></span> ج</p>
            <h4>📋 السجل والعمليات:</h4>
            <table id="transTable"></table>
        </div>
    </div>

    <script>
        const SB_URL = 'https://filnjwkcbfcdbkajqwji.supabase.co';
        const SB_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbG5qd2tjYmZjZGJrYWpxd2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzc3ODcsImV4cCI6MjA5Mjk1Mzc4N30._D2oohezO31dXNUvicMdKcpJoUkcwBCpqLxDGcXFoBs';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function cleanOldTasks() {
            const twelveHoursAgo = new Date(Date.now() - 12 * 60 * 60 * 1000).toISOString();
            await supabase.from('tasks').delete().lt('created_at', twelveHoursAgo);
        }

        async function updateTask() {
            const url = document.getElementById('taskUrl').value;
            if(!url) return;
            await supabase.from('tasks').insert([{ video_url: url }]);
            alert("تم النشر بنجاح!");
        }

        async function searchUser() {
            const id = document.getElementById('searchKey').value;
            const { data: user } = await supabase.from('profiles').select('*').eq('telegram_id', id).single();
            const { data: logs } = await supabase.from('transactions').select('*').eq('telegram_id', id).order('created_at', {ascending: false});

            if(user) {
                document.getElementById('n').innerText = user.username;
                document.getElementById('c').innerText = user.coins;
                document.getElementById('d').innerText = user.total_deposited;
                
                let html = "<tr><th>النوع</th><th>القيمة</th><th>التوقيت</th></tr>";
                logs.forEach(l => {
                    html += `<tr><td>${l.type}</td><td>${l.amount}</td><td>${new Date(l.created_at).toLocaleTimeString()}</td></tr>`;
                });
                document.getElementById('transTable').innerHTML = html;
                document.getElementById('result').style.display = 'block';
            } else { alert("المستخدم غير موجود"); }
        }
        window.onload = cleanOldTasks;
    </script>
</body>
</html>
