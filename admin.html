<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VTIK - لوحة التحكم الإدارية</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #FFD700; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, button { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #FFD700; color: #000; }
        .status-badge { padding: 5px 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>لوحة تحكم VTIK الإدارية 🛠️</h1>

    <div class="card">
        <h3>📢 إضافة مهمة فيديو جديدة</h3>
        <input type="text" id="videoUrl" placeholder="رابط الفيديو (YouTube/TikTok)" style="width: 60%;">
        <button onclick="publishTask()" style="background: #39FF14;">نشر المهمة (200 كوينز)</button>
    </div>

    <div class="card">
        <h3>🔍 بحث عن مستخدم</h3>
        <input type="text" id="searchPhone" placeholder="بحث برقم الهاتف أو ID">
        <button onclick="searchUser()" style="background: #FFD700;">بحث الآن</button>
    </div>

    <div class="card">
        <h3>📊 إحصائيات النشاط</h3>
        <table id="logsTable">
            <thead>
                <tr>
                    <th>المستخدم</th>
                    <th>النشاط</th>
                    <th>التفاصيل</th>
                    <th>الوقت</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const BOT_TOKEN = '8608757510:AAHULS7KucBQy9wq_ax4AoGS490tmABrB3U';
        const CHAT_ID = '-1003614080639';

        // وظيفة نشر مهمة فيديو
        async function publishTask() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("أدخل الرابط أولاً");
            
            const msg = `🆕 مهمة جديدة في VTIK!\nشاهد الفيديو واربح 200 كوينز\nالرابط: ${url}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            alert("تم نشر المهمة وإرسالها لتلجرام!");
            document.getElementById('videoUrl').value = "";
        }

        // وظيفة محاكاة البحث (تعتمد على البيانات المرسلة لتلجرام)
        function searchUser() {
            const term = document.getElementById('searchPhone').value;
            alert("يتم الآن جلب بيانات " + term + " من قاعدة بيانات تلجرام...");
            // ملاحظة: لجلب بيانات حقيقية هنا نحتاج لسيرفر (Backend) 
            // لكن يمكنك رؤية كل التفاصيل في جروب التلجرام الخاص بك حالياً.
        }

        // تحسين: في لوحة الآدمن يفضل دائماً مراقبة قناة التلجرام لأنها المخزن الرئيسي حالياً
    </script>
</body>
</html>
