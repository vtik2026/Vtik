<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | رفع فيديو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; }
        .preview-box { width: 90%; max-width: 350px; aspect-ratio: 9/16; background: #000; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { background: #fe2c55; color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 80%; max-width: 300px; }
        #status { margin-top: 15px; color: #fe2c55; font-size: 14px; font-weight: bold; text-align: center; padding: 0 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { text-decoration: none; color: #888; font-size: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="header" style="margin-top: 20px;">
        <h3>نشر فيديو جديد 🎬</h3>
    </div>

    <div class="preview-box">
        <video id="vPreview" controls></video>
    </div>

    <div id="status">جاهز لاختيار الفيديو</div>

    <input type="file" id="vFile" accept="video/*" hidden onchange="handleFile(event)">
    
    <button class="upload-btn" onclick="document.getElementById('vFile').click()">اختيار فيديو من الهاتف</button>
    <button id="pubBtn" class="upload-btn" style="background:#222; display: none;" onclick="upload()">نشر الآن على Vtik 🚀</button>

    <div class="nav-bar">
        <a href="home.html" class="nav-item">🏠<br>الرئيسية</a>
        <a href="profile.html" class="nav-item">👤<br>الملف</a>
    </div>

    <script>
        let selectedFile = null;
        // الرابط الجديد الذي أعطاه لك الـ Agent
        const API_BASE = "https://bd035457-9a8c-40dd-9f69-809e0d81c5e0-00-2zb2r9td510vr.worf.replit.dev/api";

        function handleFile(e) {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('vPreview').src = URL.createObjectURL(selectedFile);
                document.getElementById('pubBtn').style.display = "block";
                document.getElementById('status').innerText = "تم اختيار الفيديو بنجاح ✅";
            }
        }

        async function upload() {
            const user = JSON.parse(localStorage.getItem('vtik_session'));
            if(!user) return alert("سجل دخولك أولاً");
            if(!selectedFile) return alert("يرجى اختيار فيديو أولاً");

            const statusDiv = document.getElementById('status');
            const pubBtn = document.getElementById('pubBtn');

            const formData = new FormData();
            formData.append('video', selectedFile);
            formData.append('user_id', user.id);
            formData.append('user_name', user.first_name);

            statusDiv.innerText = "⏳ جاري إرسال الفيديو لتليجرام ومعالجته...";
            pubBtn.disabled = true;
            pubBtn.style.opacity = "0.5";

            try {
                // نستخدم المسار المفتوح للخارج /upload-from-web مضافاً إليه /api
                const response = await fetch(`${API_BASE}/upload-from-web`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusDiv.innerText = "✅ تم النشر بنجاح! ستراه في الرئيسية الآن.";
                    setTimeout(() => window.location.href = 'home.html', 2500);
                } else {
                    const errText = await response.text();
                    statusDiv.innerText = "❌ فشل الرفع: " + errText;
                    pubBtn.disabled = false;
                    pubBtn.style.opacity = "1";
                }
            } catch (err) {
                statusDiv.innerText = "❌ خطأ في الاتصال بالسيرفر. تأكد من تشغيل Replit.";
                pubBtn.disabled = false;
                pubBtn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
