<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | رفع فيديو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; }
        .preview-box { width: 90%; max-width: 350px; aspect-ratio: 9/16; background: #000; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { background: #fe2c55; color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 80%; max-width: 300px; }
        #status { margin-top: 15px; color: #fe2c55; font-size: 14px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="preview-box">
        <video id="vPreview" controls></video>
    </div>

    <div id="status">جاهز للاختيار</div>

    <input type="file" id="vFile" accept="video/*" hidden onchange="handleFile(event)">
    <button class="upload-btn" onclick="document.getElementById('vFile').click()">اختيار فيديو من الهاتف</button>
    
    <button id="pubBtn" class="upload-btn" style="background:#222; display: none;" onclick="upload()">نشر الآن 🎬</button>

    <script>
        let selectedFile = null;
        // الرابط الذي أعطاه لك الـ Agent (تأكد من وجود /api في النهاية)
        const API_BASE = "https://bd035457-9a8c-40dd-9f69-809e0d81c5e0-00-2zb2r9td510vr.worf.replit.dev/api";

        function handleFile(e) {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('vPreview').src = URL.createObjectURL(selectedFile);
                document.getElementById('pubBtn').style.display = "block";
                document.getElementById('status').innerText = "تم اختيار الفيديو ✅";
            }
        }

        async function upload() {
            const user = JSON.parse(localStorage.getItem('vtik_session'));
            if(!user) return alert("سجل دخولك أولاً");
            if(!selectedFile) return alert("اختر فيديو أولاً");

            const status = document.getElementById('status');
            const btn = document.getElementById('pubBtn');

            status.innerText = "⏳ جاري الرفع لتليجرام... انتظر قليلاً";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const formData = new FormData();
            formData.append('video', selectedFile);
            formData.append('user_id', user.id);
            formData.append('user_name', user.first_name);

            try {
                // إرسال الطلب للسيرفر مباشرة بدلاً من التحويل للبوت
                const response = await fetch(`${API_BASE}/upload-from-web`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.innerText = "✅ تم النشر بنجاح!";
                    setTimeout(() => window.location.href = 'home.html', 2000);
                } else {
                    status.innerText = "❌ فشل الرفع. تأكد أن السيرفر يعمل.";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }
            } catch (err) {
                status.innerText = "❌ حدث خطأ في الاتصال بالسيرفر.";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
