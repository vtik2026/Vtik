<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTIK | نُخبة النجوم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; padding-bottom: 80px; }
        
        .stars-header { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border-bottom: 1px solid #222; }
        .stars-header h1 { color: var(--gold); font-size: 32px; margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .stars-header p { color: #888; font-size: 14px; margin-top: 10px; }

        /* أزرار التبديل */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab-btn { background: #111; border: 1px solid #333; color: #fff; padding: 10px 25px; border-radius: 25px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        /* القائمة */
        .leaderboard { padding: 0 15px; max-width: 500px; margin: auto; }
        .user-card { display: flex; align-items: center; background: #111; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #222; transition: 0.3s; }
        
        .rank-number { width: 40px; font-size: 22px; font-weight: bold; text-align: center; font-style: italic; }
        .rank-1 { color: var(--gold); font-size: 30px; }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .user-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #333; margin: 0 15px; object-fit: cover; }
        .rank-1-img { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        .user-details { flex-grow: 1; }
        .user-details h3 { margin: 0; font-size: 16px; color: #eee; }
        .user-details p { margin: 4px 0 0; font-size: 12px; color: #666; }

        .user-score { text-align: left; }
        .user-score span { display: block; color: var(--gold); font-weight: bold; font-size: 15px; }
        .user-score small { font-size: 10px; color: #555; text-transform: uppercase; }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.95); 
                   display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="stars-header">
    <h1>نُخبة النجوم 🪐</h1>
    <p>أكثر المستخدمين تفاعلاً وثراءً في VTIK</p>
</div>

<div class="tab-container">
    <button id="btnCash" class="tab-btn active" onclick="fetchStars('cash_balance')">الأعلى كاش</button>
    <button id="btnCoins" class="tab-btn" onclick="fetchStars('coins_balance')">الأعلى كوينز</button>
</div>

<div id="leaderboardList" class="leaderboard">
    </div>

<div class="nav-bar">
    <a href="home.html" class="nav-item">🏠<br>الرئيسية</a>
    <a href="stars.html" class="nav-item active">🌟<br>النجوم</a>
    <a href="editor.html" class="nav-item">➕</a>
    <a href="history.html" class="nav-item">📜<br>السجل</a>
    <a href="profile.html" class="nav-item">👤<br>الملف</a>
</div>

<script>
    const S_URL = "https://etnolailfekdqaatfmmt.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
    const sb = supabase.createClient(S_URL, S_KEY);

    async function fetchStars(sortBy) {
        // تحديث الأزرار
        document.getElementById('btnCash').classList.toggle('active', sortBy === 'cash_balance');
        document.getElementById('btnCoins').classList.toggle('active', sortBy === 'coins_balance');

        const { data, error } = await sb
            .from('vtik_users')
            .select('*')
            .order(sortBy, { ascending: false })
            .limit(20);

        const container = document.getElementById('leaderboardList');
        container.innerHTML = '';

        if (data) {
            data.forEach((user, index) => {
                const rank = index + 1;
                const score = sortBy === 'cash_balance' ? user.cash_balance + ' ج.م' : user.coins_balance + ' 🪙';
                const label = sortBy === 'cash_balance' ? 'إجمالي الكاش' : 'إجمالي الكوينز';
                
                let rankClass = rank <= 3 ? `rank-${rank}` : '';
                let imgClass = rank === 1 ? 'rank-1-img' : '';

                container.innerHTML += `
                    <div class="user-card">
                        <div class="rank-number ${rankClass}">${rank}</div>
                        <img class="user-img ${imgClass}" src="${user.avatar_url || 'https://via.placeholder.com/55'}" alt="Avatar">
                        <div class="user-details">
                            <h3>${user.username || 'مستخدم مجهول'}</h3>
                            <p>معرف: ${user.user_id.substring(0,8)}...</p>
                        </div>
                        <div class="user-score">
                            <span>${score}</span>
                            <small>${label}</small>
                        </div>
                    </div>
                `;
            });
        }
    }

    window.onload = () => fetchStars('cash_balance');
</script>
</body>
</html>
